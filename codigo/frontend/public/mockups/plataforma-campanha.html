<style>
/* Theme tokens (subset, sufficient for this module) */
:root, [data-theme="dark"] {
  --bg-page: #0a0a0b; --bg-page-2: #0c0c0e;
  --bg-card: #0e0e11; --bg-card-2: rgba(255,255,255,0.015);
  --bg-sidebar: #0b0b0d; --bg-topbar: #09090b;
  --bg-elevated: #131316;
  --fg: #e4e4e7; --fg-strong: #ffffff; --fg-muted: #a1a1aa;
  --fg-dim: #71717a; --fg-faint: #52525b; --fg-ghost: #3f3f46;
  --rule: rgba(255,255,255,0.06); --rule-strong: rgba(255,255,255,0.10);
  --accent-blue: #93c5fd; --accent-blue-strong: #60a5fa;
  --overall-from: #ffffff; --overall-to: #d4d4d8;
  --ok: #34d399; --warn: #fbbf24; --danger: #f87171;
  --chart-hover: rgba(255,255,255,0.06);
  --kbd-bg: rgba(255,255,255,0.08); --kbd-fg: #d4d4d8;
  --page-grad-1: rgba(59,130,246,0.06); --page-grad-2: rgba(168,85,247,0.04);
}
[data-theme="light"] {
  --bg-page: #f4f4f5; --bg-page-2: #fafafa;
  --bg-card: #ffffff; --bg-card-2: rgba(0,0,0,0.02);
  --bg-sidebar: #fafafa; --bg-topbar: #ffffff;
  --bg-elevated: #ffffff;
  --fg: #18181b; --fg-strong: #09090b; --fg-muted: #52525b;
  --fg-dim: #71717a; --fg-faint: #a1a1aa; --fg-ghost: #d4d4d8;
  --rule: rgba(0,0,0,0.06); --rule-strong: rgba(0,0,0,0.10);
  --accent-blue: #1d4ed8; --accent-blue-strong: #1e40af;
  --overall-from: #09090b; --overall-to: #3f3f46;
  --ok: #059669; --warn: #d97706; --danger: #dc2626;
  --chart-hover: rgba(0,0,0,0.04);
  --kbd-bg: rgba(0,0,0,0.06); --kbd-fg: #18181b;
  --page-grad-1: rgba(59,130,246,0.05); --page-grad-2: rgba(168,85,247,0.04);
}
:root {
  --tenant-primary: #002A7B; --tenant-primary-rgb: 0, 42, 123; --tenant-accent: #FFCC00;
}

html, body { background: var(--bg-page); color: var(--fg); }
body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
.tnum { font-variant-numeric: tabular-nums; font-feature-settings: "tnum","cv11"; }
.font-display { letter-spacing: -0.02em; }
.font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

.t-fg{color:var(--fg)} .t-fg-strong{color:var(--fg-strong)} .t-fg-muted{color:var(--fg-muted)}
.t-fg-dim{color:var(--fg-dim)} .t-fg-faint{color:var(--fg-faint)} .t-fg-ghost{color:var(--fg-ghost)}
.t-accent{color:var(--accent-blue)} .t-ok{color:var(--ok)} .t-warn{color:var(--warn)} .t-danger{color:var(--danger)}
.t-bg-card{background:var(--bg-card)}
.ring-soft { box-shadow: inset 0 0 0 1px var(--rule); }
.bg-page-grad {
  background:
    radial-gradient(1200px 600px at 85% -10%, var(--page-grad-1), transparent 60%),
    radial-gradient(800px 400px at 10% 0%, var(--page-grad-2), transparent 60%),
    var(--bg-page);
}

/* chips */
.chip { display: inline-flex; align-items: center; gap: 4px; padding: 0 8px; height: 20px; border-radius: 999px; font-size: 10.5px; font-weight: 700; white-space: nowrap; letter-spacing: 0.02em; }
.chip-blue   { background: rgba(37,99,235,0.10);  color: #1d4ed8; box-shadow: inset 0 0 0 1px rgba(37,99,235,0.30); }
.chip-green  { background: rgba(22,163,74,0.10);  color: #15803d; box-shadow: inset 0 0 0 1px rgba(22,163,74,0.28); }
.chip-amber  { background: rgba(217,119,6,0.10);  color: #a16207; box-shadow: inset 0 0 0 1px rgba(217,119,6,0.35); }
.chip-red    { background: rgba(220,38,38,0.10);  color: #b91c1c; box-shadow: inset 0 0 0 1px rgba(220,38,38,0.40); }
.chip-gray, .chip-neutral   { background: rgba(82,82,91,0.06);  color: #52525b; box-shadow: inset 0 0 0 1px rgba(82,82,91,0.18); }
.chip-violet { background: rgba(147,51,234,0.10); color: #7e22ce; box-shadow: inset 0 0 0 1px rgba(147,51,234,0.30); }
[data-theme="dark"] .chip-blue   { background: rgba(59,130,246,0.12); color: #93c5fd; box-shadow: inset 0 0 0 1px rgba(59,130,246,0.25); }
[data-theme="dark"] .chip-green  { background: rgba(34,197,94,0.10); color: #86efac; box-shadow: inset 0 0 0 1px rgba(34,197,94,0.22); }
[data-theme="dark"] .chip-amber  { background: rgba(251,191,36,0.12); color: #fcd34d; box-shadow: inset 0 0 0 1px rgba(251,191,36,0.30); }
[data-theme="dark"] .chip-red    { background: rgba(239,68,68,0.12); color: #fca5a5; box-shadow: inset 0 0 0 1px rgba(239,68,68,0.35); }
[data-theme="dark"] .chip-gray,[data-theme="dark"] .chip-neutral { background: rgba(161,161,170,0.08); color: #a1a1aa; box-shadow: inset 0 0 0 1px rgba(161,161,170,0.15); }
[data-theme="dark"] .chip-violet { background: rgba(168,85,247,0.12); color: #d8b4fe; box-shadow: inset 0 0 0 1px rgba(168,85,247,0.25); }

/* kbd */
.kbd { display: inline-flex; align-items: center; justify-content: center; padding: 1px 5px; min-width: 16px; height: 18px; border-radius: 3px; font: 600 10px/1 'JetBrains Mono', monospace; }

/* nav */
.nav-item { display: flex; align-items: center; gap: 10px; padding: 7px 12px 7px 14px; border-left: 2px solid transparent; font: 500 13px/1.2 Inter, sans-serif; color: var(--fg-muted); cursor: pointer; transition: color .15s, border-color .15s, background .15s; text-decoration: none; }
.nav-item:hover { color: var(--fg); }
.nav-item.active { color: var(--fg-strong); border-left-color: var(--tenant-primary); background: linear-gradient(90deg, rgba(var(--tenant-primary-rgb), 0.14) 0%, transparent 100%); }

/* buttons */
.btn-ghost { padding: 6px 10px; border-radius: 6px; font: 600 11px/1 Inter, sans-serif; background: var(--rule); color: var(--fg); cursor: pointer; transition: background .12s, color .12s; border: 1px solid transparent; display: inline-flex; align-items: center; gap: 6px; }
.btn-ghost:hover { background: var(--rule-strong); color: var(--fg-strong); }
.btn-ghost.active { background: var(--fg-strong); color: var(--bg-card); }
.btn-primary { padding: 7px 12px; border-radius: 6px; font: 700 12px/1 Inter, sans-serif; background: var(--tenant-primary); color: #fff; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 6px; box-shadow: 0 1px 0 rgba(255,255,255,0.15) inset, 0 4px 12px -4px rgba(var(--tenant-primary-rgb), 0.4); }
.btn-primary:hover { filter: brightness(1.1); }

/* shell */
.shell { height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
.shell-body { display: grid; grid-template-columns: 224px 1fr; min-height: 0; flex: 1; }
.shell-main { overflow: hidden; background: var(--bg-page); min-width: 0; display: flex; flex-direction: column; }
.shell-main > .main-scroll { flex: 1; overflow: auto; min-height: 0; }

/* sidebar */
.sidebar-col { background: var(--bg-sidebar); border-right: 1px solid var(--rule); display: flex; flex-direction: column; overflow: hidden; }

/* topbar */
.topbar { height: 48px; background: var(--bg-topbar); border-bottom: 1px solid var(--rule); display: flex; align-items: center; padding: 0 16px; gap: 16px; flex-shrink: 0; }
.topbar > * { flex-shrink: 0; }
.topbar .breadcrumb { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.search-cmdk { width: 440px; max-width: 50%; height: 30px; border-radius: 6px; background: var(--rule); display: flex; align-items: center; gap: 8px; padding: 0 10px; cursor: pointer; transition: background .12s; }
.search-cmdk:hover { background: var(--rule-strong); }

/* KPI */
.kpi-card { background: var(--bg-card); border: 1px solid var(--rule); border-radius: 12px; padding: 18px 20px 14px; position: relative; overflow: hidden; min-width: 0; }
.kpi-card .tnum { white-space: nowrap; }

/* Tweaks panel */
.tweak-panel { position: fixed; bottom: 18px; right: 18px; width: 320px; z-index: 80; background: var(--bg-elevated); border: 1px solid var(--rule-strong); border-radius: 12px; padding: 14px 16px; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6); }

/* thin-scroll */
.thin-scroll { scrollbar-width: thin; scrollbar-color: var(--rule-strong) transparent; }
.thin-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
.thin-scroll::-webkit-scrollbar-thumb { background: var(--rule-strong); border-radius: 999px; }
</style>
<style>
/* =========================================================================
 * Campanha · tweaks de estilo em CSS puro
 * ========================================================================= */

/* densidade confortável → padding padrão
   densidade compacta    → reduz espaços em cards e listas */
[data-density="compacto"] .kpi-card { padding: 14px 16px 10px; }
[data-density="compacto"] .chip { height: 18px; font-size: 10px; }

/* buttons hover smoothing */
.btn-ghost, .btn-primary { transition: all .15s ease; }

/* Tela-específicas */
.camp-hero {
  position: relative;
  border-radius: 16px;
  overflow: hidden;
  background: linear-gradient(135deg, var(--tenant-primary) 0%, color-mix(in oklab, var(--tenant-primary) 75%, black) 100%);
  color: #fff;
}
.camp-hero::before {
  content: "";
  position: absolute; inset: 0;
  background:
    radial-gradient(600px 300px at 90% -10%, rgba(255,255,255,0.12), transparent 60%),
    radial-gradient(400px 200px at 10% 110%, rgba(255,255,255,0.08), transparent 60%);
  pointer-events: none;
}

/* Segment control */
.seg { display: inline-flex; padding: 2px; border-radius: 7px; background: var(--rule); gap: 2px; }
.seg-item { padding: 5px 10px; border-radius: 5px; font: 600 11px/1 Inter,sans-serif; color: var(--fg-muted); cursor: pointer; border: none; background: transparent; white-space: nowrap; }
.seg-item:hover { color: var(--fg); }
.seg-item.active { background: var(--bg-card); color: var(--fg-strong); box-shadow: 0 1px 2px rgba(0,0,0,0.08); }

/* list-row */
.list-row { display: grid; align-items: center; gap: 12px; padding: 9px 14px; border-bottom: 1px solid var(--rule); transition: background .1s; }
.list-row:hover { background: var(--chart-hover); }
.list-row:last-child { border-bottom: 0; }

/* cards */
.card { background: var(--bg-card); border: 1px solid var(--rule); border-radius: 12px; }
.card-header { padding: 14px 18px 10px; border-bottom: 1px solid var(--rule); display: flex; align-items: center; gap: 12px; }
.card-title { font: 700 13px/1.2 Inter,sans-serif; color: var(--fg-strong); letter-spacing: -0.005em; }
.card-sub   { font: 500 10.5px/1.2 Inter,sans-serif; color: var(--fg-dim); letter-spacing: 0.05em; text-transform: uppercase; }

/* sparkline colors */
.spark-up   { stroke: var(--ok); }
.spark-down { stroke: var(--danger); }
.spark-flat { stroke: var(--fg-dim); }

/* pills for tier */
.tier-ouro   { background: linear-gradient(135deg, #fde68a, #f59e0b); color: #78350f; }
.tier-prata  { background: linear-gradient(135deg, #e5e7eb, #9ca3af); color: #374151; }
.tier-bronze { background: linear-gradient(135deg, #fed7aa, #c2410c); color: #7c2d12; }

/* Chat-specific */
.msg-bubble { max-width: 75%; padding: 9px 12px; border-radius: 12px; font-size: 12.5px; line-height: 1.45; }
.msg-me     { background: var(--tenant-primary); color: #fff; border-top-right-radius: 4px; }
.msg-them   { background: var(--rule); color: var(--fg); border-top-left-radius: 4px; }
[data-theme="dark"] .msg-them { background: #1a1a1d; }

</style>
</head>

        <div className="min-w-0">

        </div>
      </div>

      <nav className="flex-1 overflow-y-auto thin-scroll pt-3 pb-2">
        <div className="px-4 text-[9.5px] t-fg-dim uppercase tracking-[0.14em] font-semibold mb-2">Módulos</div>
        {modules.map(m => (
          <a key={m.id} href="#" className={`nav-item ${m.active ? "active" : ""}`} onClick={e => e.preventDefault()}>
            <CIcon name={m.icon} size={14}/>
            <span className="flex-1 truncate">{m.label}</span>
            {m.badge && <span className="chip chip-green" style={{ height: 16, fontSize: 9, padding: "0 5px" }}>{m.badge}</span>}

      <div className="p-3 border-t flex items-center gap-2" style={{ borderColor: "var(--rule)" }}>

    </aside>
  );
}

/* ========================================================================
 * CTopbar
 * ======================================================================== */
function CTopbar({ tenant, personaLabel, breadcrumbs, onOpenCmdk }) {
  return (
    <header className="topbar">
      <div className="breadcrumb flex items-center gap-1.5 text-[12px]">
        {breadcrumbs.map((b, i) => (
          <React.Fragment key={i}>
            {i > 0 && <CIcon name="ChevronRight" size={11} className="t-fg-faint"/>}
            <span className={i === breadcrumbs.length - 1 ? "t-fg-strong font-semibold" : "t-fg-muted"}>{b}</span>
          </React.Fragment>
        ))}
      </div>

      <div className="flex-1"/>

      <div onClick={onOpenCmdk} className="search-cmdk">
        <CIcon name="Search" size={13} className="t-fg-dim"/>
        <span className="text-[12px] t-fg-dim flex-1">Buscar cercas, lideranças, campanhas…</span>
        <span className="kbd" style={{ background: "var(--kbd-bg)", color: "var(--kbd-fg)" }}>⌘K</span>
      </div>

      <button className="btn-ghost" title="Alertas">
        <CIcon name="Bell" size={12}/>
        <span className="w-1.5 h-1.5 rounded-full" style={{ background: "var(--danger)" }}/>
      </button>

      <div className="flex items-center gap-2 pl-3" style={{ borderLeft: "1px solid var(--rule)" }}>
        <span className="chip chip-violet">{personaLabel}</span>
        <div className="w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold" style={{ background: "var(--tenant-primary)", color: "#fff" }}>AM</div>
      </div>
    </header>
  );
}

/* ========================================================================
 * Campaign sub-nav (horizontal tab strip under topbar)
 * ======================================================================== */
function CampSubNav({ screen, onChange, persona }) {
  return (
    <div className="flex items-center gap-1 px-4 h-11 flex-shrink-0" style={{ background: "var(--bg-topbar)", borderBottom: "1px solid var(--rule)" }}>
      <div className="flex items-center gap-2 mr-3">
        <div className="w-6 h-6 rounded-md flex items-center justify-center" style={{ background: "var(--tenant-primary)", color: "#fff" }}>
          <CIcon name="Flag" size={12}/>
        </div>
        <div>
          <div className="text-[12px] font-bold t-fg-strong leading-none">Campanha 2026</div>
          <div className="text-[9.5px] t-fg-dim uppercase tracking-[0.1em] font-semibold mt-0.5">{persona.scope}</div>
        </div>
      </div>
      <div className="w-px h-5" style={{ background: "var(--rule)" }}/>
      <nav className="flex items-center gap-0.5 ml-2 overflow-x-auto thin-scroll">
        {CAMP_SCREENS.map(s => {
          const active = screen === s.id;
          return (
            <button key={s.id} onClick={() => onChange(s.id)}
              className="flex items-center gap-1.5 px-3 h-7 rounded-md text-[12px] font-semibold transition-colors whitespace-nowrap"
              style={{
                color: active ? "var(--fg-strong)" : "var(--fg-muted)",
                background: active ? "var(--rule-strong)" : "transparent",
              }}
              onMouseEnter={e => { if (!active) e.currentTarget.style.color = "var(--fg)"; }}
              onMouseLeave={e => { if (!active) e.currentTarget.style.color = "var(--fg-muted)"; }}
            >
              <CIcon name={s.icon} size={12}/>
              {s.label}
            </button>
          );
        })}
      </nav>
      <div className="flex-1"/>
      <button className="btn-ghost" style={{ padding: "5px 9px" }}>
        <CIcon name="Download" size={11}/>
        Export
      </button>
    </div>
  );
}

/* export to window scope */
Object.assign(window, {
  CAMP_TENANTS, TENANTS_CAMP, CAMPANHA_PERSONAS, CAMP_SCREENS,
  CIcon, CSidebar, CTopbar, CampSubNav,
});

/* aniversariantes da semana ordenados para CRM */
function proximoAniversario(isoDate, refDate = new Date()) {
  const [y, m, d] = isoDate.split("-").map(Number);
  const thisYear = new Date(refDate.getFullYear(), m - 1, d);
  if (thisYear < new Date(refDate.getFullYear(), refDate.getMonth(), refDate.getDate())) {
    thisYear.setFullYear(refDate.getFullYear() + 1);
  }
  const diffDays = Math.floor((thisYear - new Date(refDate.getFullYear(), refDate.getMonth(), refDate.getDate())) / 86400000);
  return { date: thisYear, diffDays };
}

/* =========================================================================
 * Campanha · Adapter — small utility shims + reusable mini-components
 * ========================================================================= */

/* Sparkline SVG */
function Sparkline({ points, width = 120, height = 32, color = "currentColor", fill = true }) {
  if (!points || !points.length) return null;
  const min = Math.min(...points), max = Math.max(...points);
  const span = max - min || 1;
  const step = width / (points.length - 1);
  const path = points.map((p, i) => `${i === 0 ? "M" : "L"} ${i * step} ${height - ((p - min) / span) * height}`).join(" ");
  const area = `${path} L ${width} ${height} L 0 ${height} Z`;
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ overflow: "visible" }}>
      {fill && <path d={area} fill={color} opacity={0.12}/>}
      <path d={path} fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

/* KPI tile */
function KpiTile({ label, valor, delta, sentiment, sub, sparkPoints, sparkColor, onClick }) {
  const sentimentColor = sentiment === "up" ? "var(--ok)" : sentiment === "down" ? "var(--danger)" : "var(--fg-dim)";
  return (
    <div className="kpi-card" onClick={onClick} style={{ cursor: onClick ? "pointer" : "default" }}>
      <div className="flex items-start justify-between gap-3 mb-3">
        <div className="text-[10.5px] t-fg-dim uppercase tracking-[0.12em] font-semibold">{label}</div>
        {delta && (
          <span className="text-[11px] font-bold tnum flex items-center gap-0.5" style={{ color: sentimentColor }}>
            {sentiment === "up" && <CIcon name="ArrowUp" size={10}/>}
            {sentiment === "down" && <CIcon name="ArrowDown" size={10}/>}
            {delta}
          </span>
        )}
      </div>
      <div className="flex items-end justify-between gap-3">
        <div>
          <div className="text-[28px] font-black tnum font-display leading-none" style={{ background: "linear-gradient(180deg, var(--overall-from), var(--overall-to))", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>{valor}</div>
          {sub && <div className="text-[10.5px] t-fg-muted mt-1.5">{sub}</div>}
        </div>
        {sparkPoints && <Sparkline points={sparkPoints} color={sparkColor || sentimentColor} width={96} height={36}/>}
      </div>
    </div>
  );
}

/* Progress bar */
function ProgressBar({ value, max = 100, color = "var(--tenant-primary)", height = 6 }) {
  const pct = Math.min(100, (value / max) * 100);
  return (
    <div style={{ width: "100%", height, background: "var(--rule)", borderRadius: 999, overflow: "hidden" }}>
      <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: 999, transition: "width 0.4s" }}/>
    </div>
  );
}

/* Status dot */
function StatusDot({ status }) {
  const map = {
    ativo:    "var(--ok)",
    destaque: "var(--ok)",
    atencao:  "var(--warn)",
    vaga:     "var(--fg-dim)",
    critico:  "var(--danger)",
  };
  return <span style={{ width: 7, height: 7, borderRadius: "50%", background: map[status] || "var(--fg-dim)", display: "inline-block", flexShrink: 0 }}/>;
}

/* Tier pill */
function TierPill({ tier }) {
  return (
    <span className={`chip tier-${tier}`} style={{ border: "none" }}>{tier.toUpperCase()}</span>
  );
}

/* Avatar */
function Avatar({ nome, size = 28, bg = null }) {
  const ini = nome.split(" ").map(w => w[0]).slice(0, 2).join("").toUpperCase();
  const colors = ["#1d4ed8","#059669","#9333ea","#c2410c","#db2777","#0891b2","#ca8a04"];
  const seed = nome.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
  const color = bg || colors[seed % colors.length];
  return (
    <div style={{ width: size, height: size, borderRadius: "50%", background: color, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: size * 0.4, fontWeight: 700, flexShrink: 0 }}>{ini}</div>
  );
}

/* Card wrapper */
function Card({ title, sub, right, children, noPadding, className = "" }) {
  return (
    <section className={`card ${className}`}>
      {(title || right) && (
        <header className="card-header">
          <div className="min-w-0 flex-1">
            {sub && <div className="card-sub mb-0.5">{sub}</div>}
            {title && <div className="card-title">{title}</div>}
          </div>
          {right}
        </header>
      )}
      <div style={{ padding: noPadding ? 0 : 14 }}>{children}</div>
    </section>
  );
}

/* Segment control */
function Segment({ value, options, onChange }) {
  return (
    <div className="seg">
      {options.map(o => (
        <button key={o.value} className={`seg-item ${value === o.value ? "active" : ""}`} onClick={() => onChange(o.value)}>{o.label}</button>
      ))}
    </div>
  );
}

Object.assign(window, { Sparkline, KpiTile, ProgressBar, StatusDot, TierPill, Avatar, Card, Segment });

              <div className="flex items-center justify-between text-[11px]">
                <span className="t-fg-dim">Projeção · agosto</span>
                <span className="font-bold t-fg-strong">R$ 6,4 mi</span>
              </div>

        </div>
      </div>

      {/* Top + Bottom cercas */}
      <div className="grid grid-cols-2 gap-4">
        <Card title="Cercas de destaque" sub="Top 5 · ritmo de cadastro"
              right={<button className="btn-ghost" style={{ padding: "4px 8px", fontSize: 10.5 }}>Ver todas</button>}
              noPadding>
          {TOP_CERCAS.map((c, i) => (
            <div key={i} className="list-row" style={{ gridTemplateColumns: "20px 1fr auto 120px" }}>
              <div className="text-[12px] font-bold tnum t-fg-strong">{i + 1}</div>

                <div className="text-[10px] t-fg-dim">/ {c.meta.toLocaleString("pt-BR")}</div>
              </div>
              <div>
                <ProgressBar value={c.pct} color="var(--ok)"/>
                <div className="text-[10px] tnum t-fg-muted mt-1 text-right">{c.pct}%</div>
              </div>
            </div>
          ))}
        </Card>

        <Card title="Cercas em atenção" sub="Baixo desempenho · intervir" noPadding
              right={<span className="chip chip-red">4 críticas</span>}>
          {BOTTOM_CERCAS.map((c, i) => (
            <div key={i} className="list-row" style={{ gridTemplateColumns: "20px 1fr auto 120px" }}>
              <div className="text-[12px] font-bold tnum" style={{ color: "var(--danger)" }}>!</div>
              <div className="min-w-0">
                <div className="text-[12.5px] font-semibold t-fg-strong">{c.nome}</div>
                <div className="text-[10.5px]" style={{ color: c.responsavel === "—" ? "var(--danger)" : "var(--fg-dim)" }}>
                  {c.responsavel === "—" ? "⚠ sem responsável" : c.responsavel}
                </div>
              </div>
              <div className="text-right">
                <div className="text-[12px] font-bold tnum t-fg-strong">{c.feito.toLocaleString("pt-BR")}</div>
                <div className="text-[10px] t-fg-dim">/ {c.meta.toLocaleString("pt-BR")}</div>
              </div>
              <div>
                <ProgressBar value={c.pct} color={c.pct < 20 ? "var(--danger)" : "var(--warn)"}/>

        </Card>
      </div>
    </div>

}

function Hero_Stat({ label, value, sub, delta }) {

}

/* =========================================================================
 * Tela 2 · Mapa de Cercas — canvas dedicado
 * Mapa esquemático da Bahia com cercas, sidebar contextual, legenda
 * ========================================================================= */

function Tela2Mapa({ demoMode, corCerca }) {
  const [selected, setSelected] = React.useState(null);
  const [hovered, setHovered] = React.useState(null);
  const [layer, setLayer] = React.useState("responsavel"); // responsavel | score | engajamento | vaga

  // cores por estado
  const colorFor = (cerca) => {
    if (layer === "score" || corCerca === "score") {
      const s = cerca.score;
      if (s >= 80) return "#059669";
      if (s >= 65) return "#fbbf24";
      if (s >= 45) return "#f97316";
      return "#dc2626";
    }
    if (layer === "engajamento") {
      const e = cerca.engajamento;
      if (e >= 75) return "#1d4ed8";
      if (e >= 55) return "#60a5fa";
      if (e >= 35) return "#fbbf24";
      return "#dc2626";
    }
    if (layer === "vaga") {
      return cerca.responsavelId ? "rgba(82,82,91,0.4)" : "#dc2626";
    }
    // responsavel: por tier do responsável (ou vermelho se vago)
    if (!cerca.responsavelId) return "#dc2626";
    const lid = LIDERANCAS.find(l => l.id === cerca.responsavelId);
    if (!lid) return "#71717a";
    return lid.tier === "ouro" ? "#1d4ed8" : lid.tier === "prata" ? "#9ca3af" : "#c2410c";
  };

  const allMuns = CERCAS[0].filhas || [];
  const allBairros = allMuns.flatMap(m => m.filhas || []);

  return (
    <div className="h-full w-full flex" style={{ background: "var(--bg-page-2)" }}>
      {/* Left toolbar */}
      <aside className="w-[260px] flex-shrink-0 border-r overflow-y-auto thin-scroll" style={{ borderColor: "var(--rule)", background: "var(--bg-card)" }}>
        <div className="p-4 border-b" style={{ borderColor: "var(--rule)" }}>
          <div className="card-sub mb-2">Camada ativa</div>
          <div className="grid grid-cols-2 gap-1">
            {[
              { k: "responsavel", l: "Responsável" },
              { k: "score",       l: "Score" },
              { k: "engajamento", l: "Engajamento" },
              { k: "vaga",        l: "Vagas" },
            ].map(o => (
              <button key={o.k} onClick={() => setLayer(o.k)} className={`btn-ghost ${layer === o.k ? "active" : ""}`} style={{ padding: "6px 8px", fontSize: 10.5, justifyContent: "center" }}>{o.l}</button>
            ))}
          </div>
        </div>

        <div className="p-4 border-b" style={{ borderColor: "var(--rule)" }}>
          <div className="card-sub mb-2">Legenda</div>
          <MapLegend layer={layer}/>
        </div>

        <div className="p-4">
          <div className="card-sub mb-2">Regionais · Recôncavo</div>
          <div className="space-y-1">
            {allMuns.map(m => (
              <button key={m.id} onClick={() => setSelected(m)}
                      className="w-full flex items-center gap-2 px-2 py-2 rounded-md text-left"
                      style={{ background: selected?.id === m.id ? "var(--rule-strong)" : "transparent", border: "1px solid transparent" }}
                      onMouseEnter={e => { if (selected?.id !== m.id) e.currentTarget.style.background = "var(--chart-hover)"; }}
                      onMouseLeave={e => { if (selected?.id !== m.id) e.currentTarget.style.background = "transparent"; }}>
                <StatusDot status={m.status}/>
                <div className="flex-1 min-w-0">
                  <div className="text-[12px] font-semibold t-fg-strong">{m.nome}</div>
                  <div className="text-[10px] t-fg-dim">{m.responsavel}</div>
                </div>
                <span className="text-[10px] tnum font-bold" style={{ color: m.score >= 70 ? "var(--ok)" : m.score >= 50 ? "var(--warn)" : "var(--danger)" }}>{m.score}</span>
              </button>
            ))}
          </div>
        </div>
      </aside>

      {/* Map canvas */}
      <div className="flex-1 relative min-w-0" onClick={() => setSelected(null)}>
        <div className="absolute top-4 left-4 right-4 flex items-center justify-between z-10 pointer-events-none">
          <div className="px-3 py-2 rounded-lg pointer-events-auto" style={{ background: "var(--bg-card)", border: "1px solid var(--rule-strong)", boxShadow: "0 4px 12px rgba(0,0,0,0.08)" }}>
            <div className="text-[9.5px] t-fg-dim uppercase tracking-[0.14em] font-semibold">Região</div>
            <div className="text-[13px] font-bold t-fg-strong">Recôncavo Baiano</div>
          </div>
          <div className="flex gap-2 pointer-events-auto">
            <button className="btn-ghost"><CIcon name="Filter" size={11}/>Filtros</button>
            <button className="btn-ghost"><CIcon name="Layers" size={11}/>Camadas</button>
            <button className="btn-ghost"><CIcon name="Plus" size={11}/>Zoom</button>
            <button className="btn-ghost"><CIcon name="Minus" size={11}/></button>
            <button className="btn-primary" style={{ padding: "6px 10px", fontSize: 11 }}>
              <CIcon name="Plus" size={11}/>
              Nova cerca
            </button>
          </div>
        </div>

        <svg viewBox="0 0 800 600" style={{ width: "100%", height: "100%", cursor: "grab" }} onClick={e => e.stopPropagation()}>
          <defs>
            <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
              <path d="M 24 0 L 0 0 0 24" fill="none" stroke="var(--rule)" strokeWidth="0.5"/>
            </pattern>
          </defs>
          <rect width="800" height="600" fill="url(#grid)"/>

          {/* Regional outline (esquemático) */}
          <path d="M 120 120 Q 180 80, 280 100 T 520 120 Q 620 140, 680 220 T 700 400 Q 680 480, 580 500 T 340 490 Q 200 480, 140 400 T 120 240 Z"
                fill="rgba(0, 42, 123, 0.05)" stroke="var(--tenant-primary)" strokeWidth="1.5" strokeDasharray="4 3" opacity="0.6"/>

          {/* Municípios (grandes) */}
          {[
            { id: "mun-feira",       cx: 300, cy: 240, r: 58,  nome: "Feira de Santana" },
            { id: "mun-ssalvador",   cx: 520, cy: 400, r: 52,  nome: "Salvador (subúrbio)" },
            { id: "mun-sfelix",      cx: 210, cy: 370, r: 28,  nome: "São Félix" },
            { id: "mun-cachoeira",   cx: 260, cy: 410, r: 36,  nome: "Cachoeira" },
            { id: "mun-maragogipe",  cx: 380, cy: 460, r: 40,  nome: "Maragogipe" },
          ].map(m => {
            const mun = allMuns.find(x => x.id === m.id);
            const c = colorFor(mun);
            const active = selected?.id === m.id;
            return (
              <g key={m.id} style={{ cursor: "pointer" }}
                 onClick={e => { e.stopPropagation(); setSelected(mun); }}
                 onMouseEnter={() => setHovered(mun)} onMouseLeave={() => setHovered(null)}>
                <circle cx={m.cx} cy={m.cy} r={m.r} fill={c} fillOpacity={active ? 0.30 : 0.15} stroke={c} strokeWidth={active ? 2.2 : 1.4}/>
                {/* Bairros dentro */}
                {(mun.filhas || []).map((b, i) => {
                  const bc = colorFor(b);
                  const ang = (i / (mun.filhas.length)) * Math.PI * 2;
                  const x = m.cx + Math.cos(ang) * (m.r * 0.55);
                  const y = m.cy + Math.sin(ang) * (m.r * 0.55);
                  return (
                    <g key={b.id}>
                      <circle cx={x} cy={y} r={7} fill={bc} fillOpacity={0.85} stroke="#fff" strokeWidth={1.2}/>
                      {!b.responsavelId && (
                        <circle cx={x} cy={y} r={10} fill="none" stroke="#dc2626" strokeWidth={1} strokeDasharray="2 2">
                          {demoMode && <animate attributeName="r" values="10;13;10" dur="2s" repeatCount="indefinite"/>}
                        </circle>
                      )}
                    </g>
                  );
                })}
                <text x={m.cx} y={m.cy + m.r + 14} textAnchor="middle" fontSize="11" fontWeight="700" fill="var(--fg-strong)">{m.nome}</text>
                <text x={m.cx} y={m.cy + m.r + 26} textAnchor="middle" fontSize="9.5" fill="var(--fg-dim)">score {mun.score} · {Math.round(mun.cadastrados/1000)}k cadastros</text>
              </g>
            );
          })}

          {/* Crosshair label */}
          <text x="40" y="40" fontSize="10.5" fontWeight="600" fill="var(--fg-dim)" letterSpacing="0.1em">MAPA ESQUEMÁTICO · BA · recôncavo</text>
          <text x="40" y="560" fontSize="9" fill="var(--fg-faint)" fontFamily="JetBrains Mono">zoom 1:80k  ·  {allBairros.length} micro-cercas  ·  {allMuns.filter(m => !m.responsavelId).length + allBairros.filter(b => !b.responsavelId).length} sem responsável</text>
        </svg>

        {/* hover tooltip */}
        {hovered && !selected && (
          <div className="absolute top-24 right-6 p-3 rounded-lg pointer-events-none" style={{ background: "var(--bg-card)", border: "1px solid var(--rule-strong)", boxShadow: "0 8px 20px rgba(0,0,0,0.12)", width: 220 }}>
            <div className="text-[10px] t-fg-dim uppercase tracking-wider font-semibold">{hovered.nivel}</div>
            <div className="text-[14px] font-bold t-fg-strong">{hovered.nome}</div>
            <div className="text-[11px] t-fg-muted mb-2">{hovered.responsavel}</div>
            <div className="grid grid-cols-2 gap-1 text-[10.5px]">
              <div><span className="t-fg-dim">Score</span> <b className="tnum">{hovered.score}</b></div>
              <div><span className="t-fg-dim">Eng.</span> <b className="tnum">{hovered.engajamento}%</b></div>
              <div><span className="t-fg-dim">Meta</span> <b className="tnum">{hovered.meta.toLocaleString("pt-BR")}</b></div>
              <div><span className="t-fg-dim">Feito</span> <b className="tnum">{hovered.cadastrados.toLocaleString("pt-BR")}</b></div>
            </div>
          </div>
        )}
      </div>

      {/* Right drawer */}
      {selected && (
        <aside className="w-[360px] flex-shrink-0 border-l overflow-y-auto thin-scroll" style={{ borderColor: "var(--rule)", background: "var(--bg-card)" }}>
          <div className="p-5 border-b" style={{ borderColor: "var(--rule)" }}>
            <div className="flex items-start justify-between gap-2 mb-3">
              <div>
                <div className="card-sub mb-1">{selected.nivel}</div>
                <div className="text-[20px] font-black font-display t-fg-strong">{selected.nome}</div>
              </div>
              <button className="btn-ghost" onClick={() => setSelected(null)} style={{ padding: "5px 7px" }}><CIcon name="X" size={11}/></button>
            </div>
            <div className="flex items-center gap-2">
              <StatusDot status={selected.status}/>
              <span className="text-[11px] t-fg-muted capitalize">{selected.status}</span>
              <span className="text-[11px] t-fg-faint">·</span>
              <span className="text-[11px] t-fg-muted">Resp. {selected.responsavel}</span>
            </div>
          </div>

          <div className="p-5 grid grid-cols-2 gap-3 border-b" style={{ borderColor: "var(--rule)" }}>
            <MiniStat label="Score overall"   value={selected.score}                color={selected.score >= 70 ? "var(--ok)" : selected.score >= 50 ? "var(--warn)" : "var(--danger)"}/>
            <MiniStat label="Engajamento"     value={`${selected.engajamento}%`}/>
            <MiniStat label="Cadastros"       value={selected.cadastrados.toLocaleString("pt-BR")}/>
            <MiniStat label="Meta"            value={selected.meta.toLocaleString("pt-BR")}/>
          </div>

          <div className="p-5 border-b" style={{ borderColor: "var(--rule)" }}>
            <div className="card-sub mb-2">Progresso de cadastro</div>
            <ProgressBar value={(selected.cadastrados / selected.meta) * 100}
                         color={(selected.cadastrados / selected.meta) > 0.7 ? "var(--ok)" : (selected.cadastrados / selected.meta) > 0.4 ? "var(--warn)" : "var(--danger)"}
                         height={8}/>
            <div className="flex justify-between mt-1 text-[10.5px] t-fg-dim">
              <span className="tnum">{Math.round((selected.cadastrados / selected.meta) * 100)}%</span>
              <span>{(selected.meta - selected.cadastrados).toLocaleString("pt-BR")} faltando</span>
            </div>
          </div>

          {selected.filhas && selected.filhas.length > 0 && (
            <div className="p-5 border-b" style={{ borderColor: "var(--rule)" }}>
              <div className="card-sub mb-2">Bairros · {selected.filhas.length}</div>
              <div className="space-y-1.5">
                {selected.filhas.map(b => (
                  <div key={b.id} className="flex items-center gap-2 py-1.5">
                    <StatusDot status={b.status}/>
                    <div className="flex-1 min-w-0">
                      <div className="text-[11.5px] font-semibold t-fg-strong">{b.nome}</div>
                      <div className="text-[10px] t-fg-dim">{b.responsavel}</div>
                    </div>
                    <div className="text-[10px] font-bold tnum t-fg-strong">{b.score}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="p-5 space-y-2">
            <button className="btn-primary w-full" style={{ justifyContent: "center" }}>
              <CIcon name="UserPlus" size={12}/>
              Adicionar liderança
            </button>
            <button className="btn-ghost w-full" style={{ justifyContent: "center" }}>
              <CIcon name="MessagesSquare" size={12}/>
              Abrir canal da cerca
            </button>
            <button className="btn-ghost w-full" style={{ justifyContent: "center" }}>
              <CIcon name="FileText" size={12}/>
              Relatório desta cerca
            </button>
          </div>
        </aside>
      )}
    </div>
  );
}

function MapLegend({ layer }) {
  const items = {
    responsavel: [
      { color: "#1d4ed8", label: "Tier ouro" },
      { color: "#9ca3af", label: "Tier prata" },
      { color: "#c2410c", label: "Tier bronze" },
      { color: "#dc2626", label: "Sem responsável" },

}

function MiniStat({ label, value, color }) {
  return (
    <div>
      <div className="text-[9.5px] t-fg-dim uppercase tracking-wider font-semibold mb-0.5">{label}</div>
      <div className="text-[18px] font-black tnum font-display" style={{ color: color || "var(--fg-strong)" }}>{value}</div>
    </div>
  );
}

/* ---------- Tela 4 · Árvore Hierárquica ---------- */
function Tela4Arvore() {
  const [expanded, setExpanded] = React.useState({ "reg-reconcavo": true, "mun-feira": true });
  const toggle = (id) => setExpanded(e => ({ ...e, [id]: !e[id] }));

  const row = (node, depth) => {
    const hasChildren = node.filhas && node.filhas.length > 0;
    const isOpen = expanded[node.id];
    return (
      <React.Fragment key={node.id}>
        <div className="list-row" style={{ gridTemplateColumns: `${depth * 20 + 28}px 24px 1fr 140px 120px 80px 140px 80px`, paddingLeft: 14 + depth * 20 }}>
          <div onClick={() => hasChildren && toggle(node.id)} style={{ cursor: hasChildren ? "pointer" : "default" }}>
            {hasChildren && <CIcon name={isOpen ? "ChevronDown" : "ChevronRight"} size={12} className="t-fg-muted"/>}
          </div>
          <StatusDot status={node.status}/>
          <div className="min-w-0 flex items-center gap-2">
            <CIcon name={node.nivel === "regional" ? "Flag" : node.nivel === "municipio" ? "MapPin" : "Home"} size={12} className="t-fg-dim"/>
            <div className="min-w-0">
              <div className="text-[12.5px] font-semibold t-fg-strong truncate">{node.nome}</div>
              <div className="text-[10px] t-fg-dim uppercase tracking-wider">{node.nivel}</div>
            </div>
          </div>
          <div className="flex items-center gap-2 min-w-0">
            {node.responsavelId ? <Avatar nome={node.responsavel} size={22}/> : <span className="w-[22px] h-[22px] rounded-full flex items-center justify-center" style={{ background: "rgba(220,38,38,0.1)", color: "var(--danger)" }}><CIcon name="AlertTriangle" size={10}/></span>}
            <div className="text-[11.5px] t-fg truncate">{node.responsavel}</div>
          </div>
          <div>
            <ProgressBar value={(node.cadastrados/node.meta)*100} color={(node.cadastrados/node.meta) > 0.7 ? "var(--ok)" : (node.cadastrados/node.meta) > 0.4 ? "var(--warn)" : "var(--danger)"}/>
            <div className="text-[10px] tnum t-fg-dim mt-0.5">{node.cadastrados.toLocaleString("pt-BR")} / {node.meta.toLocaleString("pt-BR")}</div>
          </div>
          <div className="text-[13px] font-bold tnum" style={{ color: node.score >= 70 ? "var(--ok)" : node.score >= 50 ? "var(--warn)" : "var(--danger)" }}>{node.score}</div>
          <div className="text-[11px] tnum t-fg-muted">{node.engajamento}%</div>
          <div className="flex gap-1 justify-end">
            <button className="btn-ghost" style={{ padding: "4px 7px" }}><CIcon name="MessageCircle" size={10}/></button>
            <button className="btn-ghost" style={{ padding: "4px 7px" }}><CIcon name="MoreHorizontal" size={10}/></button>
          </div>
        </div>
        {hasChildren && isOpen && node.filhas.map(c => row(c, depth + 1))}
      </React.Fragment>
    );
  };

  return (
    <div className="p-6 space-y-4" style={{ maxWidth: 1680, margin: "0 auto" }}>
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-[22px] font-black font-display t-fg-strong">Hierarquia da campanha</h1>
          <div className="text-[12px] t-fg-muted mt-0.5">Delegado → Regionais → Territoriais → Bairros · cobertura em tempo real</div>
        </div>
        <div className="flex gap-2">
          <Segment value="operacional" onChange={() => {}} options={[{value:"operacional",label:"Operacional"},{value:"geografica",label:"Geográfica"}]}/>
          <button className="btn-ghost"><CIcon name="Download" size={11}/>Export</button>
          <button className="btn-primary"><CIcon name="Plus" size={11}/>Nova cerca</button>
        </div>
      </div>

      <Card noPadding>
        <div className="list-row" style={{ gridTemplateColumns: "48px 24px 1fr 140px 120px 80px 140px 80px", paddingTop: 8, paddingBottom: 8, background: "var(--bg-card-2)", fontWeight: 600, color: "var(--fg-dim)", fontSize: 10.5, textTransform: "uppercase", letterSpacing: "0.08em" }}>
          <div/><div/><div>Cerca</div><div>Responsável</div><div>Cadastro</div><div>Score</div><div>Engaj.</div><div className="text-right">Ações</div>
        </div>
        {CERCAS.map(n => row(n, 0))}
      </Card>

      <div className="grid grid-cols-4 gap-4">
        <StatCard label="Regionais" value="3" sub="1 vaga" tone="warn"/>
        <StatCard label="Territoriais" value="8" sub="1 vaga" tone="warn"/>
        <StatCard label="Bairros" value="11" sub="2 vagos" tone="danger"/>
        <StatCard label="Cobertura total" value="74%" sub="meta 90%" tone="ok"/>
      </div>
    </div>
  );
}

function StatCard({ label, value, sub, tone }) {
  const color = tone === "ok" ? "var(--ok)" : tone === "warn" ? "var(--warn)" : tone === "danger" ? "var(--danger)" : "var(--fg-strong)";
  return (
    <div className="card p-4">
      <div className="text-[10px] t-fg-dim uppercase tracking-wider font-semibold mb-1.5">{label}</div>
      <div className="text-[26px] font-black tnum font-display" style={{ color }}>{value}</div>
      <div className="text-[10.5px] t-fg-muted mt-0.5">{sub}</div>
    </div>
  );
}

/* ---------- Tela 5 · Cadastro de Lideranças ---------- */
function Tela5Cadastro() {
  const [q, setQ] = React.useState("");
  const [filtro, setFiltro] = React.useState("todos");
  const [editing, setEditing] = React.useState(null);

  const filtered = LIDERANCAS.filter(l => {
    if (filtro === "vagas") return false;
    if (filtro === "ouro" && l.tier !== "ouro") return false;
    if (filtro === "mulher" && !l.tags.includes("Mulher")) return false;
    if (q && !(l.nome.toLowerCase().includes(q.toLowerCase()) || l.cidade.toLowerCase().includes(q.toLowerCase()))) return false;
    return true;
  });

  return (
    <div className="p-6" style={{ maxWidth: 1680, margin: "0 auto" }}>
      <div className="grid grid-cols-[1fr_400px] gap-4">
        <div className="space-y-4">
          <div className="flex items-center justify-between gap-3">
            <div>
              <h1 className="text-[22px] font-black font-display t-fg-strong">Lideranças</h1>
              <div className="text-[12px] t-fg-muted mt-0.5">{filtered.length} de {LIDERANCAS.length} · cadastros, tiers, cercas</div>
            </div>
            <div className="flex gap-2">
              <div className="flex items-center gap-2 px-3 h-[34px] rounded-md" style={{ background: "var(--rule)", width: 260 }}>
                <CIcon name="Search" size={12} className="t-fg-dim"/>
                <input value={q} onChange={e => setQ(e.target.value)} placeholder="Buscar por nome ou cidade…" className="flex-1 bg-transparent outline-none text-[12px]" style={{ color: "var(--fg)" }}/>
              </div>
              <Segment value={filtro} onChange={setFiltro} options={[{value:"todos",label:"Todos"},{value:"ouro",label:"Ouro"},{value:"mulher",label:"Mulheres"}]}/>
              <button className="btn-primary"><CIcon name="UserPlus" size={11}/>Cadastrar</button>
            </div>
          </div>

          <Card noPadding>
            <div className="list-row" style={{ gridTemplateColumns: "1fr 140px 140px 80px 100px 80px", paddingTop: 8, paddingBottom: 8, background: "var(--bg-card-2)", fontWeight: 600, color: "var(--fg-dim)", fontSize: 10.5, textTransform: "uppercase", letterSpacing: "0.08em" }}>
              <div>Nome</div><div>Papel</div><div>Cerca</div><div>Tier</div><div className="text-right">Influência</div><div className="text-right">Score</div>
            </div>
            {filtered.map(l => (
              <div key={l.id} className="list-row" style={{ gridTemplateColumns: "1fr 140px 140px 80px 100px 80px", cursor: "pointer" }} onClick={() => setEditing(l)}>
                <div className="flex items-center gap-3 min-w-0">
                  <Avatar nome={l.nome} size={30}/>
                  <div className="min-w-0">
                    <div className="text-[12.5px] font-semibold t-fg-strong truncate">{l.nome}</div>
                    <div className="text-[10.5px] t-fg-dim truncate">{l.cidade} · {l.tags.join(" · ")}</div>
                  </div>
                </div>
                <div className="text-[11.5px] t-fg-muted truncate">{l.papel}</div>
                <div className="text-[11.5px] t-fg-muted truncate">{l.cerca || "—"}</div>
                <div><TierPill tier={l.tier}/></div>
                <div className="text-[11.5px] tnum t-fg text-right">{l.eleitoresInfluenciados.toLocaleString("pt-BR")}</div>
                <div className="text-[13px] font-bold tnum text-right" style={{ color: l.score >= 80 ? "var(--ok)" : l.score >= 60 ? "var(--warn)" : "var(--danger)" }}>{l.score}</div>
              </div>
            ))}
          </Card>
        </div>

        {/* Formulário lateral (ou Edit pane) */}
        <Card title={editing ? "Editar liderança" : "Cadastrar liderança"} sub={editing ? editing.nome : "Formulário rápido"}
              right={editing && <button className="btn-ghost" onClick={() => setEditing(null)} style={{ padding: "5px 7px" }}><CIcon name="X" size={11}/></button>}>
          <div className="space-y-3">
            {[
              { label: "Nome completo",     val: editing?.nome || "",       ph: "Ex: Rita Lima" },
              { label: "Papel",             val: editing?.papel || "",      ph: "Cabo Eleitoral" },
              { label: "Telefone · WhatsApp",val: editing?.telefone || "",   ph: "(75) 9 ..." },
              { label: "Cidade",            val: editing?.cidade || "",     ph: "Feira de Santana" },
              { label: "Cerca",             val: editing?.cerca || "",      ph: "Tomba" },
            ].map((f, i) => (
              <Field key={i} label={f.label}>
                <input defaultValue={f.val} placeholder={f.ph}
                       className="w-full h-[34px] px-3 rounded-md outline-none text-[12.5px]"
                       style={{ background: "var(--rule)", color: "var(--fg)" }}/>
              </Field>
            ))}

            <Field label="Tier">
              <div className="flex gap-1.5">
                {["ouro","prata","bronze"].map(t => (
                  <button key={t} className={`btn-ghost ${editing?.tier === t ? "active" : ""}`} style={{ flex: 1, justifyContent: "center", padding: "7px 8px" }}>{t.toUpperCase()}</button>
                ))}
              </div>
            </Field>

            <Field label="Tags">
              <div className="flex flex-wrap gap-1.5">
                {["Mulher","Jovem","Idoso","Religioso","Comunidade","Destaque","Atenção"].map(t => {
                  const on = editing?.tags?.includes(t);
                  return <span key={t} className={`chip ${on ? "chip-blue" : "chip-gray"}`} style={{ cursor: "pointer" }}>{t}</span>;
                })}
              </div>
            </Field>

            <div className="flex gap-2 pt-2">
              <button className="btn-primary flex-1" style={{ justifyContent: "center" }}>
                <CIcon name="CheckCircle" size={12}/>
                Salvar
              </button>
              <button className="btn-ghost" style={{ padding: "8px 12px" }}>Cancelar</button>
            </div>
          </div>
        </Card>
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div>
      <div className="text-[10px] t-fg-dim uppercase tracking-wider font-semibold mb-1.5">{label}</div>
      {children}
    </div>
  );
}

            <div className="flex items-center gap-2">
              <div className="text-[13px] font-bold t-fg-strong">{canal.nome}</div>
              {canal.furtivo && <span className="chip chip-amber"><CIcon name="Lock" size={9}/>FURTIVO</span>}

        <div className="flex-shrink-0 px-5 py-3 border-t" style={{ borderColor: "var(--rule)", background: "var(--bg-card)" }}>
          {furtivo && (
            <div className="mb-2 px-3 py-1.5 rounded-md text-[10.5px] flex items-center gap-2" style={{ background: "rgba(217,119,6,0.08)", color: "var(--warn)", border: "1px solid rgba(217,119,6,0.2)" }}>
              <CIcon name="Clock" size={10}/>

            </div>

          <div className="flex items-end gap-2">
            <button className="btn-ghost" style={{ padding: "8px" }}><CIcon name="Paperclip" size={12}/></button>
            <textarea rows={1} placeholder="Escrever mensagem segura…" className="flex-1 resize-none rounded-md px-3 py-2 text-[12.5px] outline-none"
                      style={{ background: "var(--rule)", color: "var(--fg)", minHeight: 36, maxHeight: 120 }}/>
            <button className="btn-primary" style={{ padding: "8px 14px" }}>

}

/* ---------- Tela 8 · Ranking + Heatmap ---------- */
function Tela8Ranking() {

                    </div>

            <Card title="Gamificação" sub="Regras ativas">

                {[

                  { icon: "Star",   t: "+5 pt",  d: "por liderança com tag Destaque" },
                  { icon: "Heart",  t: "+2 pt",  d: "por contato ativo (WhatsApp ≤ 7d)" },
                  { icon: "Target", t: "+20 pt", d: "por cerca 100% da meta" },

      {view === "heatmap" && (
        <Card title="Engajamento diário por cerca" sub="12 semanas · darker = mais engajamento">

            <div/>
            {Array.from({ length: 84 }, (_, i) => (
              <div key={i} className="text-center t-fg-faint" style={{ fontSize: 8, visibility: i % 7 === 0 ? "visible" : "hidden" }}>W{Math.floor(i/7) + 1}</div>
            ))}
            {HEATMAP_CERCAS.map(c => (
              <React.Fragment key={c.nome}>
                <div className="text-[10.5px] t-fg-strong font-semibold py-0.5 truncate">{c.nome}</div>
                {c.dias.map((v, d) => (
                  <div key={d} title={`${c.nome} · ${v}%`}
                       style={{ height: 14, borderRadius: 2,
                                background: `rgba(29, 78, 216, ${Math.max(0.05, v/100)})`,
                                border: v < 20 ? "1px solid rgba(220,38,38,0.4)" : "none" }}/>
                ))}
              </React.Fragment>

          <div className="flex items-center gap-3 mt-4 text-[10.5px] t-fg-dim">

            {[0.1, 0.3, 0.5, 0.7, 0.9].map(op => <span key={op} style={{ width: 18, height: 12, background: `rgba(29, 78, 216, ${op})`, borderRadius: 2 }}/>)}
            <span>Alto</span>

}

Object.assign(window, { Tela4Arvore, Tela5Cadastro, Tela6CRM, Tela7Chat, Tela8Ranking });


</script>

<!-- App + boot -->
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

function TweaksPanel({ state, setState, visible, onClose }) {
  if (!visible) return null;
  const set = (k, v) => {
    const next = { ...state, [k]: v };
    setState(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };
  return (
    <div className="tweak-panel">
      <div className="flex items-center justify-between mb-3">
        <div>
          <div className="text-[10px] t-fg-dim uppercase tracking-[0.14em] font-semibold">Tweaks</div>
          <div className="text-[14px] font-bold t-fg-strong">Configuração</div>
        </div>
        <button onClick={onClose} className="btn-ghost" style={{ padding: "5px 7px" }}>
          <window.CIcon name="X" size={11}/>
        </button>
      </div>

      <div className="space-y-3 text-[11.5px]">
        <Tweak label="Tenant (white-label)">
          {[["uniao","UB"],["mazzel","MZ"]].map(([k,l]) => (
            <button key={k} onClick={() => set("tenant", k)} className={`btn-ghost ${state.tenant === k ? "active" : ""}`} style={{ flex: 1, justifyContent: "center", padding: "6px 8px" }}>{l}</button>
          ))}
        </Tweak>
        <Tweak label="Persona">
          {[["delegado","Delegado"],["regional","Regional"],["territorial","Territorial"],["cabo","Cabo"]].map(([k,l]) => (
            <button key={k} onClick={() => set("persona", k)} className={`btn-ghost ${state.persona === k ? "active" : ""}`} style={{ flex: 1, justifyContent: "center", padding: "5px 4px", fontSize: 10 }}>{l}</button>
          ))}
        </Tweak>
        <Tweak label="Tema">
          {[["light","☀"],["dark","☾"]].map(([k,l]) => (
            <button key={k} onClick={() => set("theme", k)} className={`btn-ghost ${state.theme === k ? "active" : ""}`} style={{ flex: 1, justifyContent: "center", padding: "6px 8px" }}>{l}</button>
          ))}
        </Tweak>
        <Tweak label="Cor das cercas">
          {[["responsavel","Responsável"],["score","Score"]].map(([k,l]) => (
            <button key={k} onClick={() => set("corCerca", k)} className={`btn-ghost ${state.corCerca === k ? "active" : ""}`} style={{ flex: 1, justifyContent: "center", padding: "6px 8px", fontSize: 10.5 }}>{l}</button>
          ))}
        </Tweak>
        <Tweak label="Chat padrão">
          {[["aberto","Aberto"],["furtivo","Furtivo"]].map(([k,l]) => (
            <button key={k} onClick={() => set("furtivoDefault", k)} className={`btn-ghost ${state.furtivoDefault === k ? "active" : ""}`} style={{ flex: 1, justifyContent: "center", padding: "6px 8px", fontSize: 10.5 }}>{l}</button>
          ))}
        </Tweak>
        <Tweak label="Modo demo">
          <button onClick={() => set("modoDemo", !state.modoDemo)} className={`btn-ghost ${state.modoDemo ? "active" : ""}`} style={{ flex: 1, justifyContent: "center", padding: "6px 10px" }}>
            {state.modoDemo ? "ON · animações" : "OFF"}
          </button>
        </Tweak>
      </div>
    </div>
  );
}
function Tweak({ label, children }) {
  return (
    <div>
      <div className="text-[10px] t-fg-dim uppercase tracking-wider font-semibold mb-1.5">{label}</div>
      <div className="flex gap-1.5">{children}</div>
    </div>
  );
}

/* Cmd+K palette stub */
function CmdK({ visible, onClose, onNavigate }) {
  if (!visible) return null;
  const items = [
    ...(window.CAMP_SCREENS || []).map(s => ({ type: "Tela", label: s.label, id: s.id })),
    ...(window.CAMPANHAS || []).slice(0, 3).map(c => ({ type: "Campanha", label: c.candidato, id: "hub" })),
    ...(window.CERCAS || []).flatMap(c => c.filhas || []).slice(0, 5).map(c => ({ type: "Cerca", label: c.nome, id: "mapa" })),
    ...(window.LIDERANCAS || []).slice(0, 5).map(l => ({ type: "Liderança", label: l.nome, id: "cadastro" })),
  ];
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", backdropFilter: "blur(4px)", zIndex: 100, display: "flex", alignItems: "flex-start", justifyContent: "center", paddingTop: "14vh" }}>
      <div onClick={e => e.stopPropagation()} style={{ width: 600, maxWidth: "92vw", background: "var(--bg-elevated)", border: "1px solid var(--rule-strong)", borderRadius: 12, overflow: "hidden", boxShadow: "0 40px 80px -20px rgba(0,0,0,0.6)" }}>
        <div className="flex items-center gap-2 px-4 py-3 border-b" style={{ borderColor: "var(--rule)" }}>
          <window.CIcon name="Search" size={14} className="t-fg-dim"/>
          <input autoFocus placeholder="Buscar cercas, lideranças, campanhas, telas…" className="flex-1 bg-transparent outline-none text-[13px]" style={{ color: "var(--fg)" }}/>
          <span className="kbd" style={{ background: "var(--kbd-bg)", color: "var(--kbd-fg)" }}>ESC</span>
        </div>
        <div className="max-h-[50vh] overflow-y-auto thin-scroll">
          {items.map((it, i) => (
            <div key={i} onClick={() => { onNavigate(it.id); onClose(); }} className="flex items-center gap-3 px-4 py-2.5 cursor-pointer" style={{ borderBottom: "1px solid var(--rule)" }}
                 onMouseEnter={e => e.currentTarget.style.background = "var(--chart-hover)"}
                 onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
              <span className="chip chip-gray" style={{ height: 18, fontSize: 9.5, minWidth: 70, justifyContent: "center" }}>{it.type}</span>
              <span className="text-[12.5px] t-fg-strong flex-1">{it.label}</span>
              <window.CIcon name="ArrowRight" size={11} className="t-fg-dim"/>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [state, setState] = useState(() => ({
    ...window.TWEAK_DEFAULTS,
    ...(JSON.parse(localStorage.getItem("mazzel-campanha-v1") || "{}"))
  }));
  const [screen, setScreen] = useState(() => localStorage.getItem("mazzel-camp-screen") || "hub");
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [cmdkVisible, setCmdkVisible] = useState(false);

  /* persist */
  useEffect(() => { localStorage.setItem("mazzel-campanha-v1", JSON.stringify(state)); }, [state]);
  useEffect(() => { localStorage.setItem("mazzel-camp-screen", screen); }, [screen]);

  /* theme + tenant */
  useEffect(() => {
    document.documentElement.setAttribute("data-theme", state.theme);
    const t = window.TENANTS_CAMP[state.tenant];
    document.documentElement.style.setProperty("--tenant-primary", t.primary);
    document.documentElement.style.setProperty("--tenant-primary-rgb", t.primaryRgb);
    document.documentElement.style.setProperty("--tenant-accent", t.accent);
  }, [state.theme, state.tenant]);

  /* Tweaks bridge */
  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  /* Cmd+K */
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") { e.preventDefault(); setCmdkVisible(true); }
      if (e.key === "Escape") { setCmdkVisible(false); }
    };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, []);

  const persona = window.CAMPANHA_PERSONAS[state.persona];

  const screenTitle = window.CAMP_SCREENS.find(s => s.id === screen)?.label || "Campanha";
  const breadcrumbs = ["Mazzel", "Campanha 2026", screenTitle];

  const renderScreen = () => {
    switch (screen) {
      case "hub":      return <window.Tela1Hub persona={persona} tenant={state.tenant} demoMode={state.modoDemo} densidade={state.densidade}/>;
      case "mapa":     return <window.Tela2Mapa demoMode={state.modoDemo} corCerca={state.corCerca}/>;
      case "arvore":   return <window.Tela4Arvore/>;
      case "cadastro": return <window.Tela5Cadastro/>;
      case "crm":      return <window.Tela6CRM/>;
      case "chat":     return <window.Tela7Chat modoFurtivoDefault={state.furtivoDefault}/>;
      case "ranking":  return <window.Tela8Ranking/>;
      default:         return <window.Tela1Hub persona={persona} tenant={state.tenant}/>;
    }
  };

  const fillMap = screen === "mapa" || screen === "chat";

  return (
    <>
      <div className="shell-body">
        <window.CSidebar tenant={state.tenant} activeModule="campanha" onNavigate={() => {}}/>
        <main className="shell-main">
          <window.CTopbar tenant={state.tenant} personaLabel={persona.label} breadcrumbs={breadcrumbs} onOpenCmdk={() => setCmdkVisible(true)}/>
          <window.CampSubNav screen={screen} onChange={setScreen} persona={persona}/>
          <div className={fillMap ? "main-scroll" : "main-scroll bg-page-grad"} style={fillMap ? { padding: 0, overflow: "hidden" } : undefined}>
            {renderScreen()}
          </div>
        </main>
      </div>

      <TweaksPanel state={state} setState={setState} visible={tweaksVisible} onClose={() => setTweaksVisible(false)}/>
      <CmdK visible={cmdkVisible} onClose={() => setCmdkVisible(false)} onNavigate={setScreen}/>
    </>
  );
}

/* boot: poll until all babel-transpiled modules have exposed their exports on window */
(function boot(tries) {
  const ready = window.CAMPANHA_PERSONAS && window.TENANTS_CAMP && window.CAMP_SCREENS
             && window.CSidebar && window.CTopbar && window.CampSubNav && window.CIcon
             && window.Tela1Hub && window.Tela2Mapa && window.Tela4Arvore
             && window.Tela5Cadastro && window.Tela6CRM && window.Tela7Chat && window.Tela8Ranking
             && window.CAMPANHAS && window.LIDERANCAS && window.CERCAS;
  if (!ready) {
    if (tries > 200) {
      document.getElementById("root").innerHTML = '<div style="padding:40px;font-family:monospace;color:#f87171">Timeout: módulos não carregaram.</div>';
      return;
    }
    return setTimeout(() => boot(tries + 1), 30);
  }
  try {
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  } catch (e) {
    document.getElementById("root").innerHTML = '<div style="padding:40px;font-family:monospace;color:#f87171;background:#0a0a0b;height:100vh;white-space:pre-wrap">' + (e.stack || e.message) + '</div>';
    console.error(e);
  }
})(0);
</script>
</body>
