<style>
/* Theme tokens (subset, sufficient for this module) */
:root, [data-theme="dark"] {
  --bg-page: #0a0a0b; --bg-page-2: #0c0c0e;
  --bg-card: #0e0e11; --bg-card-2: rgba(255,255,255,0.015);
  --bg-sidebar: #0b0b0d; --bg-topbar: #09090b;
  --bg-elevated: #131316;
  --fg: #e4e4e7; --fg-strong: #ffffff; --fg-muted: #a1a1aa;
  --fg-dim: #71717a; --fg-faint: #52525b; --fg-ghost: #3f3f46;
  --rule: rgba(255,255,255,0.06); --rule-strong: rgba(255,255,255,0.10);
  --accent-blue: #93c5fd; --accent-blue-strong: #60a5fa;
  --overall-from: #ffffff; --overall-to: #d4d4d8;
  --ok: #34d399; --warn: #fbbf24; --danger: #f87171;
  --chart-hover: rgba(255,255,255,0.06);
  --kbd-bg: rgba(255,255,255,0.08); --kbd-fg: #d4d4d8;
  --page-grad-1: rgba(59,130,246,0.06); --page-grad-2: rgba(168,85,247,0.04);
}
[data-theme="light"] {
  --bg-page: #f4f4f5; --bg-page-2: #fafafa;
  --bg-card: #ffffff; --bg-card-2: rgba(0,0,0,0.02);
  --bg-sidebar: #fafafa; --bg-topbar: #ffffff;
  --bg-elevated: #ffffff;
  --fg: #18181b; --fg-strong: #09090b; --fg-muted: #52525b;
  --fg-dim: #71717a; --fg-faint: #a1a1aa; --fg-ghost: #d4d4d8;
  --rule: rgba(0,0,0,0.06); --rule-strong: rgba(0,0,0,0.10);
  --accent-blue: #1d4ed8; --accent-blue-strong: #1e40af;
  --overall-from: #09090b; --overall-to: #3f3f46;
  --ok: #059669; --warn: #d97706; --danger: #dc2626;
  --chart-hover: rgba(0,0,0,0.04);
  --kbd-bg: rgba(0,0,0,0.06); --kbd-fg: #18181b;
  --page-grad-1: rgba(59,130,246,0.05); --page-grad-2: rgba(168,85,247,0.04);
}
:root {
  --tenant-primary: #002A7B; --tenant-primary-rgb: 0, 42, 123; --tenant-accent: #FFCC00;
}

html, body { background: var(--bg-page); color: var(--fg); }
body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
.tnum { font-variant-numeric: tabular-nums; font-feature-settings: "tnum","cv11"; }
.font-display { letter-spacing: -0.02em; }
.font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

.t-fg{color:var(--fg)} .t-fg-strong{color:var(--fg-strong)} .t-fg-muted{color:var(--fg-muted)}
.t-fg-dim{color:var(--fg-dim)} .t-fg-faint{color:var(--fg-faint)} .t-fg-ghost{color:var(--fg-ghost)}
.t-accent{color:var(--accent-blue)} .t-ok{color:var(--ok)} .t-warn{color:var(--warn)} .t-danger{color:var(--danger)}
.t-bg-card{background:var(--bg-card)}
.ring-soft { box-shadow: inset 0 0 0 1px var(--rule); }
.bg-page-grad {
  background:
    radial-gradient(1200px 600px at 85% -10%, var(--page-grad-1), transparent 60%),
    radial-gradient(800px 400px at 10% 0%, var(--page-grad-2), transparent 60%),
    var(--bg-page);
}

/* chips */
.chip { display: inline-flex; align-items: center; gap: 4px; padding: 0 8px; height: 20px; border-radius: 999px; font-size: 10.5px; font-weight: 700; white-space: nowrap; letter-spacing: 0.02em; }
.chip-blue   { background: rgba(37,99,235,0.10);  color: #1d4ed8; box-shadow: inset 0 0 0 1px rgba(37,99,235,0.30); }
.chip-green  { background: rgba(22,163,74,0.10);  color: #15803d; box-shadow: inset 0 0 0 1px rgba(22,163,74,0.28); }
.chip-amber  { background: rgba(217,119,6,0.10);  color: #a16207; box-shadow: inset 0 0 0 1px rgba(217,119,6,0.35); }
.chip-red    { background: rgba(220,38,38,0.10);  color: #b91c1c; box-shadow: inset 0 0 0 1px rgba(220,38,38,0.40); }
.chip-gray, .chip-neutral   { background: rgba(82,82,91,0.06);  color: #52525b; box-shadow: inset 0 0 0 1px rgba(82,82,91,0.18); }
.chip-violet { background: rgba(147,51,234,0.10); color: #7e22ce; box-shadow: inset 0 0 0 1px rgba(147,51,234,0.30); }
[data-theme="dark"] .chip-blue   { background: rgba(59,130,246,0.12); color: #93c5fd; box-shadow: inset 0 0 0 1px rgba(59,130,246,0.25); }
[data-theme="dark"] .chip-green  { background: rgba(34,197,94,0.10); color: #86efac; box-shadow: inset 0 0 0 1px rgba(34,197,94,0.22); }
[data-theme="dark"] .chip-amber  { background: rgba(251,191,36,0.12); color: #fcd34d; box-shadow: inset 0 0 0 1px rgba(251,191,36,0.30); }
[data-theme="dark"] .chip-red    { background: rgba(239,68,68,0.12); color: #fca5a5; box-shadow: inset 0 0 0 1px rgba(239,68,68,0.35); }
[data-theme="dark"] .chip-gray,[data-theme="dark"] .chip-neutral { background: rgba(161,161,170,0.08); color: #a1a1aa; box-shadow: inset 0 0 0 1px rgba(161,161,170,0.15); }
[data-theme="dark"] .chip-violet { background: rgba(168,85,247,0.12); color: #d8b4fe; box-shadow: inset 0 0 0 1px rgba(168,85,247,0.25); }

/* kbd */
.kbd { display: inline-flex; align-items: center; justify-content: center; padding: 1px 5px; min-width: 16px; height: 18px; border-radius: 3px; font: 600 10px/1 'JetBrains Mono', monospace; }

/* nav */
.nav-item { display: flex; align-items: center; gap: 10px; padding: 7px 12px 7px 14px; border-left: 2px solid transparent; font: 500 13px/1.2 Inter, sans-serif; color: var(--fg-muted); cursor: pointer; transition: color .15s, border-color .15s, background .15s; text-decoration: none; }
.nav-item:hover { color: var(--fg); }
.nav-item.active { color: var(--fg-strong); border-left-color: var(--tenant-primary); background: linear-gradient(90deg, rgba(var(--tenant-primary-rgb), 0.14) 0%, transparent 100%); }

/* buttons */
.btn-ghost { padding: 6px 10px; border-radius: 6px; font: 600 11px/1 Inter, sans-serif; background: var(--rule); color: var(--fg); cursor: pointer; transition: background .12s, color .12s; border: 1px solid transparent; display: inline-flex; align-items: center; gap: 6px; }
.btn-ghost:hover { background: var(--rule-strong); color: var(--fg-strong); }
.btn-ghost.active { background: var(--fg-strong); color: var(--bg-card); }
.btn-primary { padding: 7px 12px; border-radius: 6px; font: 700 12px/1 Inter, sans-serif; background: var(--tenant-primary); color: #fff; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 6px; box-shadow: 0 1px 0 rgba(255,255,255,0.15) inset, 0 4px 12px -4px rgba(var(--tenant-primary-rgb), 0.4); }
.btn-primary:hover { filter: brightness(1.1); }

/* shell */
.shell { height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
.shell-body { display: grid; grid-template-columns: 224px 1fr; min-height: 0; flex: 1; }
.shell-main { overflow: hidden; background: var(--bg-page); min-width: 0; display: flex; flex-direction: column; }
.shell-main > .main-scroll { flex: 1; overflow: auto; min-height: 0; }

/* sidebar */
.sidebar-col { background: var(--bg-sidebar); border-right: 1px solid var(--rule); display: flex; flex-direction: column; overflow: hidden; }

/* topbar */
.topbar { height: 48px; background: var(--bg-topbar); border-bottom: 1px solid var(--rule); display: flex; align-items: center; padding: 0 16px; gap: 16px; flex-shrink: 0; }
.topbar > * { flex-shrink: 0; }
.topbar .breadcrumb { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.search-cmdk { width: 440px; max-width: 50%; height: 30px; border-radius: 6px; background: var(--rule); display: flex; align-items: center; gap: 8px; padding: 0 10px; cursor: pointer; transition: background .12s; }
.search-cmdk:hover { background: var(--rule-strong); }

/* KPI */
.kpi-card { background: var(--bg-card); border: 1px solid var(--rule); border-radius: 12px; padding: 18px 20px 14px; position: relative; overflow: hidden; min-width: 0; }
.kpi-card .tnum { white-space: nowrap; }

/* Tweaks panel */
.tweak-panel { position: fixed; bottom: 18px; right: 18px; width: 320px; z-index: 80; background: var(--bg-elevated); border: 1px solid var(--rule-strong); border-radius: 12px; padding: 14px 16px; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6); }

/* thin-scroll */
.thin-scroll { scrollbar-width: thin; scrollbar-color: var(--rule-strong) transparent; }
.thin-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
.thin-scroll::-webkit-scrollbar-thumb { background: var(--rule-strong); border-radius: 999px; }

/* Theme-aware utility classes for Tela6Comando */
.bg-theme-card { background: var(--bg-card); border: 1px solid var(--rule); }
.bg-theme-rule { background: var(--rule); color: var(--fg); }
.bg-theme-rule:hover { background: var(--rule-strong); }
.hover-theme-rule-strong:hover { background: var(--rule-strong); }
</style>
<style>
/* =========================================================================
 * Campanha · tweaks de estilo em CSS puro
 * ========================================================================= */

/* densidade confortável → padding padrão
   densidade compacta    → reduz espaços em cards e listas */
[data-density="compacto"] .kpi-card { padding: 14px 16px 10px; }
[data-density="compacto"] .chip { height: 18px; font-size: 10px; }

/* buttons hover smoothing */
.btn-ghost, .btn-primary { transition: all .15s ease; }

/* Tela-específicas */
.camp-hero {
  position: relative;
  border-radius: 16px;
  overflow: hidden;
  background: linear-gradient(135deg, var(--tenant-primary) 0%, color-mix(in oklab, var(--tenant-primary) 75%, black) 100%);
  color: #fff;
}
.camp-hero::before {
  content: "";
  position: absolute; inset: 0;
  background:
    radial-gradient(600px 300px at 90% -10%, rgba(255,255,255,0.12), transparent 60%),
    radial-gradient(400px 200px at 10% 110%, rgba(255,255,255,0.08), transparent 60%);
  pointer-events: none;
}

/* Segment control */
.seg { display: inline-flex; padding: 2px; border-radius: 7px; background: var(--rule); gap: 2px; }
.seg-item { padding: 5px 10px; border-radius: 5px; font: 600 11px/1 Inter,sans-serif; color: var(--fg-muted); cursor: pointer; border: none; background: transparent; white-space: nowrap; }
.seg-item:hover { color: var(--fg); }
.seg-item.active { background: var(--bg-card); color: var(--fg-strong); box-shadow: 0 1px 2px rgba(0,0,0,0.08); }

/* list-row */
.list-row { display: grid; align-items: center; gap: 12px; padding: 9px 14px; border-bottom: 1px solid var(--rule); transition: background .1s; }
.list-row:hover { background: var(--chart-hover); }
.list-row:last-child { border-bottom: 0; }

/* cards */
.card { background: var(--bg-card); border: 1px solid var(--rule); border-radius: 12px; }
.card-header { padding: 14px 18px 10px; border-bottom: 1px solid var(--rule); display: flex; align-items: center; gap: 12px; }
.card-title { font: 700 13px/1.2 Inter,sans-serif; color: var(--fg-strong); letter-spacing: -0.005em; }
.card-sub   { font: 500 10.5px/1.2 Inter,sans-serif; color: var(--fg-dim); letter-spacing: 0.05em; text-transform: uppercase; }

/* sparkline colors */
.spark-up   { stroke: var(--ok); }
.spark-down { stroke: var(--danger); }
.spark-flat { stroke: var(--fg-dim); }

/* pills for tier */
.tier-ouro   { background: linear-gradient(135deg, #fde68a, #f59e0b); color: #78350f; }
.tier-prata  { background: linear-gradient(135deg, #e5e7eb, #9ca3af); color: #374151; }
.tier-bronze { background: linear-gradient(135deg, #fed7aa, #c2410c); color: #7c2d12; }

/* Chat-specific */
.msg-bubble { max-width: 75%; padding: 9px 12px; border-radius: 12px; font-size: 12.5px; line-height: 1.45; }
.msg-me     { background: var(--tenant-primary); color: #fff; border-top-right-radius: 4px; }
.msg-them   { background: var(--rule); color: var(--fg); border-top-left-radius: 4px; }
[data-theme="dark"] .msg-them { background: #1a1a1d; }

</style>
</head>

/* ========================================================================
 * CSidebar — left nav (just this Campanha module in focus)
 * ======================================================================== */
function CSidebar({ tenant, activeModule, onNavigate }) {
  const t = CAMP_TENANTS[tenant];
  const modules = [
    { id: "dash",    label: "Dashboard",       icon: "LayoutDashboard" },
    { id: "mapa",    label: "Mapa eleitoral",  icon: "Map" },
    { id: "radar",   label: "Radar político",  icon: "Target" },
    { id: "dossies", label: "Dossiês",         icon: "FileText" },
    { id: "afiliados",label:"Afiliados",       icon: "Users", badge: "NEW", clickable: true },
    { id: "campanha",label: "Campanha 2026",   icon: "Flag", badge: "LIVE", clickable: true },
    { id: "estudo",  label: "Estudo de caso",  icon: "Sparkles" },
    { id: "ia",      label: "Copiloto IA",     icon: "MessageCircle" },
    { id: "alertas", label: "Alertas",         icon: "Bell" },
  ];
  return (
    <aside className="sidebar-col">
      <div className="px-4 pt-4 pb-3 flex items-center gap-3" style={{ borderBottom: "1px solid var(--rule)" }}>
        <div className="w-9 h-9 rounded-[10px] flex items-center justify-center font-black text-[13px]"
             style={{ background: `linear-gradient(135deg, ${t.primary}, ${t.primary}cc)`, color: "#fff", boxShadow: "0 4px 12px -2px rgba(0,0,0,0.25)" }}>
          {t.label}
        </div>
        <div className="min-w-0">
          <div className="text-[12.5px] font-bold t-fg-strong truncate">{t.name}</div>
          <div className="text-[9.5px] t-fg-dim uppercase tracking-[0.14em] font-semibold">Plataforma Mazzel</div>
        </div>
      </div>

      <nav className="flex-1 overflow-y-auto thin-scroll pt-3 pb-2">
        <div className="px-4 text-[9.5px] t-fg-dim uppercase tracking-[0.14em] font-semibold mb-2">Módulos</div>
        {modules.map(m => (
          <a key={m.id} href="#" className={`nav-item ${activeModule === m.id ? "active" : ""}`} onClick={e => { e.preventDefault(); if (m.clickable && onNavigate) onNavigate(m.id); }}>
            <CIcon name={m.icon} size={14}/>
            <span className="flex-1 truncate">{m.label}</span>
            {m.badge && <span className="chip chip-green" style={{ height: 16, fontSize: 9, padding: "0 5px" }}>{m.badge}</span>}
          </a>
        ))}
      </nav>

      <div className="p-3 border-t flex items-center gap-2" style={{ borderColor: "var(--rule)" }}>
        <div className="w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold" style={{ background: "var(--rule-strong)", color: "var(--fg-strong)" }}>AM</div>
        <div className="flex-1 min-w-0">
          <div className="text-[11px] font-semibold t-fg-strong truncate">Antonio Mazzel</div>
          <div className="text-[9.5px] t-fg-dim truncate">CEO · Mazzel</div>
        </div>
        <CIcon name="Settings" size={12} className="t-fg-dim"/>
      </div>
    </aside>
  );
}

/* ========================================================================
 * CTopbar
 * ======================================================================== */
function CTopbar({ tenant, personaLabel, breadcrumbs, onOpenCmdk }) {
  return (
    <header className="topbar">
      <div className="breadcrumb flex items-center gap-1.5 text-[12px]">
        {breadcrumbs.map((b, i) => (
          <React.Fragment key={i}>
            {i > 0 && <CIcon name="ChevronRight" size={11} className="t-fg-faint"/>}
            <span className={i === breadcrumbs.length - 1 ? "t-fg-strong font-semibold" : "t-fg-muted"}>{b}</span>
          </React.Fragment>
        ))}
      </div>

      <div className="flex-1"/>

      <div onClick={onOpenCmdk} className="search-cmdk">
        <CIcon name="Search" size={13} className="t-fg-dim"/>
        <span className="text-[12px] t-fg-dim flex-1">Buscar cercas, lideranças, campanhas…</span>
        <span className="kbd" style={{ background: "var(--kbd-bg)", color: "var(--kbd-fg)" }}>⌘K</span>
      </div>

      <button className="btn-ghost" title="Alertas">
        <CIcon name="Bell" size={12}/>
        <span className="w-1.5 h-1.5 rounded-full" style={{ background: "var(--danger)" }}/>
      </button>

      <div className="flex items-center gap-2 pl-3" style={{ borderLeft: "1px solid var(--rule)" }}>
        <span className="chip chip-violet">{personaLabel}</span>
        <div className="w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold" style={{ background: "var(--tenant-primary)", color: "#fff" }}>AM</div>
      </div>
    </header>
  );
}

/* ========================================================================
 * Campaign sub-nav (horizontal tab strip under topbar)
 * ======================================================================== */
function CampSubNav({ screen, onChange, persona }) {
  return (
    <div className="flex items-center gap-1 px-4 h-11 flex-shrink-0" style={{ background: "var(--bg-topbar)", borderBottom: "1px solid var(--rule)" }}>
      <div className="flex items-center gap-2 mr-3">
        <div className="w-6 h-6 rounded-md flex items-center justify-center" style={{ background: "var(--tenant-primary)", color: "#fff" }}>
          <CIcon name="Flag" size={12}/>
        </div>
        <div>
          <div className="text-[12px] font-bold t-fg-strong leading-none">Campanha 2026</div>
          <div className="text-[9.5px] t-fg-dim uppercase tracking-[0.1em] font-semibold mt-0.5">{persona.scope}</div>
        </div>
      </div>
      <div className="w-px h-5" style={{ background: "var(--rule)" }}/>
      <nav className="flex items-center gap-0.5 ml-2 overflow-x-auto thin-scroll">
        {CAMP_SCREENS.map(s => {
          const active = screen === s.id;
          return (
            <button key={s.id} onClick={() => onChange(s.id)}
              className="flex items-center gap-1.5 px-3 h-7 rounded-md text-[12px] font-semibold transition-colors whitespace-nowrap"
              style={{
                color: active ? "var(--fg-strong)" : "var(--fg-muted)",
                background: active ? "var(--rule-strong)" : "transparent",
              }}
              onMouseEnter={e => { if (!active) e.currentTarget.style.color = "var(--fg)"; }}
              onMouseLeave={e => { if (!active) e.currentTarget.style.color = "var(--fg-muted)"; }}
            >
              <CIcon name={s.icon} size={12}/>
              {s.label}
            </button>
          );
        })}
      </nav>
      <div className="flex-1"/>
      <button className="btn-ghost" style={{ padding: "5px 9px" }}>
        <CIcon name="Download" size={11}/>
        Export
      </button>
    </div>
  );
}

/* export to window scope */
Object.assign(window, {
  CAMP_TENANTS, TENANTS_CAMP, CAMPANHA_PERSONAS, CAMP_SCREENS,
  CIcon, CSidebar, CTopbar, CampSubNav,
});

/* aniversariantes da semana ordenados para CRM */
function proximoAniversario(isoDate, refDate = new Date()) {
  const [y, m, d] = isoDate.split("-").map(Number);
  const thisYear = new Date(refDate.getFullYear(), m - 1, d);
  if (thisYear < new Date(refDate.getFullYear(), refDate.getMonth(), refDate.getDate())) {
    thisYear.setFullYear(refDate.getFullYear() + 1);
  }
  const diffDays = Math.floor((thisYear - new Date(refDate.getFullYear(), refDate.getMonth(), refDate.getDate())) / 86400000);
  return { date: thisYear, diffDays };
}

/* =========================================================================
 * Campanha · Adapter — small utility shims + reusable mini-components
 * ========================================================================= */

/* Sparkline SVG */
function Sparkline({ points, width = 120, height = 32, color = "currentColor", fill = true }) {
  if (!points || !points.length) return null;
  const min = Math.min(...points), max = Math.max(...points);
  const span = max - min || 1;
  const step = width / (points.length - 1);
  const path = points.map((p, i) => `${i === 0 ? "M" : "L"} ${i * step} ${height - ((p - min) / span) * height}`).join(" ");
  const area = `${path} L ${width} ${height} L 0 ${height} Z`;
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ overflow: "visible" }}>
      {fill && <path d={area} fill={color} opacity={0.12}/>}
      <path d={path} fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

/* KPI tile */
function KpiTile({ label, valor, delta, sentiment, sub, sparkPoints, sparkColor, onClick }) {
  const sentimentColor = sentiment === "up" ? "var(--ok)" : sentiment === "down" ? "var(--danger)" : "var(--fg-dim)";
  return (
    <div className="kpi-card" onClick={onClick} style={{ cursor: onClick ? "pointer" : "default" }}>
      <div className="flex items-start justify-between gap-3 mb-3">
        <div className="text-[10.5px] t-fg-dim uppercase tracking-[0.12em] font-semibold">{label}</div>
        {delta && (
          <span className="text-[11px] font-bold tnum flex items-center gap-0.5" style={{ color: sentimentColor }}>
            {sentiment === "up" && <CIcon name="ArrowUp" size={10}/>}
            {sentiment === "down" && <CIcon name="ArrowDown" size={10}/>}
            {delta}
          </span>
        )}
      </div>
      <div className="flex items-end justify-between gap-3">
        <div>
          <div className="text-[28px] font-black tnum font-display leading-none" style={{ background: "linear-gradient(180deg, var(--overall-from), var(--overall-to))", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>{valor}</div>
          {sub && <div className="text-[10.5px] t-fg-muted mt-1.5">{sub}</div>}
        </div>
        {sparkPoints && <Sparkline points={sparkPoints} color={sparkColor || sentimentColor} width={96} height={36}/>}
      </div>
    </div>
  );
}

/* Progress bar */
function ProgressBar({ value, max = 100, color = "var(--tenant-primary)", height = 6 }) {
  const pct = Math.min(100, (value / max) * 100);
  return (
    <div style={{ width: "100%", height, background: "var(--rule)", borderRadius: 999, overflow: "hidden" }}>
      <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: 999, transition: "width 0.4s" }}/>
    </div>
  );
}

/* Status dot */
function StatusDot({ status }) {
  const map = {
    ativo:    "var(--ok)",
    destaque: "var(--ok)",
    atencao:  "var(--warn)",
    vaga:     "var(--fg-dim)",
    critico:  "var(--danger)",
  };
  return <span style={{ width: 7, height: 7, borderRadius: "50%", background: map[status] || "var(--fg-dim)", display: "inline-block", flexShrink: 0 }}/>;
}

/* Tier pill */
function TierPill({ tier }) {
  return (
    <span className={`chip tier-${tier}`} style={{ border: "none" }}>{tier.toUpperCase()}</span>
  );
}

/* Avatar */
function Avatar({ nome, size = 28, bg = null }) {
  const ini = nome.split(" ").map(w => w[0]).slice(0, 2).join("").toUpperCase();
  const colors = ["#1d4ed8","#059669","#9333ea","#c2410c","#db2777","#0891b2","#ca8a04"];
  const seed = nome.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
  const color = bg || colors[seed % colors.length];
  return (
    <div style={{ width: size, height: size, borderRadius: "50%", background: color, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: size * 0.4, fontWeight: 700, flexShrink: 0 }}>{ini}</div>
  );
}

/* Card wrapper */
function Card({ title, sub, right, children, noPadding, className = "" }) {
  return (
    <section className={`card ${className}`}>
      {(title || right) && (
        <header className="card-header">
          <div className="min-w-0 flex-1">
            {sub && <div className="card-sub mb-0.5">{sub}</div>}
            {title && <div className="card-title">{title}</div>}
          </div>
          {right}
        </header>
      )}
      <div style={{ padding: noPadding ? 0 : 14 }}>{children}</div>
    </section>
  );
}

/* Segment control */
function Segment({ value, options, onChange }) {
  return (
    <div className="seg">
      {options.map(o => (
        <button key={o.value} className={`seg-item ${value === o.value ? "active" : ""}`} onClick={() => onChange(o.value)}>{o.label}</button>
      ))}
    </div>
  );
}

Object.assign(window, { Sparkline, KpiTile, ProgressBar, StatusDot, TierPill, Avatar, Card, Segment });

/* =========================================================================
 * Tela 2 · Mapa Operacional v2 — modelo iFood cascata
 *
 * Lógica: cada nível hierárquico desenha (raio + bairros) a área do nível abaixo.
 *   Delegado    → desenha áreas p/ Coordenadores
 *   Coordenador → desenha áreas p/ Territoriais
 *   Territorial → desenha áreas p/ Cabos
 *   Cabo        → trabalha na sua área
 *
 * Tela: minha área (outline) + sub-áreas que EU desenhei (em camadas).
 *   - Sidebar esquerda: lista de sub-áreas (KPIs mini)
 *   - Mapa central: polígonos de bairros coloridos por sub-área, raio circular
 *   - Painel direito: detalhes da selecionada ou modo edição
 *   - Toolbar: nova sub-área, órfãos, conflitos, cobertura
 * ========================================================================= */

(() => {
const { useState, useMemo, useRef, useEffect } = React;

// ======================== DADOS MOCK ========================
// Grid 10x8 de bairros (Recôncavo / Feira de Santana) — id + nome + polygon + centro
// Cada célula ~= 1 bairro. Alguns bairros têm sub-área atribuída (subareaId), outros são órfãos.

const GRID_COLS = 10;
const GRID_ROWS = 8;
const CELL_W = 80;
const CELL_H = 68;
const MAP_W = GRID_COLS * CELL_W; // 800
const MAP_H = GRID_ROWS * CELL_H; // 544

const BAIRRO_NAMES = [
  "Pituba","Barra","Rio Vermelho","Brotas","Itapuã","Cabula","Tancredo","Federação","Amaralina","Graça",
  "Vitória","Garcia","Nazaré","Comércio","Barris","Canela","Ondina","São Caetano","Fazenda Grande","Cajazeiras",
  "Pau da Lima","Valéria","Águas Claras","Lobato","Subúrbio","Periperi","Paripe","Tubarão","São Tomé","Mussurunga",
  "Stella Maris","Piatã","Jardim Armação","Patamares","Itaigara","Stiep","Iguatemi","Paralela","Imbuí","Costa Azul",
  "Armação","Boca do Rio","Jardim das Margaridas","Pernambués","Saboeiro","Sussuarana","Resgate","Narandiba","Dom Avelar","Canabrava",
  "São Rafael","Jardim Santo Inácio","Castelo Branco","Boca da Mata","Campinas","Mata Escura","Plataforma","Alto de Coutos","Rio Sena","Sete de Abril",
  "São Marcos","Pirajá","Escada","Colinas","Acupe","Vale dos Barris","Saramandaia","Marback","Cosme de Farias","Liberdade",
  "Curuzu","Uruguai","Roma","Calçada","Ribeira","Monte Serrat","Itapagipe","Massaranduba","Boa Viagem","Água de Meninos"
];

// gera bairros: id 0..79, polígono retangular ligeiramente irregular
function mkBairros() {
  const arr = [];
  for (let r = 0; r < GRID_ROWS; r++) {
    for (let c = 0; c < GRID_COLS; c++) {
      const i = r * GRID_COLS + c;
      const x = c * CELL_W;
      const y = r * CELL_H;
      // jitter nas bordas pra parecer orgânico
      const j = (a, b) => {
        const h = Math.sin(i * 73 + a * 31 + b * 17) * 0.5 + 0.5;
        return (h - 0.5) * 10;
      };
      const pts = [
        [x + j(0,0), y + j(0,1)],
        [x + CELL_W + j(1,0), y + j(1,1)],
        [x + CELL_W + j(2,0), y + CELL_H + j(2,1)],
        [x + j(3,0), y + CELL_H + j(3,1)],
      ];
      arr.push({
        id: `b-${i}`,
        nome: BAIRRO_NAMES[i % BAIRRO_NAMES.length],
        cx: x + CELL_W/2,
        cy: y + CELL_H/2,
        poly: pts,
        // KPIs
        eleitores: 1200 + ((i * 137) % 3800),
        presenca: (i * 13) % 100,
        score: 35 + ((i * 19) % 55),
        // quem atua (subareaId ou null)
        subareaId: null, // será preenchido abaixo
      });
    }
  }
  return arr;
}

const BAIRROS_BASE = mkBairros();

// Minha área (do delegado/coordenador) — um "footprint" irregular composto por bairros
const MINHA_AREA_IDS = new Set([
  // linhas 1-6, colunas 1-8 aproximadamente, com borda irregular
  11,12,13,14,15,16,17,
  21,22,23,24,25,26,27,28,
  31,32,33,34,35,36,37,38,
  41,42,43,44,45,46,47,48,
  51,52,53,54,55,56,57,
  62,63,64,65,66,
].map(i => `b-${i}`));

// Sub-áreas existentes (desenhadas POR MIM para meus subordinados)
const SUBAREAS_INIT = [
  {
    id: "sa-1",
    subordinado: "Marcos Silveira",
    papel: "Coordenador Territorial · Centro",
    avatar: "MS",
    cor: "#3b82f6",
    // centro do raio + raio (em px do SVG)
    center: { x: 3.5 * CELL_W, y: 2.5 * CELL_H },
    raio: 160,
    // bairros dela
    bairroIds: [11,12,13,21,22,23,24,31,32,33,34].map(i => `b-${i}`),
    status: "ativo",
  },
  {
    id: "sa-2",
    subordinado: "Paula Nascimento",
    papel: "Coordenadora Territorial · Sul",
    avatar: "PN",
    cor: "#10b981",
    center: { x: 6 * CELL_W, y: 2.5 * CELL_H },
    raio: 145,
    bairroIds: [14,15,16,17,25,26,27,28,35,36,37,38].map(i => `b-${i}`),
    status: "ativo",
  },
  {
    id: "sa-3",
    subordinado: "Renato Bastos",
    papel: "Coordenador Territorial · Oeste",
    avatar: "RB",
    cor: "#f59e0b",
    center: { x: 3 * CELL_W, y: 5 * CELL_H },
    raio: 155,
    bairroIds: [41,42,43,51,52,53,62,63].map(i => `b-${i}`),
    status: "ativo",
  },
  {
    id: "sa-4",
    subordinado: "Luciana Rocha",
    papel: "Coordenadora Territorial · Leste",
    avatar: "LR",
    cor: "#a855f7",
    center: { x: 5.5 * CELL_W, y: 5 * CELL_H },
    raio: 140,
    bairroIds: [44,45,46,54,55,56].map(i => `b-${i}`),
    status: "ativo",
  },
];

// Aplica subareaId aos bairros
function applySubareas(bairros, subareas) {
  const map = new Map();
  subareas.forEach(sa => sa.bairroIds.forEach(bid => map.set(bid, sa.id)));
  return bairros.map(b => ({ ...b, subareaId: map.get(b.id) || null }));
}

// ======================== COMPONENT ========================
function Tela2Mapa({ demoMode, corCerca }) {
  const [subareas, setSubareas] = useState(SUBAREAS_INIT);
  const [selectedId, setSelectedId] = useState(null); // sub-área selecionada
  const [mode, setMode] = useState("view");           // view | edit | create
  const [draftRaio, setDraftRaio] = useState(140);
  const [draftCenter, setDraftCenter] = useState(null);
  const [filter, setFilter] = useState("all");        // all | orfaos | conflitos
  const [hoverBairroId, setHoverBairroId] = useState(null);

  const bairros = useMemo(() => applySubareas(BAIRROS_BASE, subareas), [subareas]);
  const bairrosMap = useMemo(() => {
    const m = new Map();
    bairros.forEach(b => m.set(b.id, b));
    return m;
  }, [bairros]);

  const selected = subareas.find(s => s.id === selectedId);
  const bairrosNaMinhaArea = bairros.filter(b => MINHA_AREA_IDS.has(b.id));

  // Cobertura, órfãos, conflitos
  const cobertos = bairrosNaMinhaArea.filter(b => b.subareaId).length;
  const orfaosArr = bairrosNaMinhaArea.filter(b => !b.subareaId);
  const coberturaPct = Math.round((cobertos / bairrosNaMinhaArea.length) * 100);
  // "Conflitos": nesse mock, bairro fora da minha área com subareaId = extravasamento
  const conflitos = bairros.filter(b => !MINHA_AREA_IDS.has(b.id) && b.subareaId);

  // Totais agregados por sub-área
  const saStats = useMemo(() => {
    const stats = {};
    subareas.forEach(sa => {
      const bs = sa.bairroIds.map(bid => bairrosMap.get(bid)).filter(Boolean);
      const eleitores = bs.reduce((s,b) => s + b.eleitores, 0);
      const presenca = bs.length ? Math.round(bs.reduce((s,b) => s + b.presenca, 0) / bs.length) : 0;
      const score = bs.length ? Math.round(bs.reduce((s,b) => s + b.score, 0) / bs.length) : 0;
      stats[sa.id] = { bairros: bs.length, eleitores, presenca, score };
    });
    return stats;
  }, [subareas, bairrosMap]);

  // ======================== AÇÕES ========================
  function enterEdit(saId) {
    const sa = subareas.find(s => s.id === saId);
    if (!sa) return;
    setSelectedId(saId);
    setDraftRaio(sa.raio);
    setDraftCenter({ ...sa.center });
    setMode("edit");
  }
  function cancelEdit() { setMode("view"); }
  function saveEdit() {
    setSubareas(prev => prev.map(s => s.id === selectedId ? { ...s, raio: draftRaio, center: draftCenter } : s));
    setMode("view");
  }
  function toggleBairro(bid) {
    if (mode !== "edit" || !selected) return;
    setSubareas(prev => prev.map(s => {
      if (s.id !== selectedId) {
        // se bairro pertencia a outra sub-área e agora vai pra atual, remove da outra
        return { ...s, bairroIds: s.bairroIds.filter(x => x !== bid) };
      }
      const has = s.bairroIds.includes(bid);
      return { ...s, bairroIds: has ? s.bairroIds.filter(x => x !== bid) : [...s.bairroIds, bid] };
    }));
  }
  function autoFillByRadius() {
    if (!selected || !draftCenter) return;
    const r = draftRaio;
    const within = bairros
      .filter(b => MINHA_AREA_IDS.has(b.id))
      .filter(b => {
        const dx = b.cx - draftCenter.x;
        const dy = b.cy - draftCenter.y;
        return Math.sqrt(dx*dx + dy*dy) <= r;
      })
      .map(b => b.id);
    setSubareas(prev => prev.map(s => {
      if (s.id === selectedId) return { ...s, bairroIds: within };
      // remove esses bairros das outras sub-áreas
      return { ...s, bairroIds: s.bairroIds.filter(x => !within.includes(x)) };
    }));
  }
  function clearSubarea() {
    setSubareas(prev => prev.map(s => s.id === selectedId ? { ...s, bairroIds: [] } : s));
  }
  function newSubarea() {
    const colors = ["#3b82f6","#10b981","#f59e0b","#a855f7","#ec4899","#06b6d4","#ef4444","#84cc16"];
    const usedCols = new Set(subareas.map(s => s.cor));
    const cor = colors.find(c => !usedCols.has(c)) || colors[subareas.length % colors.length];
    const newSa = {
      id: `sa-${Date.now()}`,
      subordinado: "Novo coordenador",
      papel: "Coordenador Territorial",
      avatar: "??",
      cor,
      center: { x: MAP_W/2, y: MAP_H/2 },
      raio: 120,
      bairroIds: [],
      status: "rascunho",
    };
    setSubareas(prev => [...prev, newSa]);
    setSelectedId(newSa.id);
    setDraftRaio(120);
    setDraftCenter({ ...newSa.center });
    setMode("edit");
  }

  // ======================== RENDER ========================
  return (
    <div className="h-full w-full flex" style={{ background: "var(--bg-page-2)" }}>

      {/* =========== SIDEBAR ESQUERDA — Sub-áreas =========== */}
      <aside className="w-[280px] flex-shrink-0 border-r flex flex-col" style={{ borderColor: "var(--rule)", background: "var(--bg-card)" }}>
        <div className="p-4 border-b" style={{ borderColor: "var(--rule)" }}>
          <div className="card-sub mb-2">Minha área</div>
          <div className="text-[16px] font-black font-display t-fg-strong leading-tight">Recôncavo Norte</div>
          <div className="text-[11px] t-fg-dim mt-0.5">Delegado · {bairrosNaMinhaArea.length} bairros</div>
          <div className="mt-3 flex items-center gap-3">
            <div className="flex-1">
              <div className="h-1.5 rounded-full overflow-hidden" style={{ background: "var(--rule)" }}>
                <div style={{ width: `${coberturaPct}%`, height: "100%", background: coberturaPct >= 80 ? "var(--ok)" : coberturaPct >= 60 ? "var(--warn)" : "var(--danger)" }}/>
              </div>
            </div>
            <div className="text-[13px] font-black tnum t-fg-strong">{coberturaPct}%</div>
          </div>
          <div className="text-[10px] t-fg-dim mt-1">cobertura · {cobertos}/{bairrosNaMinhaArea.length}</div>
        </div>

        <div className="px-4 pt-4 pb-2 flex items-center justify-between">
          <div className="card-sub">Sub-áreas · {subareas.length}</div>
          <button onClick={newSubarea} className="btn-primary" style={{ padding: "5px 10px", fontSize: 10.5 }}>
            <CIcon name="Plus" size={10}/>Nova
          </button>
        </div>

        <nav className="flex-1 overflow-y-auto thin-scroll pb-3">
          {subareas.map(sa => {
            const st = saStats[sa.id];
            const active = selectedId === sa.id;
            return (
              <button key={sa.id} onClick={() => { setSelectedId(sa.id); setMode("view"); }}
                      className="w-full text-left px-4 py-3 border-l-[3px] transition-all"
                      style={{
                        borderLeftColor: active ? sa.cor : "transparent",
                        background: active ? "var(--chart-hover)" : "transparent"
                      }}
                      onMouseEnter={e => { if (!active) e.currentTarget.style.background = "var(--chart-hover)"; }}
                      onMouseLeave={e => { if (!active) e.currentTarget.style.background = "transparent"; }}>
                <div className="flex items-start gap-2.5">
                  <div className="w-7 h-7 rounded-full flex items-center justify-center text-[9.5px] font-bold flex-shrink-0" style={{ background: sa.cor, color: "#fff" }}>{sa.avatar}</div>
                  <div className="flex-1 min-w-0">
                    <div className="text-[12.5px] font-semibold t-fg-strong truncate">{sa.subordinado}</div>
                    <div className="text-[10px] t-fg-dim truncate">{sa.papel}</div>
                    <div className="flex items-center gap-2 mt-1.5 text-[10px] t-fg-muted">
                      <span><b className="tnum t-fg-strong">{st.bairros}</b> bairros</span>
                      <span>·</span>
                      <span><b className="tnum t-fg-strong">{(st.eleitores/1000).toFixed(1)}k</b> eleitores</span>
                    </div>
                    <div className="mt-1.5 flex items-center gap-1.5">
                      <span className="chip" style={{ height: 15, fontSize: 9, padding: "0 5px", background: "var(--rule)", color: "var(--fg-dim)" }}>Presença {st.presenca}%</span>
                      <span className="chip" style={{ height: 15, fontSize: 9, padding: "0 5px", background: st.score >= 70 ? "rgba(5,150,105,0.12)" : st.score >= 50 ? "rgba(217,119,6,0.12)" : "rgba(220,38,38,0.12)", color: st.score >= 70 ? "var(--ok)" : st.score >= 50 ? "var(--warn)" : "var(--danger)" }}>Score {st.score}</span>
                    </div>
                  </div>
                </div>
              </button>
            );
          })}
        </nav>

        {/* Alertas */}
        <div className="border-t p-3 space-y-1.5" style={{ borderColor: "var(--rule)" }}>
          {orfaosArr.length > 0 && (
            <button onClick={() => setFilter(filter === "orfaos" ? "all" : "orfaos")}
                    className="w-full flex items-center gap-2 px-2.5 py-2 rounded-md text-left"
                    style={{ background: filter === "orfaos" ? "rgba(220,38,38,0.1)" : "transparent", border: `1px solid ${filter === "orfaos" ? "var(--danger)" : "var(--rule)"}` }}>
              <CIcon name="AlertTriangle" size={12} style={{ color: "var(--danger)" }}/>
              <div className="flex-1 min-w-0">
                <div className="text-[11.5px] font-semibold" style={{ color: "var(--danger)" }}>{orfaosArr.length} órfãos</div>
                <div className="text-[9.5px] t-fg-dim">Sem responsável</div>
              </div>
            </button>
          )}
          {conflitos.length > 0 && (
            <button onClick={() => setFilter(filter === "conflitos" ? "all" : "conflitos")}
                    className="w-full flex items-center gap-2 px-2.5 py-2 rounded-md text-left"
                    style={{ background: filter === "conflitos" ? "rgba(217,119,6,0.1)" : "transparent", border: `1px solid ${filter === "conflitos" ? "var(--warn)" : "var(--rule)"}` }}>
              <CIcon name="AlertTriangle" size={12} style={{ color: "var(--warn)" }}/>
              <div className="flex-1 min-w-0">
                <div className="text-[11.5px] font-semibold" style={{ color: "var(--warn)" }}>{conflitos.length} conflitos</div>
                <div className="text-[9.5px] t-fg-dim">Fora da sua área</div>
              </div>
            </button>
          )}
        </div>
      </aside>

      {/* =========== MAPA CENTRAL =========== */}
      <div className="flex-1 relative min-w-0 overflow-hidden">
        {/* TOOLBAR flutuante topo */}
        <div className="absolute top-4 left-4 right-4 z-20 flex items-center justify-between pointer-events-none">
          <div className="flex gap-2 pointer-events-auto">
            <div className="px-3 py-2 rounded-lg flex items-center gap-3" style={{ background: "var(--bg-card)", border: "1px solid var(--rule-strong)", boxShadow: "0 4px 12px rgba(0,0,0,0.08)" }}>
              <CIcon name="Map" size={13} className="t-fg-dim"/>
              <div>
                <div className="text-[9.5px] t-fg-dim uppercase tracking-[0.14em] font-semibold">Modo</div>
                <div className="text-[12px] font-bold t-fg-strong">{mode === "edit" ? "Editando sub-área" : "Visualização"}</div>
              </div>
            </div>
          </div>
          <div className="flex gap-2 pointer-events-auto">
            <button onClick={() => setFilter("all")} className={`btn-ghost ${filter === "all" ? "active" : ""}`}><CIcon name="Layers" size={11}/>Todas</button>
            <button onClick={() => setFilter("orfaos")} className={`btn-ghost ${filter === "orfaos" ? "active" : ""}`} style={filter === "orfaos" ? { color: "var(--danger)" } : undefined}><CIcon name="AlertTriangle" size={11}/>Órfãos</button>
            <button onClick={() => setFilter("conflitos")} className={`btn-ghost ${filter === "conflitos" ? "active" : ""}`} style={filter === "conflitos" ? { color: "var(--warn)" } : undefined}><CIcon name="AlertTriangle" size={11}/>Conflitos</button>
            <div className="w-px" style={{ background: "var(--rule-strong)" }}/>
            <button className="btn-ghost"><CIcon name="Minus" size={11}/></button>
            <button className="btn-ghost"><CIcon name="Plus" size={11}/></button>
          </div>
        </div>

        {/* LEGENDA inferior */}
        <div className="absolute bottom-4 left-4 z-20 px-3 py-2.5 rounded-lg pointer-events-auto" style={{ background: "var(--bg-card)", border: "1px solid var(--rule-strong)", boxShadow: "0 4px 12px rgba(0,0,0,0.08)" }}>
          <div className="text-[9.5px] t-fg-dim uppercase tracking-[0.14em] font-semibold mb-1.5">Legenda</div>
          <div className="flex items-center gap-3 text-[10.5px]">
            <div className="flex items-center gap-1.5"><span className="inline-block w-3 h-3 rounded-sm" style={{ background: "var(--tenant-primary)", opacity: 0.12, border: "1px dashed var(--tenant-primary)" }}/><span className="t-fg-muted">Minha área</span></div>
            <div className="flex items-center gap-1.5"><span className="inline-block w-3 h-3 rounded-sm" style={{ background: "rgba(59,130,246,0.3)", border: "1px solid #3b82f6" }}/><span className="t-fg-muted">Sub-área</span></div>
            <div className="flex items-center gap-1.5"><span className="inline-block w-3 h-3 rounded-full border-2 border-dashed" style={{ borderColor: "var(--fg-dim)", background: "transparent" }}/><span className="t-fg-muted">Raio</span></div>
            <div className="flex items-center gap-1.5"><span className="inline-block w-3 h-3 rounded-sm" style={{ background: "rgba(220,38,38,0.25)", border: "1px solid var(--danger)" }}/><span className="t-fg-muted">Órfão</span></div>
          </div>
        </div>

        {/* Scale indicator */}
        <div className="absolute bottom-4 right-4 z-20 px-2.5 py-1.5 rounded text-[10px] t-fg-faint font-mono pointer-events-none" style={{ background: "var(--bg-card)", border: "1px solid var(--rule)" }}>
          zoom 1:80k · {bairrosNaMinhaArea.length} bairros
        </div>

        {/* SVG MAP */}
        <svg viewBox={`0 0 ${MAP_W} ${MAP_H}`} preserveAspectRatio="xMidYMid meet" style={{ width: "100%", height: "100%", display: "block" }}
             onClick={() => { if (mode !== "edit") setSelectedId(null); }}>
          <defs>
            <pattern id="gridMap" width="20" height="20" patternUnits="userSpaceOnUse">
              <path d="M 20 0 L 0 0 0 20" fill="none" stroke="var(--rule)" strokeWidth="0.5" opacity="0.5"/>
            </pattern>
            <filter id="saShadow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="3"/>
            </filter>
          </defs>

          <rect width={MAP_W} height={MAP_H} fill="url(#gridMap)"/>

          {/* Minha área — contorno tracejado */}
          <MinhaAreaOutline bairros={bairrosNaMinhaArea}/>

          {/* Todos os bairros da minha área */}
          {bairrosNaMinhaArea.map(b => {
            const sa = b.subareaId ? subareas.find(s => s.id === b.subareaId) : null;
            const isOrphan = !sa;
            const inSelected = selected && selected.bairroIds.includes(b.id);
            const isHovered = hoverBairroId === b.id;
            const dimmed = (filter === "orfaos" && !isOrphan) || (filter === "conflitos") || (selected && !inSelected && mode === "view");
            const fillColor = isOrphan ? "rgba(220,38,38,0.18)" : sa.cor;
            const fillOp = isHovered ? 0.55 : (inSelected ? 0.5 : isOrphan ? 1 : 0.28);
            const strokeColor = isOrphan ? "#dc2626" : sa.cor;

            return (
              <g key={b.id}
                 onMouseEnter={() => setHoverBairroId(b.id)}
                 onMouseLeave={() => setHoverBairroId(null)}
                 onClick={e => {
                   e.stopPropagation();
                   if (mode === "edit") toggleBairro(b.id);
                   else if (sa) { setSelectedId(sa.id); }
                 }}
                 style={{ cursor: mode === "edit" ? "pointer" : (sa ? "pointer" : "default"), opacity: dimmed ? 0.3 : 1 }}>
                <polygon points={b.poly.map(p => p.join(",")).join(" ")}
                         fill={fillColor} fillOpacity={fillOp}
                         stroke={strokeColor} strokeWidth={inSelected || isHovered ? 1.8 : 0.8}
                         strokeOpacity={isOrphan ? 0.8 : 0.6}/>
                {(isHovered || inSelected) && (
                  <text x={b.cx} y={b.cy + 3} textAnchor="middle" fontSize="9.5" fontWeight="700" fill="var(--fg-strong)" pointerEvents="none">{b.nome}</text>
                )}
              </g>
            );
          })}

          {/* Bairros de conflito (fora da minha área) */}
          {filter === "conflitos" && conflitos.map(b => (
            <polygon key={b.id} points={b.poly.map(p => p.join(",")).join(" ")}
                     fill="rgba(217,119,6,0.3)" stroke="var(--warn)" strokeWidth={1.5} strokeDasharray="3 2"/>
          ))}

          {/* Raios das sub-áreas (modo view) */}
          {mode === "view" && subareas.map(sa => {
            const active = selectedId === sa.id;
            return (
              <circle key={sa.id} cx={sa.center.x} cy={sa.center.y} r={sa.raio}
                      fill="none" stroke={sa.cor} strokeWidth={active ? 1.5 : 0.8}
                      strokeDasharray="4 3" opacity={active ? 0.8 : filter === "all" ? 0.35 : 0.15}
                      pointerEvents="none"/>
            );
          })}

          {/* Raio em modo edit (arrastável) */}
          {mode === "edit" && selected && draftCenter && (
            <g>
              <circle cx={draftCenter.x} cy={draftCenter.y} r={draftRaio}
                      fill={selected.cor} fillOpacity={0.08}
                      stroke={selected.cor} strokeWidth={1.8} strokeDasharray="5 3" pointerEvents="none"/>
              {/* centro handle */}
              <circle cx={draftCenter.x} cy={draftCenter.y} r={8} fill={selected.cor} stroke="#fff" strokeWidth={2} style={{ cursor: "grab" }}
                      onMouseDown={e => {
                        e.stopPropagation();
                        const svg = e.currentTarget.ownerSVGElement;
                        const pt = svg.createSVGPoint();
                        const onMove = (mv) => {
                          pt.x = mv.clientX; pt.y = mv.clientY;
                          const sp = pt.matrixTransform(svg.getScreenCTM().inverse());
                          setDraftCenter({ x: Math.max(0, Math.min(MAP_W, sp.x)), y: Math.max(0, Math.min(MAP_H, sp.y)) });
                        };
                        const onUp = () => {
                          document.removeEventListener("mousemove", onMove);
                          document.removeEventListener("mouseup", onUp);
                        };
                        document.addEventListener("mousemove", onMove);
                        document.addEventListener("mouseup", onUp);
                      }}/>
            </g>
          )}

          {/* Centros das sub-áreas (pin) */}
          {mode === "view" && subareas.map(sa => {
            const active = selectedId === sa.id;
            return (
              <g key={sa.id} style={{ cursor: "pointer" }}
                 onClick={e => { e.stopPropagation(); setSelectedId(sa.id); }}>
                <circle cx={sa.center.x} cy={sa.center.y} r={active ? 14 : 11} fill={sa.cor} stroke="#fff" strokeWidth={active ? 3 : 2}/>
                <text x={sa.center.x} y={sa.center.y + 3} textAnchor="middle" fontSize="9" fontWeight="800" fill="#fff">{sa.avatar}</text>
              </g>
            );
          })}
        </svg>
      </div>

      {/* =========== PAINEL DIREITO =========== */}
      {selected && (
        <aside className="w-[340px] flex-shrink-0 border-l flex flex-col overflow-hidden" style={{ borderColor: "var(--rule)", background: "var(--bg-card)" }}>
          <div className="p-5 border-b" style={{ borderColor: "var(--rule)" }}>
            <div className="flex items-start justify-between mb-3">
              <div className="flex items-center gap-3 min-w-0">
                <div className="w-11 h-11 rounded-full flex items-center justify-center text-[13px] font-bold flex-shrink-0" style={{ background: selected.cor, color: "#fff" }}>{selected.avatar}</div>
                <div className="min-w-0">
                  <div className="text-[15px] font-black t-fg-strong truncate">{selected.subordinado}</div>
                  <div className="text-[11px] t-fg-dim truncate">{selected.papel}</div>
                </div>
              </div>
              <button className="btn-ghost" onClick={() => setSelectedId(null)} style={{ padding: "5px 7px" }}><CIcon name="X" size={11}/></button>
            </div>
            {mode === "view" && (
              <div className="flex gap-2">
                <button onClick={() => enterEdit(selected.id)} className="btn-primary flex-1" style={{ justifyContent: "center", fontSize: 11 }}>
                  <CIcon name="Edit" size={11}/>Editar área
                </button>
                <button className="btn-ghost" style={{ padding: "6px 10px" }}><CIcon name="MessageCircle" size={11}/></button>
                <button className="btn-ghost" style={{ padding: "6px 10px" }}><CIcon name="MoreHorizontal" size={11}/></button>
              </div>
            )}
            {mode === "edit" && (
              <div className="flex gap-2">
                <button onClick={saveEdit} className="btn-primary flex-1" style={{ justifyContent: "center", fontSize: 11, background: "var(--ok)", borderColor: "var(--ok)" }}>
                  <CIcon name="Check" size={11}/>Salvar
                </button>
                <button onClick={cancelEdit} className="btn-ghost flex-1" style={{ justifyContent: "center", fontSize: 11 }}>Cancelar</button>
              </div>
            )}
          </div>

          {mode === "edit" ? (
            <EditPanel subarea={selected} stats={saStats[selected.id]}
                       raio={draftRaio} setRaio={setDraftRaio}
                       autoFill={autoFillByRadius} clear={clearSubarea}
                       bairros={bairros.filter(b => selected.bairroIds.includes(b.id))}
                       toggleBairro={toggleBairro}/>
          ) : (
            <ViewPanel subarea={selected} stats={saStats[selected.id]}
                       bairros={bairros.filter(b => selected.bairroIds.includes(b.id))}/>
          )}
        </aside>
      )}
    </div>
  );
}

// ======================== SUB-COMPONENTS ========================

function MinhaAreaOutline({ bairros }) {
  // Une todos os polígonos dos bairros em um contorno aproximado.
  // Simples: desenha borda tracejada ao redor do bounding box dos bairros
  // mais um "halo" agregado. Pra visual, faremos hulls por linha de bairros.
  // Aqui: só desenhamos polígonos finos ao redor de cada bairro (stroke only).
  const minX = Math.min(...bairros.flatMap(b => b.poly.map(p => p[0]))) - 2;
  const maxX = Math.max(...bairros.flatMap(b => b.poly.map(p => p[0]))) + 2;
  const minY = Math.min(...bairros.flatMap(b => b.poly.map(p => p[1]))) - 2;
  const maxY = Math.max(...bairros.flatMap(b => b.poly.map(p => p[1]))) + 2;
  return (
    <g>
      <rect x={minX} y={minY} width={maxX - minX} height={maxY - minY}
            fill="var(--tenant-primary)" fillOpacity={0.04}
            stroke="var(--tenant-primary)" strokeWidth={1.2} strokeDasharray="6 4" opacity={0.6} rx={8}/>
    </g>
  );
}

function ViewPanel({ subarea, stats, bairros }) {
  return (
    <div className="flex-1 overflow-y-auto thin-scroll">
      <div className="p-5 border-b" style={{ borderColor: "var(--rule)" }}>
        <div className="grid grid-cols-2 gap-3">
          <Stat label="Bairros" value={stats.bairros}/>
          <Stat label="Eleitores" value={(stats.eleitores/1000).toFixed(1) + "k"}/>
          <Stat label="Presença média" value={stats.presenca + "%"} color={stats.presenca >= 70 ? "var(--ok)" : stats.presenca >= 50 ? "var(--warn)" : "var(--danger)"}/>
          <Stat label="Score médio" value={stats.score} color={stats.score >= 70 ? "var(--ok)" : stats.score >= 50 ? "var(--warn)" : "var(--danger)"}/>
        </div>
      </div>
      <div className="p-5 border-b" style={{ borderColor: "var(--rule)" }}>
        <div className="card-sub mb-2">Raio de atuação</div>
        <div className="flex items-baseline gap-2">
          <span className="text-[22px] font-black tnum font-display t-fg-strong">{subarea.raio}</span>
          <span className="text-[11px] t-fg-dim">px · ~{(subarea.raio * 0.08).toFixed(1)}km</span>
        </div>
      </div>
      <div className="p-5">
        <div className="flex items-center justify-between mb-2">
          <div className="card-sub">Bairros · {bairros.length}</div>
          <button className="btn-ghost" style={{ padding: "3px 7px", fontSize: 10 }}>Ver tudo</button>
        </div>
        <div className="space-y-1">
          {bairros.map(b => (
            <div key={b.id} className="flex items-center gap-2 py-1.5 px-2 rounded" style={{ background: "var(--bg-card-2)" }}>
              <span className="inline-block w-2 h-2 rounded-full" style={{ background: subarea.cor }}/>
              <div className="flex-1 min-w-0 text-[11.5px] font-semibold t-fg-strong truncate">{b.nome}</div>
              <span className="text-[10px] tnum t-fg-dim">{(b.eleitores/1000).toFixed(1)}k</span>
              <span className="text-[10px] tnum font-bold" style={{ color: b.score >= 70 ? "var(--ok)" : b.score >= 50 ? "var(--warn)" : "var(--danger)" }}>{b.score}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function EditPanel({ subarea, stats, raio, setRaio, autoFill, clear, bairros, toggleBairro }) {
  return (
    <div className="flex-1 overflow-y-auto thin-scroll">
      <div className="p-4 border-b" style={{ borderColor: "var(--rule)", background: "rgba(59,130,246,0.05)" }}>
        <div className="flex items-center gap-2 text-[11px] font-semibold mb-1" style={{ color: "var(--accent-blue)" }}>
          <CIcon name="Edit" size={11}/>Modo edição
        </div>
        <div className="text-[10.5px] t-fg-muted" style={{ lineHeight: 1.45 }}>
          Arraste o centro no mapa, ajuste o raio, ou clique em bairros para incluir/excluir.
        </div>
      </div>

      {/* Raio */}
      <div className="p-5 border-b" style={{ borderColor: "var(--rule)" }}>
        <div className="flex items-center justify-between mb-2">
          <div className="card-sub">Raio de atuação</div>
          <div className="text-[13px] font-black tnum t-fg-strong">{raio}px · {(raio * 0.08).toFixed(1)}km</div>
        </div>
        <input type="range" min="40" max="280" value={raio} onChange={e => setRaio(+e.target.value)}
               className="w-full" style={{ accentColor: subarea.cor }}/>
        <div className="flex justify-between text-[9px] t-fg-faint mt-1 font-mono">
          <span>40</span><span>160</span><span>280</span>
        </div>
        <button onClick={autoFill} className="btn-ghost w-full mt-3" style={{ justifyContent: "center", fontSize: 11 }}>
          <CIcon name="Zap" size={11}/>Auto-preencher bairros dentro do raio
        </button>
      </div>

      {/* Bairros atuais */}
      <div className="p-5 border-b" style={{ borderColor: "var(--rule)" }}>
        <div className="flex items-center justify-between mb-2">
          <div className="card-sub">Bairros incluídos · {bairros.length}</div>
          <button onClick={clear} className="text-[10px] font-semibold" style={{ color: "var(--danger)" }}>Limpar tudo</button>
        </div>
        {bairros.length === 0 ? (
          <div className="text-[11px] t-fg-dim py-3 text-center">Nenhum bairro ainda. Clique no mapa para adicionar.</div>
        ) : (
          <div className="space-y-1 max-h-[280px] overflow-y-auto thin-scroll">
            {bairros.map(b => (
              <button key={b.id} onClick={() => toggleBairro(b.id)}
                      className="w-full flex items-center gap-2 py-1.5 px-2 rounded text-left"
                      style={{ background: "var(--bg-card-2)" }}>
                <span className="inline-block w-2 h-2 rounded-full" style={{ background: subarea.cor }}/>
                <div className="flex-1 min-w-0 text-[11.5px] font-semibold t-fg-strong truncate">{b.nome}</div>
                <CIcon name="X" size={11} className="t-fg-dim"/>
              </button>
            ))}
          </div>
        )}
      </div>

      <div className="p-5">
        <div className="card-sub mb-2">Totais após edição</div>
        <div className="grid grid-cols-3 gap-2">
          <MiniStat2 label="Bairros" value={bairros.length}/>
          <MiniStat2 label="Eleitores" value={(bairros.reduce((s,b)=>s+b.eleitores,0)/1000).toFixed(1)+"k"}/>
          <MiniStat2 label="Presença" value={bairros.length ? Math.round(bairros.reduce((s,b)=>s+b.presenca,0)/bairros.length)+"%" : "—"}/>
        </div>
      </div>
    </div>
  );
}

function Stat({ label, value, color }) {
  return (
    <div>
      <div className="text-[9.5px] t-fg-dim uppercase tracking-wider font-semibold mb-1">{label}</div>
      <div className="text-[20px] font-black tnum font-display leading-none" style={{ color: color || "var(--fg-strong)" }}>{value}</div>
    </div>
  );
}

function MiniStat2({ label, value }) {
  return (
    <div className="p-2 rounded" style={{ background: "var(--bg-card-2)", border: "1px solid var(--rule)" }}>
      <div className="text-[8.5px] t-fg-dim uppercase tracking-wider font-semibold">{label}</div>
      <div className="text-[13px] font-black tnum font-display t-fg-strong mt-0.5">{value}</div>
    </div>
  );
}

Object.assign(window, { Tela2Mapa });
})();

/* ---------- Tela 4 · Árvore Hierárquica ---------- */
function Tela4Arvore() {
  const [expanded, setExpanded] = React.useState({ "reg-reconcavo": true, "mun-feira": true });
  const toggle = (id) => setExpanded(e => ({ ...e, [id]: !e[id] }));

  const row = (node, depth) => {
    const hasChildren = node.filhas && node.filhas.length > 0;
    const isOpen = expanded[node.id];
    return (
      <React.Fragment key={node.id}>
        <div className="list-row" style={{ gridTemplateColumns: `${depth * 20 + 28}px 24px 1fr 140px 120px 80px 140px 80px`, paddingLeft: 14 + depth * 20 }}>
          <div onClick={() => hasChildren && toggle(node.id)} style={{ cursor: hasChildren ? "pointer" : "default" }}>
            {hasChildren && <CIcon name={isOpen ? "ChevronDown" : "ChevronRight"} size={12} className="t-fg-muted"/>}
          </div>
          <StatusDot status={node.status}/>
          <div className="min-w-0 flex items-center gap-2">
            <CIcon name={node.nivel === "regional" ? "Flag" : node.nivel === "municipio" ? "MapPin" : "Home"} size={12} className="t-fg-dim"/>
            <div className="min-w-0">
              <div className="text-[12.5px] font-semibold t-fg-strong truncate">{node.nome}</div>
              <div className="text-[10px] t-fg-dim uppercase tracking-wider">{node.nivel}</div>
            </div>
          </div>
          <div className="flex items-center gap-2 min-w-0">
            {node.responsavelId ? <Avatar nome={node.responsavel} size={22}/> : <span className="w-[22px] h-[22px] rounded-full flex items-center justify-center" style={{ background: "rgba(220,38,38,0.1)", color: "var(--danger)" }}><CIcon name="AlertTriangle" size={10}/></span>}
            <div className="text-[11.5px] t-fg truncate">{node.responsavel}</div>
          </div>
          <div>
            <ProgressBar value={(node.cadastrados/node.meta)*100} color={(node.cadastrados/node.meta) > 0.7 ? "var(--ok)" : (node.cadastrados/node.meta) > 0.4 ? "var(--warn)" : "var(--danger)"}/>
            <div className="text-[10px] tnum t-fg-dim mt-0.5">{node.cadastrados.toLocaleString("pt-BR")} / {node.meta.toLocaleString("pt-BR")}</div>
          </div>
          <div className="text-[13px] font-bold tnum" style={{ color: node.score >= 70 ? "var(--ok)" : node.score >= 50 ? "var(--warn)" : "var(--danger)" }}>{node.score}</div>
          <div className="text-[11px] tnum t-fg-muted">{node.engajamento}%</div>
          <div className="flex gap-1 justify-end">
            <button className="btn-ghost" style={{ padding: "4px 7px" }}><CIcon name="MessageCircle" size={10}/></button>
            <button className="btn-ghost" style={{ padding: "4px 7px" }}><CIcon name="MoreHorizontal" size={10}/></button>
          </div>
        </div>
        {hasChildren && isOpen && node.filhas.map(c => row(c, depth + 1))}
      </React.Fragment>
    );
  };

  return (
    <div className="p-6 space-y-4" style={{ maxWidth: 1680, margin: "0 auto" }}>
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-[22px] font-black font-display t-fg-strong">Hierarquia da campanha</h1>

        <div className="flex gap-2">
          <Segment value="operacional" onChange={() => {}} options={[{value:"operacional",label:"Operacional"},{value:"geografica",label:"Geográfica"}]}/>

          <button className="btn-primary"><CIcon name="Plus" size={11}/>Nova cerca</button>
        </div>
      </div>

      <Card noPadding>
        <div className="list-row" style={{ gridTemplateColumns: "48px 24px 1fr 140px 120px 80px 140px 80px", paddingTop: 8, paddingBottom: 8, background: "var(--bg-card-2)", fontWeight: 600, color: "var(--fg-dim)", fontSize: 10.5, textTransform: "uppercase", letterSpacing: "0.08em" }}>
          <div/><div/><div>Cerca</div><div>Responsável</div><div>Presença</div><div>Score</div><div>Engaj.</div><div className="text-right">Ações</div>
        </div>
        {CERCAS.map(n => row(n, 0))}
      </Card>

      <div className="grid grid-cols-4 gap-4">
        <StatCard label="Regionais" value="3" sub="1 vaga" tone="warn"/>
        <StatCard label="Territoriais" value="8" sub="1 vaga" tone="warn"/>
        <StatCard label="Bairros" value="11" sub="2 vagos" tone="danger"/>
        <StatCard label="Cobertura total" value="74%" sub="meta 90%" tone="ok"/>
      </div>
    </div>
  );
}

function StatCard({ label, value, sub, tone }) {
  const color = tone === "ok" ? "var(--ok)" : tone === "warn" ? "var(--warn)" : tone === "danger" ? "var(--danger)" : "var(--fg-strong)";
  return (
    <div className="card p-4">
      <div className="text-[10px] t-fg-dim uppercase tracking-wider font-semibold mb-1.5">{label}</div>
      <div className="text-[26px] font-black tnum font-display" style={{ color }}>{value}</div>
      <div className="text-[10.5px] t-fg-muted mt-0.5">{sub}</div>
    </div>
  );
}

/* ---------- Tela 5 · Cadastro de Lideranças ---------- */
function Tela5Cadastro() {
  const [q, setQ] = React.useState("");
  const [filtro, setFiltro] = React.useState("todos");
  const [editing, setEditing] = React.useState(null);

  const filtered = LIDERANCAS.filter(l => {
    if (filtro === "vagas") return false;
    if (filtro === "ouro" && l.tier !== "ouro") return false;
    if (filtro === "mulher" && !l.tags.includes("Mulher")) return false;
    if (q && !(l.nome.toLowerCase().includes(q.toLowerCase()) || l.cidade.toLowerCase().includes(q.toLowerCase()))) return false;
    return true;
  });

  return (
    <div className="p-6" style={{ maxWidth: 1680, margin: "0 auto" }}>
      <div className="grid grid-cols-[1fr_400px] gap-4">
        <div className="space-y-4">
          <div className="flex items-center justify-between gap-3">
            <div>
              <h1 className="text-[22px] font-black font-display t-fg-strong">Lideranças</h1>
              <div className="text-[12px] t-fg-muted mt-0.5">{filtered.length} de {LIDERANCAS.length} · presença, tiers, cercas</div>
            </div>
            <div className="flex gap-2">
              <div className="flex items-center gap-2 px-3 h-[34px] rounded-md" style={{ background: "var(--rule)", width: 260 }}>
                <CIcon name="Search" size={12} className="t-fg-dim"/>
                <input value={q} onChange={e => setQ(e.target.value)} placeholder="Buscar por nome ou cidade…" className="flex-1 bg-transparent outline-none text-[12px]" style={{ color: "var(--fg)" }}/>
              </div>
              <Segment value={filtro} onChange={setFiltro} options={[{value:"todos",label:"Todos"},{value:"ouro",label:"Ouro"},{value:"mulher",label:"Mulheres"}]}/>
              <button className="btn-primary"><CIcon name="UserPlus" size={11}/>Nova liderança</button>
            </div>
          </div>

          <Card noPadding>
            <div className="list-row" style={{ gridTemplateColumns: "1fr 140px 140px 80px 100px 80px", paddingTop: 8, paddingBottom: 8, background: "var(--bg-card-2)", fontWeight: 600, color: "var(--fg-dim)", fontSize: 10.5, textTransform: "uppercase", letterSpacing: "0.08em" }}>
              <div>Nome</div><div>Papel</div><div>Cerca</div><div>Tier</div><div className="text-right">Influência</div><div className="text-right">Score</div>
            </div>
            {filtered.map(l => (
              <div key={l.id} className="list-row" style={{ gridTemplateColumns: "1fr 140px 140px 80px 100px 80px", cursor: "pointer" }} onClick={() => setEditing(l)}>
                <div className="flex items-center gap-3 min-w-0">
                  <Avatar nome={l.nome} size={30}/>
                  <div className="min-w-0">
                    <div className="text-[12.5px] font-semibold t-fg-strong truncate">{l.nome}</div>
                    <div className="text-[10.5px] t-fg-dim truncate">{l.cidade} · {l.tags.join(" · ")}</div>
                  </div>
                </div>
                <div className="text-[11.5px] t-fg-muted truncate">{l.papel}</div>
                <div className="text-[11.5px] t-fg-muted truncate">{l.cerca || "—"}</div>
                <div><TierPill tier={l.tier}/></div>
                <div className="text-[11.5px] tnum t-fg text-right">{l.eleitoresInfluenciados.toLocaleString("pt-BR")}</div>
                <div className="text-[13px] font-bold tnum text-right" style={{ color: l.score >= 80 ? "var(--ok)" : l.score >= 60 ? "var(--warn)" : "var(--danger)" }}>{l.score}</div>
              </div>
            ))}
          </Card>
        </div>

        {/* Formulário lateral (ou Edit pane) */}
        <Card title={editing ? "Editar liderança" : "Nova liderança"} sub={editing ? editing.nome : "Formulário rápido"}
              right={editing && <button className="btn-ghost" onClick={() => setEditing(null)} style={{ padding: "5px 7px" }}><CIcon name="X" size={11}/></button>}>
          <div className="space-y-3">
            {[
              { label: "Nome completo",     val: editing?.nome || "",       ph: "Ex: Rita Lima" },
              { label: "Papel",             val: editing?.papel || "",      ph: "Cabo Eleitoral" },
              { label: "Telefone · WhatsApp",val: editing?.telefone || "",   ph: "(75) 9 ..." },
              { label: "Cidade",            val: editing?.cidade || "",     ph: "Feira de Santana" },
              { label: "Cerca",             val: editing?.cerca || "",      ph: "Tomba" },
            ].map((f, i) => (
              <Field key={i} label={f.label}>
                <input defaultValue={f.val} placeholder={f.ph}
                       className="w-full h-[34px] px-3 rounded-md outline-none text-[12.5px]"
                       style={{ background: "var(--rule)", color: "var(--fg)" }}/>
              </Field>
            ))}

            <Field label="Tier">
              <div className="flex gap-1.5">
                {["ouro","prata","bronze"].map(t => (
                  <button key={t} className={`btn-ghost ${editing?.tier === t ? "active" : ""}`} style={{ flex: 1, justifyContent: "center", padding: "7px 8px" }}>{t.toUpperCase()}</button>
                ))}
              </div>
            </Field>

            <Field label="Tags">
              <div className="flex flex-wrap gap-1.5">
                {["Mulher","Jovem","Idoso","Religioso","Comunidade","Destaque","Atenção"].map(t => {
                  const on = editing?.tags?.includes(t);
                  return <span key={t} className={`chip ${on ? "chip-blue" : "chip-gray"}`} style={{ cursor: "pointer" }}>{t}</span>;
                })}
              </div>
            </Field>

            <div className="flex gap-2 pt-2">
              <button className="btn-primary flex-1" style={{ justifyContent: "center" }}>
                <CIcon name="CheckCircle" size={12}/>
                Salvar
              </button>
              <button className="btn-ghost" style={{ padding: "8px 12px" }}>Cancelar</button>
            </div>
          </div>
        </Card>
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div>
      <div className="text-[10px] t-fg-dim uppercase tracking-wider font-semibold mb-1.5">{label}</div>
      {children}
    </div>
  );
}

/* ---------- Tela 7 · Chat Sigiloso (Furtivo Hardened) ---------- */
function Tela7Chat({ modoFurtivoDefault, modoFurtivo }) {
  const [canal, setCanal] = React.useState(CHAT_CANAIS[0]);
  const [furtivo, setFurtivo] = React.useState(modoFurtivoDefault === "furtivo" || !!modoFurtivo);
  const [burnSeconds, setBurnSeconds] = React.useState(30); // 10 | 30 | 60 | 3600
  const [msgs, setMsgs] = React.useState(CHAT_MENSAGENS[canal.id] || []);
  const [texto, setTexto] = React.useState("");
  const [alertFlash, setAlertFlash] = React.useState(null);

  // When canal changes, reload
  React.useEffect(() => { setMsgs(CHAT_MENSAGENS[canal.id] || []); }, [canal.id]);

  // Burn timer: each msg w/ expireAt removed when reached
  React.useEffect(() => {
    if (!furtivo) return;
    const t = setInterval(() => {
      setMsgs(prev => prev.filter(m => !m.expireAt || m.expireAt > Date.now()));
    }, 500);
    return () => clearInterval(t);
  }, [furtivo]);

  // Anti-screenshot hint: detect blur (possible screenshot via Cmd+Shift+4 on mac blurs window briefly)
  React.useEffect(() => {
    if (!furtivo) return;
    const onBlur = () => {
      setAlertFlash({ tipo: "blur", tempo: Date.now() });
      setTimeout(() => setAlertFlash(null), 2500);
    };
    const onVisibility = () => {
      if (document.hidden) {
        setAlertFlash({ tipo: "hidden", tempo: Date.now() });
      }
    };
    window.addEventListener("blur", onBlur);
    document.addEventListener("visibilitychange", onVisibility);
    return () => {
      window.removeEventListener("blur", onBlur);
      document.removeEventListener("visibilitychange", onVisibility);
    };
  }, [furtivo]);

  // Block paste (prevent pulling in screenshots/clipboard)
  const handlePaste = (e) => {
    if (furtivo) {
      e.preventDefault();
      setAlertFlash({ tipo: "paste", tempo: Date.now() });
      setTimeout(() => setAlertFlash(null), 2500);
    }
  };

  // Block context menu in furtivo (no right-click → save image)
  const handleContext = (e) => { if (furtivo) e.preventDefault(); };

  const enviar = () => {
    if (!texto.trim()) return;
    const novo = {
      id: "L" + Date.now(),
      autor: "Você", papel: "Operador", me: true,
      texto: texto, hora: new Date().toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" }),
      status: "enviado",
      expireAt: furtivo ? Date.now() + burnSeconds * 1000 : null,
    };
    setMsgs(m => [...m, novo]);
    setTexto("");
  };

  const apagarTodas = () => {
    if (!window.confirm("Apagar todas as mensagens desta sala AGORA? Irreversível.")) return;
    setMsgs([]);
  };

  const userTag = `OP-${(Math.random() * 9999 | 0).toString().padStart(4,"0")} · ${new Date().toLocaleString("pt-BR")}`;

  return (
    <div className="h-full w-full flex relative" style={{ background: "var(--bg-page-2)" }} onContextMenu={handleContext}>
      {/* Watermark grid — only when furtivo ON */}
      {furtivo && (
        <div className="absolute inset-0 pointer-events-none z-30 overflow-hidden select-none">
          <div style={{
            position: "absolute", inset: 0,
            backgroundImage: `repeating-linear-gradient(-30deg, transparent 0, transparent 140px, rgba(217,119,6,0.08) 140px, rgba(217,119,6,0.08) 142px)`,
          }}/>
          {Array.from({ length: 30 }).map((_, i) => (
            <div key={i} className="absolute text-[10px] font-mono whitespace-nowrap"
                 style={{
                   top: `${(i % 6) * 18}%`, left: `${((i * 37) % 100)}%`,
                   transform: "rotate(-30deg)", color: "rgba(217,119,6,0.18)",
                 }}>
              {userTag}
            </div>
          ))}
        </div>
      )}

      {/* Alert flash */}
      {alertFlash && (
        <div className="absolute top-4 left-1/2 -translate-x-1/2 z-40 px-4 py-2 rounded-md text-[11px] font-semibold flex items-center gap-2 shadow-lg"
             style={{ background: "var(--err)", color: "#fff" }}>
          <CIcon name="AlertTriangle" size={12}/>
          {alertFlash.tipo === "blur" && "Janela perdeu foco — possível captura registrada no log"}
          {alertFlash.tipo === "hidden" && "Aba minimizada — evento registrado"}
          {alertFlash.tipo === "paste" && "Colar bloqueado em modo furtivo"}
        </div>
      )}

      {/* channel list */}
      <aside className="w-[300px] flex-shrink-0 border-r overflow-y-auto thin-scroll flex flex-col" style={{ borderColor: "var(--rule)", background: "var(--bg-card)" }}>
        <div className="p-4 border-b" style={{ borderColor: "var(--rule)" }}>
          <div className="flex items-center gap-2 mb-3">
            <CIcon name="Shield" size={14} style={{ color: "var(--tenant-primary)" }}/>
            <div className="flex-1 min-w-0">
              <div className="text-[12.5px] font-bold t-fg-strong">Canais seguros</div>
              <div className="text-[10px] t-fg-dim">E2E · burn-after-read</div>
            </div>
            <button className="btn-ghost" style={{ padding: "5px 7px" }}><CIcon name="Plus" size={11}/></button>
          </div>
          <div className="flex items-center gap-2 px-3 h-[30px] rounded-md" style={{ background: "var(--rule)" }}>
            <CIcon name="Search" size={11} className="t-fg-dim"/>
            <input placeholder="Buscar canal…" className="flex-1 bg-transparent outline-none text-[11.5px]" style={{ color: "var(--fg)" }}/>
          </div>
        </div>
        <div className="flex-1 overflow-y-auto">
          {CHAT_CANAIS.map(c => {
            const active = canal.id === c.id;
            return (
              <div key={c.id} onClick={() => setCanal(c)}
                   className="px-4 py-3 cursor-pointer"
                   style={{ background: active ? "var(--rule-strong)" : "transparent", borderBottom: "1px solid var(--rule)" }}>
                <div className="flex items-center gap-2 mb-1">
                  {c.furtivo && <CIcon name="Lock" size={10} style={{ color: "var(--warn)" }}/>}
                  <div className="text-[12px] font-semibold t-fg-strong flex-1 truncate">{c.nome}</div>
                  <div className="text-[9.5px] t-fg-dim">{c.ultima}</div>
                </div>
                <div className="flex items-center gap-2">
                  <div className="text-[11px] t-fg-muted flex-1 truncate">{c.furtivo ? <span className="italic t-fg-faint">Mensagem protegida</span> : c.preview}</div>
                  {c.unread > 0 && <span className="chip chip-red" style={{ height: 16, minWidth: 16, justifyContent: "center", fontSize: 9.5 }}>{c.unread}</span>}
                </div>
                <div className="flex items-center gap-1.5 mt-1">
                  <span className="chip chip-gray" style={{ height: 15, fontSize: 9 }}>{c.tipo.toUpperCase()}</span>
                  <span className="text-[9.5px] t-fg-faint">· {c.membros} membros · {c.classificacao}</span>
                </div>
              </div>
            );
          })}
        </div>
      </aside>

      {/* chat body */}
      <div className="flex-1 flex flex-col min-w-0 relative">
        <div className="flex items-center gap-3 px-5 h-[56px] flex-shrink-0 border-b" style={{ borderColor: "var(--rule)", background: "var(--bg-card)" }}>
          <div className="w-9 h-9 rounded-md flex items-center justify-center" style={{ background: furtivo ? "var(--warn)" : "var(--tenant-primary)", color: "#fff" }}>
            <CIcon name={furtivo ? "Lock" : (canal.tipo === "direto" ? "User" : "Users")} size={14}/>
          </div>
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2">
              <div className="text-[13px] font-bold t-fg-strong">{canal.nome}</div>
              {furtivo && <span className="chip chip-amber"><CIcon name="Lock" size={9}/>FURTIVO · burn {burnSeconds}s</span>}
              <span className="chip chip-gray">{canal.classificacao.toUpperCase()}</span>
            </div>
            <div className="text-[10.5px] t-fg-dim">{canal.membros} membros · identidade: {userTag.split(" · ")[0]}</div>
          </div>
          {furtivo && (
            <select value={burnSeconds} onChange={e => setBurnSeconds(Number(e.target.value))}
                    className="text-[11px] rounded px-2 py-1" style={{ background: "var(--rule)", color: "var(--fg)", border: "1px solid var(--rule-strong)" }}>
              <option value={10}>10s</option>
              <option value={30}>30s</option>
              <option value={60}>1min</option>
              <option value={3600}>1h</option>
            </select>
          )}
          <button className="btn-ghost" onClick={() => setFurtivo(!furtivo)} title="Modo furtivo (burn-after-read)">
            <CIcon name={furtivo ? "EyeOff" : "Eye"} size={11}/>
            {furtivo ? "Furtivo ON" : "Furtivo OFF"}
          </button>
          <button className="btn-ghost" onClick={apagarTodas} title="Apagar todas as mensagens agora" style={{ color: "var(--err)" }}>
            <CIcon name="Trash2" size={11}/> Apagar tudo
          </button>
        </div>

        <div className="flex-1 overflow-y-auto thin-scroll px-6 py-5 space-y-3 relative" style={{ background: "var(--bg-page-2)" }}>
          <div className="flex justify-center mb-4">
            <div className="px-3 py-1.5 rounded-full text-[10.5px] flex items-center gap-1.5" style={{ background: "rgba(217,119,6,0.1)", color: "var(--warn)", border: "1px solid rgba(217,119,6,0.25)" }}>
              <CIcon name="Shield" size={10}/>
              {furtivo
                ? "Furtivo ATIVO · mensagens se autodestroem · paste bloqueado · blur de janela alerta a sala"
                : "Conversa cifrada ponta-a-ponta · log de auditoria apenas em acesso judicial"}
            </div>
          </div>

          {msgs.map(m => {
            const restaMs = m.expireAt ? m.expireAt - Date.now() : null;
            const restaS = restaMs !== null ? Math.max(0, Math.ceil(restaMs / 1000)) : null;
            return (
              <div key={m.id} className={`flex gap-2 ${m.me ? "justify-end" : "justify-start"}`}>
                {!m.me && <Avatar nome={m.autor} size={26}/>}
