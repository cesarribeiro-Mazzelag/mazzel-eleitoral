<style>

[data-theme="dark"] {
  --bg-page: #0a0a0b; --bg-page-2: #0c0c0e;

}
html, body { background: var(--bg-page); color: var(--fg); height: 100%; margin: 0; overflow: hidden; }
body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }

/* quadra (tile clicável) */

/* rota trail */

  Copy:    <><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h2"/></>,
  Star:    <path d="M12 2l3 7 7 .6-5.2 4.6 1.7 7.3L12 17.7 5.5 21.5 7.2 14.2 2 9.6 9 9z"/>,
  GitBranch: <><circle cx="6" cy="5" r="2"/><circle cx="18" cy="19" r="2"/><circle cx="6" cy="19" r="2"/><path d="M6 7v10"/><path d="M16 19H9a3 3 0 0 1-3-3V5"/></>,
};
function CIcon({ name, size = 14, className = "", style }) {
  const d = ICONS[name];
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" className={className} style={style}>{d}</svg>;
}

/* =========================================================================
 * MOCK DATA — Bairro Tomba · Feira de Santana
 * ========================================================================= */

// 6 cabos eleitorais, com scores e tiers
const CABOS = [
  { id: "rita",   nome: "Rita Lima",        tier: "ouro",   score: 89, fone: "(75) 9 9811-2211", visitasHoje: 42, metaHoje: 50, conv: 0.68, cor: "#2563eb" },
  { id: "marcos", nome: "Marcos Oliveira",  tier: "prata",  score: 72, fone: "(75) 9 9822-3344", visitasHoje: 28, metaHoje: 50, conv: 0.54, cor: "#059669" },
  { id: "ana",    nome: "Ana Paula Ribeiro",tier: "prata",  score: 76, fone: "(75) 9 9833-4455", visitasHoje: 31, metaHoje: 40, conv: 0.61, cor: "#7c3aed" },
  { id: "jose",   nome: "José Roberto",     tier: "bronze", score: 54, fone: "(75) 9 9844-5566", visitasHoje: 12, metaHoje: 35, conv: 0.32, cor: "#d97706" },
  { id: "helena", nome: "Helena Barreto",   tier: "ouro",   score: 82, fone: "(75) 9 9855-6677", visitasHoje: 38, metaHoje: 45, conv: 0.72, cor: "#db2777" },
];

// Nomes de rua dos blocos (ciclo)
const RUAS = [
  "Rua São Domingos", "Rua das Palmeiras", "Av. Getúlio Vargas", "Rua Coronel Juca Sobrinho",
  "Rua Olavo Bilac", "Rua dos Girassóis", "Rua Manoel Vitorino", "Av. Artêmio Castro",
  "Rua Pedro Álvares", "Rua da Matriz", "Travessa do Cruzeiro", "Rua Nilo Peçanha",
];

// Grid 8×5 = 40 quadras no bairro Tomba, esquemático
// Cada célula tem coordenadas em uma malha 800×500
function buildQuadras() {
  const cols = 8, rows = 5;
  const cellW = 84, cellH = 78;
  const gapX = 8, gapY = 8;
  const originX = 40, originY = 40;
  const arr = [];
  let id = 1;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = originX + c * (cellW + gapX);
      const y = originY + r * (cellH + gapY);
      // irregular shapes: skew polygon corners slightly
      const jx = (Math.sin(id * 1.3) * 4);
      const jy = (Math.cos(id * 1.7) * 4);
      const pts = [
        [x + jx, y + jy],
        [x + cellW - jy, y + jx],
        [x + cellW + jx, y + cellH - jy],
        [x - jy, y + cellH + jx],
      ];
      arr.push({
        id: `Q${String(id).padStart(2,"0")}`,
        centroid: [x + cellW/2, y + cellH/2],
        points: pts,
        domicilios: 40 + ((id * 7) % 60),
        rua: RUAS[id % RUAS.length],
      });
      id++;
    }
  }
  return arr;
}

const QUADRAS_BASE = buildQuadras();

// atribuições: cada quadra → cabo (ou null = órfã). 40 quadras.
// cria 6 "sub-áreas" coerentes (clusters contíguos) + órfãos + conflitos
const OWNERS = {
  // Rita — canto superior esquerdo (quadras 1-3, 9-11)
  "Q01":"rita","Q02":"rita","Q03":"rita","Q09":"rita","Q10":"rita","Q11":"rita",
  // Marcos — centro-norte (quadras 4-6, 12-14)
  "Q04":"marcos","Q05":"marcos","Q06":"marcos","Q12":"marcos","Q13":"marcos","Q14":"marcos",
  // Ana — lateral direita (7,8,15,16,23,24)
  "Q07":"ana","Q08":"ana","Q15":"ana","Q16":"ana","Q23":"ana","Q24":"ana",
  // José — meio-sul (17-20, 25-28)
  "Q17":"jose","Q18":"jose","Q19":"jose","Q20":"jose","Q25":"jose","Q26":"jose","Q27":"jose","Q28":"jose",
  // Helena — sul (33-37)
  "Q33":"helena","Q34":"helena","Q35":"helena","Q36":"helena","Q37":"helena",
  // Órfãs: 21, 22, 29, 30, 38, 39, 40, 31, 32 — dispersas
};

// conflito: Q20 também reivindicada por Helena (sobreposição)
const CONFLICTS = {
  "Q20": ["jose","helena"],
};

// Performance por quadra (visitadas / domicílios, conversão 0-1)
function perfFor(qId) {
  const cabo = OWNERS[qId];
  if (!cabo) return { visitas: 0, conv: 0, feitoHoje: 0 };
  const c = CABOS.find(x => x.id === cabo);
  const seed = (qId.charCodeAt(1) + qId.charCodeAt(2));
  const ratio = 0.3 + ((seed * 7) % 60) / 100;
  return {
    cobertura: Math.min(0.95, ratio * (c.score / 80)),
    conversao: c.conv * (0.8 + ((seed * 11) % 30) / 100),
    feitoHoje: Math.round((seed % 7) + 1),
  };
}

// Rotas percorridas hoje — lista de centroids por cabo, em ordem
function routesForCabo(caboId) {
  const qs = Object.entries(OWNERS).filter(([,v]) => v === caboId).map(([k]) => k);
  return qs.map(q => QUADRAS_BASE.find(x => x.id === q).centroid);
}

/* =========================================================================
 * UI primitives
 * ========================================================================= */
function Card({ children, className = "", style }) {
  return <div className={`card ${className}`} style={style}>{children}</div>;
}
function Chip({ tone = "gray", children }) {
  return <span className={`chip chip-${tone}`}>{children}</span>;
}
function MiniStat({ label, value, sub, color }) {
  return (
    <div>
      <div className="text-[9.5px] t-fg-dim uppercase tracking-wider font-semibold mb-0.5">{label}</div>
      <div className="text-[17px] font-black tnum font-display" style={{ color: color || "var(--fg-strong)" }}>{value}</div>
      {sub && <div className="text-[10px] t-fg-dim mt-0.5">{sub}</div>}
    </div>
  );
}
function ProgressBar({ value, color, height = 6 }) {
  return (
    <div className="mini-bar" style={{ height }}>
      <div className="mini-bar-fill" style={{ width: `${Math.min(100, Math.max(0, value))}%`, background: color || "var(--fg-strong)" }}/>
    </div>
  );
}

Object.assign(window, { CABOS, QUADRAS_BASE, OWNERS, CONFLICTS, RUAS, perfFor, routesForCabo, CIcon, Card, Chip, MiniStat, ProgressBar });
</script>

<script type="text/babel" data-presets="react">
/* =========================================================================
 * MapCanvas — SVG do bairro
 * ========================================================================= */
const { useState, useMemo, useRef, useEffect } = React;

function polyToPath(points) {
  return "M " + points.map(p => p.join(",")).join(" L ") + " Z";
}

function colorForQuadra(q, layer, selection, lassoSet) {
  const cabo = OWNERS[q.id];
  const p = perfFor(q.id);
  if (layer === "responsavel") {
    if (CONFLICTS[q.id]) return { fill: "#dc2626", fillOpacity: 0.35, stroke: "#dc2626" };
    if (!cabo) return { fill: "#a1a1aa", fillOpacity: 0.15, stroke: "#dc2626" };
    const c = CABOS.find(x => x.id === cabo);
    return { fill: c.cor, fillOpacity: 0.22, stroke: c.cor };
  }
  if (layer === "cobertura") {
    const v = p.cobertura || 0;
    const hue = Math.round(v * 135); // red → green
    return { fill: `hsl(${hue},65%,55%)`, fillOpacity: 0.45, stroke: `hsl(${hue},65%,40%)` };
  }
  if (layer === "performance") {
    const v = p.conversao || 0;
    if (v > 0.6) return { fill: "#059669", fillOpacity: 0.38, stroke: "#047857" };
    if (v > 0.45) return { fill: "#d97706", fillOpacity: 0.32, stroke: "#b45309" };
    if (v > 0) return { fill: "#dc2626", fillOpacity: 0.30, stroke: "#b91c1c" };
    return { fill: "#a1a1aa", fillOpacity: 0.12, stroke: "#71717a" };
  }
  if (layer === "orfaos") {
    if (CONFLICTS[q.id]) return { fill: "#dc2626", fillOpacity: 0.32, stroke: "#dc2626" };
    if (!cabo) return { fill: "#dc2626", fillOpacity: 0.40, stroke: "#b91c1c" };
    return { fill: "#a1a1aa", fillOpacity: 0.08, stroke: "#a1a1aa" };
  }
  if (layer === "conflitos") {
    if (CONFLICTS[q.id]) return { fill: "#dc2626", fillOpacity: 0.45, stroke: "#b91c1c" };
    if (!cabo) return { fill: "#a1a1aa", fillOpacity: 0.08, stroke: "#71717a" };
    const c = CABOS.find(x => x.id === cabo);
    return { fill: c.cor, fillOpacity: 0.14, stroke: c.cor };
  }
  return { fill: "#a1a1aa", fillOpacity: 0.1, stroke: "#71717a" };
}

function MapCanvas({ layer, selected, onSelect, hoverQ, setHoverQ, editMode, lassoSet, onLassoAdd, showRoutes, caboFocus }) {
  const svgRef = useRef(null);
  const [lassoPath, setLassoPath] = useState([]);
  const [dragging, setDragging] = useState(false);

  function svgPoint(e) {
    const pt = svgRef.current.createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    return pt.matrixTransform(svgRef.current.getScreenCTM().inverse());
  }

  function onMouseDown(e) {
    if (editMode !== "lasso") return;
    const p = svgPoint(e);
    setLassoPath([[p.x, p.y]]);
    setDragging(true);
  }
  function onMouseMove(e) {
    if (!dragging) return;
    const p = svgPoint(e);
    setLassoPath(pp => [...pp, [p.x, p.y]]);
  }
  function onMouseUp() {
    if (!dragging) return;
    setDragging(false);
    // calc which quadras are inside lassoPath (via centroid)
    if (lassoPath.length > 2) {
      const inside = [];
      for (const q of QUADRAS_BASE) {
        if (pointInPoly(q.centroid, lassoPath)) inside.push(q.id);
      }
      onLassoAdd(inside);
    }
    setLassoPath([]);
  }

  function pointInPoly(pt, poly) {
    let [x, y] = pt, inside = false;
    for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
      const [xi, yi] = poly[i], [xj, yj] = poly[j];
      const intersect = ((yi > y) != (yj > y)) && (x < ((xj - xi) * (y - yi)) / (yj - yi + 1e-9) + xi);
      if (intersect) inside = !inside;
    }
    return inside;
  }

  return (
    <div className="relative w-full h-full" style={{ background: "var(--bg-page-2)" }}>
      <svg ref={svgRef} viewBox="0 0 800 500" style={{ width: "100%", height: "100%", display: "block", cursor: editMode === "lasso" ? "crosshair" : "default" }}
           onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}>
        <defs>
          <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
            <path d="M 24 0 L 0 0 0 24" fill="none" stroke="var(--rule)" strokeWidth="0.5"/>
          </pattern>
          <filter id="softShadow"><feDropShadow dx="0" dy="1" stdDeviation="1.2" floodOpacity="0.15"/></filter>
        </defs>
        <rect width="800" height="500" fill="url(#grid)"/>

        {/* Bordas do bairro Tomba (envelope) */}
        <path d="M 20 30 L 790 30 L 790 475 L 20 475 Z"
              fill="none" stroke="var(--tenant-primary)" strokeWidth="1.5" strokeDasharray="6 4" opacity="0.35"/>

        {/* Avenida principal horizontal */}
        <line x1="20" y1="244" x2="790" y2="244" stroke="var(--fg-ghost)" strokeWidth="3"/>
        <text x="780" y="240" textAnchor="end" fontSize="8.5" fontWeight="600" fill="var(--fg-dim)" letterSpacing="0.1em">AV. GETÚLIO VARGAS</text>
        {/* Avenida vertical */}
        <line x1="410" y1="30" x2="410" y2="475" stroke="var(--fg-ghost)" strokeWidth="3"/>

        {/* Quadras */}
        {QUADRAS_BASE.map(q => {
          const col = colorForQuadra(q, layer, selected, lassoSet);
          const isSelected = selected === q.id;
          const isLasso = lassoSet.has(q.id);
          const isOrphan = !OWNERS[q.id];
          const isConflict = !!CONFLICTS[q.id];
          const isCaboFocus = caboFocus && OWNERS[q.id] === caboFocus;
          const dim = caboFocus && !isCaboFocus;
          return (
            <g key={q.id}>
              <path d={polyToPath(q.points)}
                    className={`quadra ${isSelected ? "selected" : ""} ${isLasso ? "lasso" : ""}`}
                    fill={col.fill}
                    fillOpacity={dim ? col.fillOpacity * 0.25 : col.fillOpacity}
                    stroke={isLasso ? "var(--tenant-primary)" : col.stroke}
                    strokeWidth={isSelected ? 2.2 : (isLasso ? 2 : 1)}
                    style={{ filter: isSelected ? "url(#softShadow)" : "none", opacity: dim ? 0.5 : 1 }}
                    onMouseEnter={() => setHoverQ(q.id)}
                    onMouseLeave={() => setHoverQ(null)}
                    onClick={e => { e.stopPropagation(); onSelect(q.id); }}/>
              {(isOrphan && (layer === "orfaos" || layer === "responsavel")) && (
                <circle cx={q.centroid[0]} cy={q.centroid[1]} r={14} fill="none" stroke="#dc2626" strokeWidth="1.4" className="orfan-ring"/>
              )}
              {isConflict && (layer === "conflitos" || layer === "responsavel") && (
                <g>
                  <circle cx={q.centroid[0]} cy={q.centroid[1]} r={12} fill="#fff" stroke="#b91c1c" strokeWidth="1.6"/>
                  <text x={q.centroid[0]} y={q.centroid[1] + 4} textAnchor="middle" fontSize="11" fontWeight="900" fill="#b91c1c">!</text>
                </g>
              )}
              <text x={q.centroid[0]} y={q.centroid[1] + 3} textAnchor="middle" fontSize="9" fontWeight="700"
                    fill={dim ? "var(--fg-faint)" : "var(--fg-strong)"} opacity={isConflict ? 0 : 1} pointerEvents="none">
                {q.id}
              </text>
            </g>
          );
        })}

        {/* Rotas percorridas hoje por cada cabo */}
        {showRoutes && CABOS.map(c => {
          if (caboFocus && c.id !== caboFocus) return null;
          const pts = routesForCabo(c.id);
          if (pts.length < 2) return null;
          const d = pts.reduce((acc, p, i) => acc + (i === 0 ? `M ${p[0]},${p[1]}` : ` L ${p[0]},${p[1]}`), "");
          return <path key={c.id} d={d} fill="none" stroke={c.cor} strokeWidth="2" strokeOpacity="0.75" className="route-trail"/>;
        })}

        {/* Pins de cabos (início de rota = primeiro centroid) */}
        {CABOS.map(c => {
          if (caboFocus && c.id !== caboFocus) return null;
          const pts = routesForCabo(c.id);
          if (!pts.length) return null;
          const [x, y] = pts[pts.length - 1]; // posição atual = último ponto
          return (
            <g key={c.id}>
              <circle cx={x} cy={y} r={9} fill="#fff" stroke={c.cor} strokeWidth="2.2"/>
              <circle cx={x} cy={y} r={4} fill={c.cor}/>
            </g>
          );
        })}

        {/* Lasso path */}
        {lassoPath.length > 1 && (
          <path d={"M " + lassoPath.map(p => p.join(",")).join(" L ")} fill="rgba(0,42,123,0.08)" stroke="var(--tenant-primary)" strokeWidth="1.5" strokeDasharray="5 3"/>
        )}

        {/* Legenda título mapa */}
        <text x="28" y="22" fontSize="10" fontWeight="700" fill="var(--fg-dim)" letterSpacing="0.14em">BAIRRO TOMBA · FEIRA DE SANTANA · ~40 QUADRAS</text>
        <text x="28" y="490" fontSize="8.5" fill="var(--fg-faint)" fontFamily="JetBrains Mono">
          zoom 1:2.5k  ·  {QUADRAS_BASE.length} quadras  ·  {Object.keys(OWNERS).length} atribuídas  ·  {QUADRAS_BASE.length - Object.keys(OWNERS).length} órfãs  ·  {Object.keys(CONFLICTS).length} conflitos
        </text>
      </svg>

      {/* Hover tooltip */}
      {hoverQ && !dragging && (() => {
        const q = QUADRAS_BASE.find(x => x.id === hoverQ);
        const cabo = OWNERS[q.id];
        const c = cabo ? CABOS.find(x => x.id === cabo) : null;
        const p = perfFor(q.id);
        const conflict = CONFLICTS[q.id];
        return (
          <div className="absolute pointer-events-none card p-3 text-[11px]"
               style={{ top: 14, right: 14, width: 210, boxShadow: "0 6px 18px rgba(0,0,0,0.12)" }}>
            <div className="flex items-center justify-between mb-1">
              <div className="font-mono font-bold t-fg-strong text-[13px]">{q.id}</div>
              {conflict && <Chip tone="red">conflito</Chip>}
              {!cabo && !conflict && <Chip tone="red">órfã</Chip>}
              {cabo && !conflict && <Chip tone="green">atribuída</Chip>}
            </div>
            <div className="t-fg-muted mb-2">{q.rua} · {q.domicilios} domicílios</div>
            {c && (
              <div className="flex items-center gap-2 mb-2">
                <div style={{ width: 8, height: 8, borderRadius: 99, background: c.cor }}/>
                <span className="t-fg-strong font-semibold">{c.nome}</span>
              </div>
            )}
            {cabo && (
              <div className="grid grid-cols-2 gap-x-3 gap-y-1">
                <div className="t-fg-dim">Cobertura</div><div className="tnum font-semibold">{Math.round(p.cobertura*100)}%</div>
                <div className="t-fg-dim">Conversão</div><div className="tnum font-semibold">{Math.round(p.conversao*100)}%</div>
                <div className="t-fg-dim">Hoje</div><div className="tnum font-semibold">{p.feitoHoje} visitas</div>
              </div>
            )}
          </div>
        );
      })()}
    </div>
  );
}

Object.assign(window, { MapCanvas });
</script>

            <div className="text-[13px] font-bold t-fg-strong">{quadras[0]?.rua || "—"}</div>

            <div key={i} className="h-12 rounded flex items-end" style={{ background: v ? "var(--rule)" : "var(--chart-hover)" }} title={`${v}%`}>

function AssignPanel({ lassoSet, onAssign, onClose }) {
  const ids = [...lassoSet];
  const totalDom = ids.reduce((s, id) => {
    const q = QUADRAS_BASE.find(x => x.id === id);
    return s + (q?.domicilios || 0);

  return (
    <aside className="w-[340px] flex-shrink-0 border-l overflow-y-auto thin-scroll" style={{ borderColor: "var(--rule)", background: "var(--bg-card)" }}>

        <div className="flex items-start justify-between gap-2 mb-2">
          <div>
            <div className="card-sub mb-0.5">Nova sub-área</div>
            <div className="text-[20px] font-black font-display t-fg-strong leading-tight">{ids.length} quadras</div>
            <div className="text-[11px] t-fg-muted mt-0.5">{totalDom.toLocaleString("pt-BR")} domicílios · ~{Math.round(totalDom * 2.2).toLocaleString("pt-BR")} eleitores estimados</div>
          </div>
          <button className="btn-ghost" onClick={onClose} style={{ padding: "5px 7px" }}><CIcon name="X" size={11}/></button>

        <div className="flex flex-wrap gap-1 mt-2">

            const current = Object.values(OWNERS).filter(v => v === c.id).length;
            return (
              <button key={c.id} onClick={() => onAssign(c.id)}
                      className="w-full flex items-center gap-2 px-3 py-2.5 rounded"

                      onMouseEnter={e => { e.currentTarget.style.background = "var(--rule-strong)"; }}
                      onMouseLeave={e => { e.currentTarget.style.background = "var(--rule)"; }}>
                <div style={{ width: 10, height: 10, borderRadius: 99, background: c.cor }}/>
                <div className="flex-1 min-w-0 text-left">
                  <div className="text-[12px] font-semibold t-fg-strong">{c.nome}</div>
                  <div className="text-[10px] t-fg-dim">atualmente {current} quadras · +{ids.length} = <b className="t-fg-strong">{current + ids.length}</b></div>
                </div>
                <Chip tone={c.tier === "ouro" ? "amber" : "gray"}>{c.tier}</Chip>
              </button>
            );

        </div>
      </div>

      <div className="p-5 border-b" style={{ borderColor: "var(--rule)" }}>
        <div className="card-sub mb-2">Metas sugeridas</div>
        <div className="grid grid-cols-2 gap-3 text-[11px]">
          <div>
            <div className="t-fg-dim mb-0.5">Cadastros / dia</div>
            <div className="text-[15px] font-bold tnum">{Math.round(totalDom * 0.04)}</div>
          </div>
          <div>
            <div className="t-fg-dim mb-0.5">Cobertura até 30d</div>
            <div className="text-[15px] font-bold tnum">75%</div>
          </div>
        </div>
      </div>

      <div className="p-5">
        <button className="btn-ghost w-full" style={{ justifyContent: "center" }} onClick={onClose}>Cancelar seleção</button>
      </div>
    </aside>
  );
}

Object.assign(window, { RightDrawer });
</script>

<script type="text/babel" data-presets="react">
/* =========================================================================
 * Tweak panel
 * ========================================================================= */
const { useState: useTS, useEffect: useTE } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "layer": "conflitos",
  "showRoutes": true,
  "showTweaks": false
}/*EDITMODE-END*/;

function TweakPanel({ theme, setTheme, layer, setLayer, showRoutes, setShowRoutes, onClose }) {
  return (
    <div className="tweak-panel">
      <div className="flex items-center justify-between mb-3">
        <div className="font-bold text-[12.5px] t-fg-strong flex items-center gap-1.5">
          <CIcon name="Settings" size={12}/>Tweaks
        </div>
        <button onClick={onClose} className="btn-ghost" style={{ padding: "3px 6px" }}><CIcon name="X" size={10}/></button>
      </div>

      <div className="space-y-3 text-[11px]">
        <div>
          <div className="card-sub mb-1.5">Tema</div>
          <div className="flex gap-1">
            {["light","dark"].map(t => (
              <button key={t} onClick={() => setTheme(t)}
                      className={`btn-ghost flex-1 ${theme === t ? "active" : ""}`}
                      style={{ justifyContent: "center", fontSize: 10.5, textTransform: "capitalize" }}>
                {t}
              </button>
            ))}
          </div>
        </div>

        <div>
          <div className="card-sub mb-1.5">Camada inicial</div>
          <div className="grid grid-cols-3 gap-1">
            {[["responsavel","Resp."],["cobertura","Cob."],["performance","Perf."],["orfaos","Órfãs"],["conflitos","Confl."]].map(([k,l]) => (
              <button key={k} onClick={() => setLayer(k)}
                      className={`btn-ghost ${layer === k ? "active" : ""}`}
                      style={{ justifyContent: "center", fontSize: 10, padding: "5px 4px" }}>
                {l}
              </button>
            ))}
          </div>
        </div>

        <div className="flex items-center justify-between pt-1">
          <div className="t-fg-muted">Rotas animadas</div>
          <button onClick={() => setShowRoutes(!showRoutes)}
                  className="btn-ghost" style={{ padding: "4px 10px", fontSize: 10.5 }}>
            {showRoutes ? "Ligado" : "Desligado"}
          </button>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { TweakPanel, TWEAK_DEFAULTS });

/* =========================================================================
 * App (topbar + shell)
 * ========================================================================= */

function Topbar({ onToggleTweaks }) {
  return (
    <header className="topbar">
      <div className="flex items-center gap-3">
        <div style={{ width: 34, height: 34, borderRadius: 8, background: "var(--tenant-primary)", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 12, letterSpacing: "-0.02em" }}>UB</div>
        <div style={{ whiteSpace: "nowrap" }}>
          <div className="text-[10px] t-fg-dim uppercase tracking-[0.14em] font-semibold" style={{ whiteSpace: "nowrap" }}>União Brasil · Campanha 2026</div>
          <div className="text-[14px] font-bold t-fg-strong leading-tight" style={{ whiteSpace: "nowrap" }}>Mapa do Cabo · Coordenação territorial</div>
        </div>
      </div>

      <div className="flex-1"/>

      <div className="flex items-center gap-2">
        <div className="text-[11px] t-fg-dim">Coordenador:</div>
        <div className="flex items-center gap-2 px-2 py-1 rounded" style={{ background: "var(--rule)" }}>
          <div style={{ width: 20, height: 20, borderRadius: 99, background: "linear-gradient(135deg,#fbbf24,#d97706)", color: "#78350f", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 9 }}>OC</div>
          <span className="text-[12px] font-semibold t-fg-strong" style={{ whiteSpace: "nowrap" }}>Otávio Campos</span>
          <span className="text-[10px] t-fg-dim" style={{ whiteSpace: "nowrap" }}>· Recôncavo</span>
        </div>
        <div style={{ width: 1, height: 18, background: "var(--rule)" }}/>
        <button className="btn-ghost"><CIcon name="Download" size={11}/>Exportar</button>
        <button className="btn-ghost" onClick={onToggleTweaks}><CIcon name="Settings" size={11}/>Tweaks</button>
      </div>
    </header>
  );
}

function App() {
  // Load tweaks from DOM defaults
  const [theme, setTheme] = useState(TWEAK_DEFAULTS.theme);
  const [layer, setLayer] = useState(TWEAK_DEFAULTS.layer);
  const [showRoutes, setShowRoutes] = useState(TWEAK_DEFAULTS.showRoutes);
  const [showTweaks, setShowTweaks] = useState(TWEAK_DEFAULTS.showTweaks);

  const [selected, setSelected] = useState(null);
  const [hoverQ, setHoverQ] = useState(null);
  const [editMode, setEditMode] = useState("view");
  const [lassoSet, setLassoSet] = useState(new Set());
  const [caboFocus, setCaboFocus] = useState(null);
  const [liveOwners, setLiveOwners] = useState({ ...OWNERS });

  useEffect(() => { document.documentElement.setAttribute("data-theme", theme); }, [theme]);

  // Edit-mode protocol (host parent toolbar)
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === "__activate_edit_mode") setShowTweaks(true);
      if (e.data?.type === "__deactivate_edit_mode") setShowTweaks(false);
    };
    window.addEventListener("message", handler);
    try { window.parent.postMessage({ type: "__edit_mode_available" }, "*"); } catch {}
    return () => window.removeEventListener("message", handler);
  }, []);

  function persistTweak(patch) {
    try { window.parent.postMessage({ type: "__edit_mode_set_keys", edits: patch }, "*"); } catch {}
  }

  function onLassoAdd(ids) {
    setLassoSet(new Set(ids));
    setSelected(null);
    setCaboFocus(null);
  }

  function onAssign(caboId) {
    const next = { ...liveOwners };
    for (const id of lassoSet) next[id] = caboId;
    setLiveOwners(next);
    // mirror in OWNERS runtime for downstream reads
    Object.keys(OWNERS).forEach(k => delete OWNERS[k]);
    Object.assign(OWNERS, next);
    setLassoSet(new Set());
    setEditMode("view");
  }

  return (
    <>
      <div className="flex flex-col h-screen">
        <Topbar onToggleTweaks={() => { setShowTweaks(!showTweaks); persistTweak({ showTweaks: !showTweaks }); }}/>
        <div className="flex-1 flex min-h-0">
          <LeftToolbar
            layer={layer} setLayer={(v) => { setLayer(v); persistTweak({ layer: v }); }}
            editMode={editMode} setEditMode={setEditMode}
            showRoutes={showRoutes} setShowRoutes={(v) => { setShowRoutes(v); persistTweak({ showRoutes: v }); }}
            caboFocus={caboFocus} setCaboFocus={setCaboFocus}/>
          <div className="flex-1 min-w-0 relative">
            <MapCanvas
              layer={layer}
              selected={selected} onSelect={(id) => { setSelected(id); setCaboFocus(null); setLassoSet(new Set()); }}
              hoverQ={hoverQ} setHoverQ={setHoverQ}
              editMode={editMode} lassoSet={lassoSet} onLassoAdd={onLassoAdd}
              showRoutes={showRoutes} caboFocus={caboFocus}/>
          </div>
          <RightDrawer
            selected={selected} setSelected={setSelected}
            lassoSet={lassoSet} setLassoSet={setLassoSet}
            onAssign={onAssign}
            caboFocus={caboFocus}/>
        </div>
      </div>
      {showTweaks && (
        <TweakPanel
          theme={theme} setTheme={(v) => { setTheme(v); persistTweak({ theme: v }); }}
          layer={layer} setLayer={(v) => { setLayer(v); persistTweak({ layer: v }); }}
          showRoutes={showRoutes} setShowRoutes={(v) => { setShowRoutes(v); persistTweak({ showRoutes: v }); }}
          onClose={() => { setShowTweaks(false); persistTweak({ showTweaks: false }); }}/>
      )}
    </>
  );
}

Object.assign(window, { App });
</script>

<script>
// Defer render until Babel has processed all text/babel scripts
function __boot() {
  if (typeof window.App !== "function") { setTimeout(__boot, 30); return; }
  try {
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(window.App));
  } catch (err) {
    console.error("App render failed:", err);
    document.getElementById("root").innerHTML = "<pre style='padding:20px;color:red;font:12px monospace;white-space:pre-wrap'>" + (err.stack || err.message) + "</pre>";
  }
}
__boot();
</script>

</body>
