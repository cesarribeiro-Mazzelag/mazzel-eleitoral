<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark" data-tenant="ub">
<head>
<meta charset="UTF-8">
<title>Dossiê · 8 Cargos · UB</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../F1-fundacao/tokens.css">
<script src="../F1-fundacao/theme-bootstrap.js"></script>
<style>
html, body { height: 100%; margin: 0; overflow: hidden; }
.app { display: flex; flex-direction: column; height: 100vh; }

/* ============ TOP BAR DE CARGO ============ */
.role-bar {
  height: 64px; flex-shrink: 0;
  background: var(--mz-bg-topbar);
  border-bottom: 1px solid var(--mz-rule);
  display: flex; align-items: center; gap: 20px;
  padding: 0 24px; overflow: hidden;
}
.role-bar h1 {
  font-size: 13px; font-weight: 700;
  color: var(--mz-fg-strong);
  letter-spacing: 0.04em; margin: 0;
  white-space: nowrap;
}
.role-bar .helper {
  font-size: 11px; color: var(--mz-fg-faint);
  white-space: nowrap;
}
.role-pills { display: flex; gap: 6px; overflow-x: auto; padding: 6px 0; flex: 1; scrollbar-width: thin; scrollbar-color: var(--mz-rule-strong) transparent; }
.role-pills::-webkit-scrollbar { height: 4px; }
.role-pills::-webkit-scrollbar-thumb { background: var(--mz-rule-strong); border-radius: 2px; }
.role-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px;
  background: var(--mz-bg-card); border: 1px solid var(--mz-rule);
  color: var(--mz-fg-muted);
  border-radius: var(--mz-r-pill);
  font-size: 12px; font-weight: 500;
  white-space: nowrap; cursor: pointer; transition: all 120ms;
}
.role-pill:hover { border-color: var(--mz-fg-faint); color: var(--mz-fg); }
.role-pill.active {
  background: var(--mz-tenant-primary);
  border-color: var(--mz-tenant-primary-strong);
  color: #fff;
  box-shadow: 0 0 0 1px var(--mz-tenant-accent-soft);
}
.role-pill .num {
  font-family: var(--mz-font-mono); font-size: 10px;
  background: rgba(0,0,0,0.3); padding: 1px 5px; border-radius: 3px;
}
.role-pill.active .num { background: rgba(255, 204, 0, 0.25); color: #FFCC00; }

/* ============ MAIN GRID ============ */
.layout {
  flex: 1; display: grid;
  grid-template-columns: 1fr 320px;
  min-height: 0;
}

/* ============ DOSSIÊ ============ */
.dossie {
  overflow-y: auto;
  background:
    radial-gradient(1000px 400px at 30% -100px, rgba(0, 42, 123, 0.10), transparent),
    var(--mz-bg-page);
}
.dossie::-webkit-scrollbar { width: 6px; }
.dossie::-webkit-scrollbar-thumb { background: var(--mz-rule-strong); }

/* ============ HEADER do POLÍTICO ============ */
.hero {
  padding: 28px 32px 24px;
  border-bottom: 1px solid var(--mz-rule);
  display: grid;
  grid-template-columns: 96px 1fr auto;
  gap: 24px;
  align-items: center;
  position: relative;
}
.hero::before {
  content: '';
  position: absolute; bottom: 0; left: 32px; right: 32px; height: 3px;
  background: linear-gradient(90deg, var(--mz-tenant-primary), var(--mz-tenant-accent));
  border-radius: 2px;
}
.hero .photo {
  width: 96px; height: 96px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--mz-tenant-primary), var(--mz-tenant-primary-strong));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 44px;
  color: var(--mz-tenant-accent);
  letter-spacing: 0.04em;
  box-shadow: inset 0 4px 12px rgba(0,0,0,0.3), 0 0 0 3px var(--mz-tenant-accent-soft);
}
.hero .info .eyebrow {
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--mz-tenant-accent);
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 4px;
}
.hero .info h1 {
  font-size: 36px; font-weight: 800;
  letter-spacing: -0.025em; color: var(--mz-fg-strong);
  margin: 0; line-height: 1.05;
}
.hero .info .meta {
  display: flex; gap: 14px; align-items: center;
  margin-top: 8px;
  font-size: 12px; color: var(--mz-fg-muted);
}
.hero .info .meta b { color: var(--mz-fg); font-weight: 600; }
.hero .info .meta .dot { width: 3px; height: 3px; background: var(--mz-fg-faint); border-radius: 50%; }

.hero .ovr {
  display: flex; gap: 16px; align-items: center;
}
.hero .ovr .big {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 78px; font-weight: 700;
  color: var(--mz-tenant-accent);
  line-height: 1; letter-spacing: 0.02em;
  text-shadow: 0 0 20px rgba(255, 204, 0, 0.25);
}
.hero .ovr .lbl {
  font-size: 9px; letter-spacing: 0.20em;
  color: var(--mz-fg-faint); font-weight: 700;
  text-transform: uppercase; margin-top: 4px;
}
.hero .ovr .tier-pill {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  background: var(--mz-tenant-accent);
  color: var(--mz-fg-on-accent);
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
  letter-spacing: 0.04em;
}

/* ============ SECTION ANCHORS ============ */
.toc {
  position: sticky; top: 0; z-index: 5;
  display: flex; gap: 4px; overflow-x: auto;
  background: var(--mz-bg-page);
  border-bottom: 1px solid var(--mz-rule);
  padding: 10px 32px;
  scrollbar-width: none;
}
.toc::-webkit-scrollbar { display: none; }
.toc-item {
  font-size: 11px; font-weight: 600;
  color: var(--mz-fg-muted);
  padding: 6px 10px; border-radius: var(--mz-r-md);
  white-space: nowrap; cursor: pointer;
  transition: all 120ms;
  display: inline-flex; align-items: center; gap: 6px;
}
.toc-item:hover { background: var(--mz-bg-card); color: var(--mz-fg); }
.toc-item.priority {
  background: var(--mz-tenant-primary-soft);
  color: var(--mz-tenant-accent);
}
.toc-item.hidden { display: none; }
.toc-item .pri-dot {
  width: 5px; height: 5px;
  background: var(--mz-tenant-accent);
  border-radius: 50%;
}

/* ============ SECTIONS ============ */
.dossie-body { padding: 24px 32px 48px; display: flex; flex-direction: column; gap: 24px; }
.section {
  background: var(--mz-bg-card);
  border: 1px solid var(--mz-rule);
  border-radius: var(--mz-r-lg);
  overflow: hidden;
  transition: opacity 200ms;
}
.section.hidden { display: none; }
.section.priority {
  border-color: var(--mz-tenant-accent-soft);
  box-shadow: 0 0 0 1px var(--mz-tenant-accent-soft) inset;
}
.section.placeholder { opacity: 0.55; }
.section header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--mz-rule);
  display: flex; align-items: center; gap: 12px;
  background: var(--mz-bg-card-2);
}
.section header .num {
  font-family: var(--mz-font-mono);
  font-size: 10px; font-weight: 700;
  color: var(--mz-tenant-accent);
  letter-spacing: 0.10em;
}
.section header h2 {
  font-size: 14px; font-weight: 700;
  color: var(--mz-fg-strong);
  margin: 0; letter-spacing: 0.02em;
}
.section header .meta {
  margin-left: auto;
  font-size: 10px; color: var(--mz-fg-faint);
  letter-spacing: 0.06em; font-weight: 500;
}
.section header .priority-tag {
  font-size: 9px;
  background: var(--mz-tenant-accent);
  color: var(--mz-fg-on-accent);
  padding: 2px 6px; border-radius: var(--mz-r-pill);
  font-weight: 700;
  letter-spacing: 0.06em;
}
.section header .placeholder-tag {
  font-size: 9px;
  background: var(--mz-warn-soft);
  color: var(--mz-warn);
  padding: 2px 6px; border-radius: var(--mz-r-pill);
  font-weight: 700;
  letter-spacing: 0.06em;
}
.section .body { padding: 18px; }

/* === PLACEHOLDER (em construção) === */
.placeholder-body {
  text-align: center;
  padding: 32px 18px;
  color: var(--mz-fg-faint);
  font-size: 12px;
  background:
    repeating-linear-gradient(45deg, transparent 0 8px, var(--mz-bg-card-2) 8px 9px);
  border-radius: var(--mz-r-md);
}
.placeholder-body b { display: block; font-size: 13px; color: var(--mz-fg-muted); margin-bottom: 4px; }

/* === sub-medidas === */
.submed-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.submed {
  background: var(--mz-bg-card-2);
  border-radius: var(--mz-r-md);
  padding: 12px;
}
.submed .lbl {
  font-size: 9.5px;
  letter-spacing: 0.14em;
  color: var(--mz-fg-faint);
  text-transform: uppercase;
  font-weight: 700;
}
.submed .v {
  font-family: var(--mz-font-mono);
  font-size: 22px; font-weight: 800;
  color: var(--mz-fg-strong); letter-spacing: -0.03em;
  margin-top: 2px; line-height: 1;
}
.submed .delta { font-size: 10px; margin-top: 4px; font-variant-numeric: tabular-nums; }
.submed .delta.up { color: var(--mz-ok); }
.submed .delta.down { color: var(--mz-danger); }
.submed .bar {
  height: 4px; background: var(--mz-bg-elevated); border-radius: 2px;
  margin-top: 6px; overflow: hidden;
}
.submed .bar > span {
  display: block; height: 100%;
  background: linear-gradient(90deg, var(--mz-tenant-primary), var(--mz-tenant-accent));
}

/* === tabela genérica === */
.t {
  width: 100%; border-collapse: collapse;
  font-size: 12px;
}
.t th, .t td {
  padding: 8px 12px;
  text-align: left;
  border-bottom: 1px solid var(--mz-rule);
}
.t th {
  font-size: 9.5px; font-weight: 700;
  color: var(--mz-fg-faint);
  letter-spacing: 0.10em;
  text-transform: uppercase;
}
.t td { color: var(--mz-fg-muted); }
.t td b { color: var(--mz-fg); font-weight: 600; }
.t tr:last-child td { border-bottom: 0; }

.tabular-num, .tnum { font-variant-numeric: tabular-nums; }

/* === MapaEleitoral.tsx EM MODO PREVIEW (placeholder geográfico Globo G1) === */
.minimap {
  background:
    linear-gradient(180deg, rgba(0,42,123,0.06), rgba(0,42,123,0.02)),
    var(--mz-bg-card-2);
  border-radius: var(--mz-r-md);
  padding: 14px;
  display: grid; grid-template-columns: 1.5fr 1fr; gap: 14px;
  align-items: center;
}
.minimap .geo {
  position: relative;
  border-radius: var(--mz-r-sm);
  overflow: hidden;
  background:
    radial-gradient(120% 120% at 50% 110%, rgba(0,42,123,0.18), transparent 60%),
    #07070a;
  border: 1px solid var(--mz-rule);
}
.minimap .geo svg { display:block; width:100%; height:100%; }
.minimap .geo .marker-tag {
  position: absolute; top: 6px; left: 8px;
  font-family: var(--mz-font-mono);
  font-size: 9px; letter-spacing: 0.06em;
  color: var(--mz-fg-faint);
  background: rgba(9,9,11,0.85);
  padding: 3px 6px; border-radius: 3px;
  border: 1px solid var(--mz-rule);
  text-transform: uppercase;
}
.minimap .geo .ctx-tag {
  position: absolute; bottom: 6px; right: 8px;
  font-family: var(--mz-font-mono);
  font-size: 9px;
  color: var(--mz-fg-muted);
  background: rgba(9,9,11,0.7);
  padding: 3px 6px; border-radius: 3px;
}
.minimap .geo .scale {
  position: absolute; bottom: 6px; left: 8px;
  display: flex; gap: 2px; align-items: center;
}
.minimap .geo .scale span {
  width: 10px; height: 5px; display: block;
}
.minimap .geo .scale .lbl {
  font-family: var(--mz-font-mono);
  font-size: 8px; color: var(--mz-fg-faint);
  margin: 0 4px;
}
/* legado removido — não usar mais grid quadriculado */
.minimap .grid {
  display: grid;
  grid-template-columns: repeat(15, 1fr);
  gap: 1px;
  height: 90px;
}
.minimap .grid div { border-radius: 1px; }
.minimap .legend { font-size: 10px; color: var(--mz-fg-muted); line-height: 1.6; }
.minimap .legend b { color: var(--mz-fg-strong); display: block; margin-bottom: 4px; font-size: 11px; }

/* === alertas (jurídicos) === */
.alert-list { display: flex; flex-direction: column; gap: 8px; }
.alert-item {
  display: grid; grid-template-columns: 4px 1fr auto; gap: 12px;
  padding: 10px 14px;
  background: var(--mz-bg-card-2);
  border-radius: var(--mz-r-md);
  align-items: start;
}
.alert-item .strip { width: 4px; height: 100%; min-height: 28px; border-radius: 2px; }
.alert-item.alta .strip { background: var(--mz-danger); }
.alert-item.media .strip { background: var(--mz-warn); }
.alert-item.baixa .strip { background: var(--mz-info); }
.alert-item .body b { display: block; color: var(--mz-fg-strong); font-size: 12px; }
.alert-item .body span { color: var(--mz-fg-muted); font-size: 11px; }
.alert-item .when { font-size: 10px; color: var(--mz-fg-faint); font-family: var(--mz-font-mono); }

/* === atividade legislativa === */
.legis-row {
  display: grid; grid-template-columns: 60px 1fr auto auto;
  gap: 12px; padding: 8px 0;
  border-bottom: 1px solid var(--mz-rule);
  align-items: center;
  font-size: 12px;
}
.legis-row:last-child { border-bottom: 0; }
.legis-row .id {
  font-family: var(--mz-font-mono); font-size: 11px; font-weight: 600;
  color: var(--mz-tenant-accent);
}
.legis-row .titulo b { color: var(--mz-fg-strong); display: block; font-weight: 600; }
.legis-row .titulo span { color: var(--mz-fg-faint); font-size: 11px; }
.legis-row .vote {
  font-size: 10px; padding: 2px 6px; border-radius: var(--mz-r-pill);
  font-weight: 700; letter-spacing: 0.04em;
}
.legis-row .vote.sim { background: var(--mz-ok-soft); color: var(--mz-ok); }
.legis-row .vote.nao { background: var(--mz-danger-soft); color: var(--mz-danger); }
.legis-row .vote.abst { background: var(--mz-bg-elevated); color: var(--mz-fg-muted); }
.legis-row .when { font-family: var(--mz-font-mono); font-size: 10px; color: var(--mz-fg-faint); }

/* === trajetória timeline === */
.tl { position: relative; padding-left: 20px; }
.tl::before {
  content: ''; position: absolute; left: 5px; top: 8px; bottom: 8px;
  width: 2px; background: var(--mz-rule);
}
.tl-row { position: relative; padding-bottom: 14px; padding-left: 12px; }
.tl-row:last-child { padding-bottom: 0; }
.tl-row::before {
  content: ''; position: absolute; left: -15px; top: 4px;
  width: 12px; height: 12px;
  background: var(--mz-tenant-accent);
  border-radius: 50%;
  box-shadow: 0 0 0 3px var(--mz-bg-card);
}
.tl-row.dim::before { background: var(--mz-fg-faint); }
.tl-row .y { font-family: var(--mz-font-mono); font-size: 10px; color: var(--mz-tenant-accent); font-weight: 700; }
.tl-row .what { color: var(--mz-fg-strong); font-weight: 600; font-size: 13px; margin-top: 2px; }
.tl-row .desc { color: var(--mz-fg-muted); font-size: 11px; line-height: 1.55; margin-top: 2px; }

/* === financeiro split === */
.fin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.fin-card {
  background: var(--mz-bg-card-2);
  border-radius: var(--mz-r-md);
  padding: 14px;
}
.fin-card .lbl { font-size: 9.5px; color: var(--mz-fg-faint); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; }
.fin-card .v { font-size: 22px; font-weight: 800; color: var(--mz-fg-strong); margin-top: 4px; font-variant-numeric: tabular-nums; line-height: 1; }
.fin-card .sub { font-size: 11px; color: var(--mz-fg-muted); margin-top: 6px; }

/* === atos administrativos (prefeito) === */
.atos { display: flex; flex-direction: column; gap: 10px; }
.ato {
  display: grid; grid-template-columns: 80px 1fr auto;
  gap: 12px; padding: 10px;
  background: var(--mz-bg-card-2); border-radius: var(--mz-r-md);
  align-items: center;
}
.ato .num { font-family: var(--mz-font-mono); font-size: 11px; color: var(--mz-tenant-accent); font-weight: 700; }
.ato .titulo b { color: var(--mz-fg-strong); display: block; font-weight: 600; font-size: 12px; }
.ato .titulo span { color: var(--mz-fg-faint); font-size: 11px; }
.ato .when { font-size: 10px; color: var(--mz-fg-faint); }

/* === proposições por área (vereador) === */
.proposicoes-stack {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
}
.prop-card {
  background: var(--mz-bg-card-2);
  border-radius: var(--mz-r-md);
  padding: 14px;
  border-left: 3px solid var(--mz-tenant-accent);
}
.prop-card .area { font-size: 9.5px; letter-spacing: 0.14em; color: var(--mz-fg-faint); text-transform: uppercase; font-weight: 700; }
.prop-card .qty { font-family: var(--mz-font-mono); font-size: 26px; font-weight: 800; color: var(--mz-fg-strong); margin: 4px 0 2px; line-height: 1; }
.prop-card .examples { font-size: 11px; color: var(--mz-fg-muted); line-height: 1.45; }

/* === IA estratégica painel === */
.ia-box {
  background:
    linear-gradient(135deg, rgba(0,42,123,0.20), transparent),
    var(--mz-bg-card-2);
  border: 1px solid var(--mz-tenant-primary-soft);
  border-radius: var(--mz-r-md);
  padding: 16px;
  display: grid; grid-template-columns: auto 1fr; gap: 14px;
}
.ia-box .ia-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--mz-tenant-primary), var(--mz-tenant-accent));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.ia-box .ia-msg { font-size: 12px; color: var(--mz-fg); line-height: 1.6; }
.ia-box .ia-msg b { color: var(--mz-tenant-accent); }
.ia-box .ia-msg .src { display: block; font-size: 10px; color: var(--mz-fg-faint); margin-top: 6px; letter-spacing: 0.04em; }

/* ============ INSPECTOR (right panel) ============ */
.insp {
  background: var(--mz-bg-sidebar);
  border-left: 1px solid var(--mz-rule);
  overflow-y: auto;
  padding: 0;
}
.insp::-webkit-scrollbar { width: 4px; }
.insp::-webkit-scrollbar-thumb { background: var(--mz-rule-strong); }
.insp section { padding: 16px 20px; border-bottom: 1px solid var(--mz-rule); }
.insp h3 {
  font-size: 9.5px; letter-spacing: 0.16em;
  color: var(--mz-fg-faint); text-transform: uppercase;
  font-weight: 700; margin: 0 0 10px;
}
.insp h2 {
  font-size: 17px; font-weight: 800;
  color: var(--mz-fg-strong); margin: 0;
  letter-spacing: -0.015em;
}
.insp .eyebrow {
  font-size: 10px; letter-spacing: 0.10em;
  color: var(--mz-tenant-accent); text-transform: uppercase;
  font-weight: 700; margin-bottom: 4px;
}
.insp p {
  font-size: 12px; color: var(--mz-fg);
  line-height: 1.6; margin: 0 0 10px;
}
.insp .pr-list { display: flex; flex-direction: column; gap: 5px; font-size: 11px; }
.insp .pr-row {
  display: grid; grid-template-columns: 16px 1fr;
  gap: 8px;
  padding: 5px 0;
  border-bottom: 1px dashed var(--mz-rule);
  color: var(--mz-fg);
}
.insp .pr-row:last-child { border-bottom: 0; }
.insp .pr-num {
  font-family: var(--mz-font-mono); font-size: 9.5px;
  color: var(--mz-tenant-accent); font-weight: 700;
}
.insp .pr-row.priority b { color: var(--mz-tenant-accent); }
.insp .pr-row.hidden b { color: var(--mz-fg-faint); text-decoration: line-through; }
.insp .pr-row.placeholder b { color: var(--mz-warn); }

.insp code {
  background: var(--mz-bg-card);
  border: 1px solid var(--mz-rule);
  padding: 1px 5px; border-radius: 3px;
  font-family: var(--mz-font-mono); font-size: 11px;
  color: var(--mz-fg-strong);
}

</style>
</head>
<body>

<div class="app">

  <!-- ====== SWITCHER DE CARGO ====== -->
  <header class="role-bar">
    <h1>Dossiê · Layout por Cargo</h1>
    <span class="helper">Cada cargo prioriza/oculta seções diferentes · clique nos cargos →</span>
    <div class="role-pills" id="rolePills"></div>
  </header>

  <!-- ====== LAYOUT ====== -->

}

function renderDossie(role) {
  // Header + TOC + Sections
  $dossie.innerHTML = `
    <div class="hero">
      <div class="photo">${role.iniciais}</div>
      <div class="info">
        <div class="eyebrow">${role.eyebrow}</div>
        <h1>${role.nome}</h1>
        <div class="meta">${role.metas.map((m, i) => `${i>0 ? '<span class="dot"></span>':''}<span>${m}</span>`).join('')}</div>
      </div>
      <div class="ovr">
        <div>
          <div class="big">${role.ovr ?? '··'}</div>
          <div class="lbl">${role.ovr ? 'OVR' : 'EM CONSTRUÇÃO'}</div>
        </div>
        <div class="tier-pill">${role.tier}</div>
      </div>
    </div>

    <nav class="toc">
      ${SECTIONS.map(s => {
        const isPriority = role.priority.includes(s.id);
        const isHidden = role.hidden.includes(s.id);
        const isPlaceholder = role.placeholder.includes(s.id);
        const cls = [
          isPriority ? 'priority' : '',
          isHidden ? 'hidden' : '',
        ].filter(Boolean).join(' ');
        return `<a class="toc-item ${cls}" href="#sec-${s.id}">
          ${isPriority ? '<span class="pri-dot"></span>':''}
          ${s.title}
        </a>`;
      }).join('')}
    </nav>

    <div class="dossie-body">
      ${SECTIONS.filter(s => !role.hidden.includes(s.id)).map(s => {
        const isPriority = role.priority.includes(s.id);
        const isPlaceholder = role.placeholder.includes(s.id) || role.id === 'fall';
        const tagHTML = isPriority ? '<span class="priority-tag">PRIORIDADE</span>' :
                       isPlaceholder ? '<span class="placeholder-tag">EM CONSTRUÇÃO</span>' : '';

        let body;
        if (role.id === 'fall') {
          body = `<div class="placeholder-body"><b>Dado em curadoria</b>Aguardando enriquecimento via TSE/DOU/clipping</div>`;
        } else if (isPlaceholder) {
          const placeholderFn = CONTENT[s.id];
          // se a seção tem placeholder explícito definido, usar; senão genérico
          body = placeholderFn && (s.id === 'fin' || s.id === 'emendas' || s.id === 'votos')
            ? placeholderFn(role)
            : `<div class="placeholder-body"><b>Dado em curadoria</b>Esta seção será preenchida assim que a fonte oficial publicar</div>`;
        } else {
          const fn = CONTENT[s.id];
          body = fn ? fn(role) : `<div class="placeholder-body">Conteúdo desta seção pendente</div>`;
        }

        return `<section class="section ${isPriority?'priority':''} ${isPlaceholder?'placeholder':''}" id="sec-${s.id}">
          <header>
            <span class="num">${s.num}</span>
            <h2>${s.title}</h2>
            ${tagHTML}
            <span class="meta">${isPriority ? 'Foco do cargo' : isPlaceholder ? 'Aguardando dado' : 'Padrão'}</span>
          </header>
          <div class="body">${body}</div>
        </section>`;
      }).join('')}
    </div>
  `;

  // Render minimaps
  if (CONTENT.mapa && document.getElementById(`mp-${role.id}`)) {
    renderMinimap(`mp-${role.id}`, role);
  }
}

const HEAT_PALETTE = ['#1e3a8a','#1d4ed8','#2563eb','#f59e0b','#fb923c','#dc2626'];
function heatColor(v) {
  // v 0-1 → índice na escala farol percentil
  const idx = Math.min(HEAT_PALETTE.length - 1, Math.floor(v * HEAT_PALETTE.length));
  return HEAT_PALETTE[idx];
}

function renderMinimap(id, role) {
  const el = document.getElementById(id);
  if (!el) return;
  const ctx = MAP_CTX[role.id] || MAP_CTX._default;
  const shape = MAP_SHAPES[ctx.shape] || MAP_SHAPES.br;

  const polys = shape.map(p => `
    <path d="${p.d}"
          fill="${heatColor(p.hot)}"
          fill-opacity="${0.45 + p.hot * 0.45}"
          stroke="#0a0a0b"
          stroke-width="0.8"/>
  `).join('');

  // labels só nos polígonos com hot ≥ 0.6 pra não poluir
  const labels = shape.filter(p => p.hot >= 0.55).map(p => {
    // extrai centroide aproximado a partir do bounding-box do path d
    const nums = p.d.match(/-?\d+(?:\.\d+)?/g).map(Number);
    let xs = [], ys = [];
    for (let i = 0; i < nums.length; i += 2) { xs.push(nums[i]); ys.push(nums[i+1]); }
    const cx = (Math.min(...xs) + Math.max(...xs)) / 2;
    const cy = (Math.min(...ys) + Math.max(...ys)) / 2;
    return `<text x="${cx}" y="${cy}" text-anchor="middle"
                  font-family="Inter, sans-serif" font-size="7" font-weight="700"
                  fill="rgba(255,255,255,0.85)" letter-spacing="0.04em">${p.label.toUpperCase()}</text>`;
  }).join('');

  // grade leve de fundo pra dar sensação cartográfica
  const graticule = `
    <g stroke="rgba(255,255,255,0.04)" stroke-width="0.4">
      <line x1="0" y1="50"  x2="280" y2="50"/>
      <line x1="0" y1="100" x2="280" y2="100"/>
      <line x1="0" y1="150" x2="280" y2="150"/>
      <line x1="60"  y1="0" x2="60"  y2="200"/>
      <line x1="140" y1="0" x2="140" y2="200"/>
      <line x1="220" y1="0" x2="220" y2="200"/>
    </g>`;

  // mantém os tags existentes (marker-tag, ctx-tag, scale) já renderizados
  // pelo template — só insere o SVG.
  const svg = `
    <svg viewBox="0 0 280 200" preserveAspectRatio="xMidYMid meet"
         style="position:absolute; inset:0; width:100%; height:100%;">
      ${graticule}
      ${polys}
      ${labels}
    </svg>`;

  // injeta o SVG mantendo os 3 tags absolutos
  el.insertAdjacentHTML('afterbegin', svg);
}

function renderInsp(role) {
  const visibleSections = SECTIONS.filter(s => !role.hidden.includes(s.id));
  const totalSections = SECTIONS.length;
  const priorityCount = role.priority.length;
  const hiddenCount = role.hidden.length;
  const placeholderCount = role.placeholder.length;

  $insp.innerHTML = `
    <section>
      <div class="eyebrow">${role.eyebrow}</div>
      <h2>${role.pill}</h2>
      <p style="color:var(--mz-fg-muted); font-size:11px; margin-top:8px">${role.desc}</p>
    </section>

    <section>
      <h3>Composição do Layout</h3>
      <div class="pr-list">
        ${SECTIONS.map((s, i) => {
          const isPriority = role.priority.includes(s.id);
          const isHidden = role.hidden.includes(s.id);
          const isPlaceholder = role.placeholder.includes(s.id);
          const cls = isHidden ? 'hidden' : isPriority ? 'priority' : isPlaceholder ? 'placeholder' : '';
          const status = isHidden ? '🚫' : isPriority ? '★' : isPlaceholder ? '◯' : '·';
          return `<div class="pr-row ${cls}">
            <span class="pr-num">${s.num}</span>
            <div><b>${status} ${s.title}</b></div>
          </div>`;
        }).join('')}
      </div>
    </section>

    <section>
      <h3>Resumo</h3>
      <div class="pr-list">
        <div class="pr-row"><span class="pr-num">★</span><div><b style="color:var(--mz-tenant-accent)">${priorityCount}</b> seções priorizadas</div></div>
        <div class="pr-row"><span class="pr-num">◯</span><div><b style="color:var(--mz-warn)">${placeholderCount}</b> em construção (fallback)</div></div>
        <div class="pr-row"><span class="pr-num">🚫</span><div><b style="color:var(--mz-fg-faint)">${hiddenCount}</b> ocultas (não se aplica)</div></div>
        <div class="pr-row"><span class="pr-num">·</span><div><b>${visibleSections.length - priorityCount - placeholderCount}</b> em modo padrão</div></div>
      </div>
    </section>

    <section>
      <h3>Engine Técnica</h3>
      <p style="font-size:11px;color:var(--mz-fg-muted)">
        Componente único <code>&lt;Dossie role={...} /&gt;</code> renderiza
        todas as ${totalSections} seções, mas a config do cargo pode marcar cada
        seção como <code>priority</code>, <code>hidden</code> ou <code>placeholder</code>.
      </p>
      <p style="font-size:11px;color:var(--mz-fg-muted)">
        Princípio César 25/04: <b style="color:var(--mz-tenant-accent)">nunca mostrar 0</b>.
        Quando dado falta, mostrar em construção sóbrio (sem inventar score).
      </p>
    </section>
  `;
}

function render(id) {
  const role = ROLES.find(r => r.id === id);
  renderPills(id);
  renderDossie(role);
  renderInsp(role);
  $dossie.scrollTop = 0;
}

render('sen'); // Senador Wagner como default — bom exemplo
