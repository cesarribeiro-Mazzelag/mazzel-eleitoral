<html lang="pt-BR" data-theme="dark" data-tenant="ub">
<head>
<meta charset="UTF-8">
<title>Sidebar Condicional · 10 Perfis · UB</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<script src="theme-bootstrap.js"></script>
<style>
html, body { height: 100%; margin: 0; overflow: hidden; }
body { display: flex; flex-direction: column; }

/* ============ HEADER (perfil switcher) ============ */
.profile-bar {
  flex-shrink: 0;
  height: 64px;
  background: var(--mz-bg-topbar);
  border-bottom: 1px solid var(--mz-rule);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 24px;
  overflow: hidden;
}
.profile-bar h1 {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--mz-fg-strong);
  margin: 0;
  white-space: nowrap;
}
.profile-bar .helper {
  font-size: 11px;
  color: var(--mz-fg-faint);
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.profile-pills {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 6px 0;
  flex: 1;
  scrollbar-width: thin;
  scrollbar-color: var(--mz-rule-strong) transparent;
}
.profile-pills::-webkit-scrollbar { height: 4px; }
.profile-pills::-webkit-scrollbar-thumb { background: var(--mz-rule-strong); border-radius: 2px; }

.profile-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: var(--mz-bg-card);
  border: 1px solid var(--mz-rule);
  color: var(--mz-fg-muted);
  border-radius: var(--mz-r-pill);
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
  transition: all 120ms;
}
.profile-pill:hover {
  border-color: var(--mz-fg-faint);
  color: var(--mz-fg);
}
.profile-pill.active {
  background: var(--mz-tenant-primary);
  border-color: var(--mz-tenant-primary-strong);
  color: #fff;
  box-shadow: 0 0 0 1px var(--mz-tenant-accent-soft);
}
.profile-pill .num {
  font-family: var(--mz-font-mono);
  font-size: 10px;
  background: rgba(0,0,0,0.3);
  padding: 1px 5px;
  border-radius: 3px;
}
.profile-pill.active .num { background: rgba(255, 204, 0, 0.25); color: #FFCC00; }

/* ============ MAIN GRID (sidebar + frame) ============ */
.layout {
  flex: 1;
  display: grid;
  grid-template-columns: 280px 1fr 360px;
  min-height: 0;
}

/* ============ SIDEBAR ============ */
.sidebar {
  background: var(--mz-bg-sidebar);
  border-right: 1px solid var(--mz-rule);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sb-brand {
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--mz-rule);
  display: flex;
  align-items: center;
  gap: 10px;
}
.sb-brand img { width: 30px; height: 30px; flex-shrink: 0; }
.sb-brand .who {
  flex: 1;
  min-width: 0;
}
.sb-brand .name {
  font-size: 12px;
  font-weight: 700;
  color: var(--mz-fg-strong);
  letter-spacing: 0.02em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sb-brand .scope {
  font-size: 10px;
  color: var(--mz-tenant-accent);
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* user pill (quem está logado) */
.sb-user {
  padding: 10px 16px;
  border-bottom: 1px solid var(--mz-rule);
  display: flex;
  align-items: center;
  gap: 10px;
}
.sb-user .avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--mz-tenant-primary), var(--mz-tenant-primary-strong));
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0;
  flex-shrink: 0;
}
.sb-user .info { flex: 1; min-width: 0; }
.sb-user .uname {
  font-size: 12px;
  font-weight: 600;
  color: var(--mz-fg-strong);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
}
.sb-user .urole {
  font-size: 10px;
  color: var(--mz-fg-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
}
.sb-user .urole .scope-tag {
  display: inline-block;
  padding: 1px 4px;
  background: var(--mz-tenant-primary-soft);
  color: var(--mz-tenant-accent);
  border-radius: 3px;
  font-weight: 600;
  margin-left: 4px;
  letter-spacing: 0.04em;
}

/* nav body */
.sb-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.sb-nav::-webkit-scrollbar { width: 4px; }
.sb-nav::-webkit-scrollbar-thumb { background: var(--mz-rule-strong); }

.sb-section {
  padding: 8px 16px 4px;
  font-size: 9.5px;
  letter-spacing: 0.16em;
  color: var(--mz-fg-faint);
  text-transform: uppercase;
  font-weight: 600;
}

.sb-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 16px;
  font-size: 13px;
  color: var(--mz-fg-muted);
  cursor: pointer;
  transition: background 80ms;
  position: relative;
  border-left: 2px solid transparent;
}
.sb-item:hover {
  background: var(--mz-bg-card-2);
  color: var(--mz-fg);
}
.sb-item.active {
  color: var(--mz-fg-strong);
  background: var(--mz-tenant-primary-soft);
  border-left-color: var(--mz-tenant-accent);
}
.sb-item .ic {
  width: 16px; height: 16px;
  flex-shrink: 0;
  opacity: 0.8;
}
.sb-item .lbl { flex: 1; }
.sb-item .badge {
  font-size: 10px;
  font-family: var(--mz-font-mono);
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: 600;
  background: var(--mz-bg-elevated);
  color: var(--mz-fg-muted);
}
.sb-item .badge.danger { background: var(--mz-danger-soft); color: var(--mz-danger); }
.sb-item .badge.warn   { background: var(--mz-warn-soft);   color: var(--mz-warn); }
.sb-item .badge.tenant { background: var(--mz-tenant-accent); color: var(--mz-fg-on-accent); }
.sb-item .badge.live   { background: var(--mz-ok-soft); color: var(--mz-ok); }
.sb-item .badge.live::before {
  content: "";
  display: inline-block;
  width: 5px; height: 5px;
  background: var(--mz-ok);
  border-radius: 50%;
  margin-right: 4px;
  vertical-align: middle;
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse { 50% { opacity: 0.3; } }

/* footer */
.sb-foot {
  border-top: 1px solid var(--mz-rule);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 11px;
  color: var(--mz-fg-faint);
}
.sb-foot a { color: var(--mz-fg-dim); text-decoration: none; }
.sb-foot a:hover { color: var(--mz-fg); }

/* ============ FRAME (mockup do que aparece) ============ */
.frame {
  background:
    radial-gradient(800px 400px at 50% -100px, rgba(0, 42, 123, 0.12), transparent),
    var(--mz-bg-page);
  overflow: auto;
  padding: 24px 32px;
}
.frame-hint {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  color: var(--mz-fg-faint);
  margin-bottom: 16px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 500;
}
.frame-hint .arrow { color: var(--mz-tenant-accent); }

.frame-title {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--mz-fg-strong);
  margin: 0 0 6px;
}
.frame-sub {
  font-size: 13px;
  color: var(--mz-fg-muted);
  margin-bottom: 22px;
  max-width: 720px;
  line-height: 1.55;
}

.first-screen {
  background: var(--mz-bg-card);
  border: 1px solid var(--mz-rule);
  border-radius: var(--mz-r-lg);
  padding: 18px;
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 16px;
  margin-bottom: 18px;
}
.first-screen .label {
  font-size: 9.5px;
  letter-spacing: 0.16em;
  color: var(--mz-fg-faint);
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 4px;
}
.first-screen .val {
  font-size: 14px;
  font-weight: 600;
  color: var(--mz-fg-strong);
}
.first-screen .desc {
  font-size: 12px;
  color: var(--mz-fg-muted);
  line-height: 1.55;
  margin-top: 6px;
}

/* itens info */
.frame-info {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.info-card {
  background: var(--mz-bg-card);
  border: 1px solid var(--mz-rule);
  border-radius: var(--mz-r-md);
  padding: 12px 14px;
}
.info-card .lbl {
  font-size: 9.5px;
  letter-spacing: 0.14em;
  color: var(--mz-fg-faint);
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 6px;
}
.info-card .v {
  font-size: 13px;
  color: var(--mz-fg);
  line-height: 1.55;
}
.info-card .v b { color: var(--mz-fg-strong); font-weight: 600; }

/* tabela mock - rules */
.rules {
  margin-top: 24px;
  background: var(--mz-bg-card);
  border: 1px solid var(--mz-rule);
  border-radius: var(--mz-r-lg);
  overflow: hidden;
}
.rules h3 {
  margin: 0;
  padding: 12px 16px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--mz-fg-strong);
  border-bottom: 1px solid var(--mz-rule);
  background: var(--mz-bg-card-2);
}
.rules table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.rules th, .rules td {
  padding: 8px 16px;
  text-align: left;
  border-bottom: 1px solid var(--mz-rule);
  vertical-align: top;
}
.rules th {
  font-size: 9.5px;
  letter-spacing: 0.14em;
  color: var(--mz-fg-faint);
  text-transform: uppercase;
  font-weight: 600;
  background: var(--mz-bg-card-2);
}
.rules td:first-child { color: var(--mz-fg-strong); font-weight: 500; }
.rules td:last-child { color: var(--mz-fg-muted); }
.rules tr:last-child td { border-bottom: 0; }

/* ============ INSPECTOR (right panel — describes the role) ============ */
.insp {
  background: var(--mz-bg-sidebar);
  border-left: 1px solid var(--mz-rule);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.insp::-webkit-scrollbar { width: 4px; }
.insp::-webkit-scrollbar-thumb { background: var(--mz-rule-strong); }

.insp-head {
  padding: 16px 20px;
  border-bottom: 1px solid var(--mz-rule);
}
.insp-eyebrow {
  font-size: 9.5px;
  letter-spacing: 0.16em;
  color: var(--mz-fg-faint);
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 4px;
}
.insp-head h2 {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--mz-fg-strong);
  margin: 0;
}
.insp-head .vol {
  margin-top: 8px;
  font-size: 12px;
  color: var(--mz-fg-muted);
  line-height: 1.55;
}
.insp-head .vol b { color: var(--mz-tenant-accent); }

.insp-body {
  padding: 16px 20px;
  flex: 1;
}
.insp-body h3 {
  font-size: 9.5px;
  letter-spacing: 0.16em;
  color: var(--mz-fg-faint);
  text-transform: uppercase;
  font-weight: 600;
  margin: 16px 0 8px;
}
.insp-body h3:first-child { margin-top: 0; }
.insp-body p {
  font-size: 12px;
  color: var(--mz-fg);
  line-height: 1.6;
  margin: 0 0 12px;
}
.insp-body ul {
  list-style: none;
  padding: 0;
  margin: 0;
  font-size: 12px;
}
.insp-body li {
  display: flex;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px dashed var(--mz-rule);
  color: var(--mz-fg-muted);
}
.insp-body li:last-child { border-bottom: 0; }
.insp-body li::before {
  content: "›";
  color: var(--mz-tenant-accent);
  font-weight: 700;
}
.insp-body code {
  background: var(--mz-bg-card);
  border: 1px solid var(--mz-rule);
  padding: 1px 5px;
  border-radius: 3px;
  font-family: var(--mz-font-mono);
  font-size: 11px;
  color: var(--mz-fg-strong);
}

/* badges semânticos */
.tag-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.tag {
  padding: 3px 8px;
  border-radius: var(--mz-r-pill);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.04em;
}
.tag.cam1 { background: rgba(124,58,237,0.18); color: #c4b5fd; }
.tag.cam2 { background: var(--mz-tenant-primary-soft); color: var(--mz-tenant-accent); }
.tag.cam3 { background: var(--mz-ok-soft); color: var(--mz-ok); }
.tag.cam4 { background: var(--mz-warn-soft); color: var(--mz-warn); }

</style>
</head>

  link:   '<path d="M9 14a4 4 0 0 0 6 0l3-3a4 4 0 0 0-6-6l-1 1M15 10a4 4 0 0 0-6 0l-3 3a4 4 0 0 0 6 6l1-1"/>',
  walk:   '<circle cx="13" cy="4" r="2"/><path d="M9 22l3-7 3 4 4 1M9 14l-3-4 4-3 4 4 3-1"/>',
  sign:   '<path d="M3 17l4-4 5 5 9-9M14 5l5 5"/>',
  book:   '<path d="M4 4h16v16H4zM4 4v16M12 4v16"/>',
  box:    '<path d="M3 7l9-4 9 4-9 4zM3 7v10l9 4M21 7v10l-9 4M3 12l9 4M21 12l-9 4"/>',
  alert:  '<path d="M12 3l10 18H2zM12 10v6M12 19h.01"/>',
  mic:    '<rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/>',
  clock:  '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  plus:   '<path d="M12 5v14M5 12h14"/>',
  minus:  '<path d="M5 12h14"/>',
  chart:  '<path d="M3 21V3M3 21h18M7 17v-5M11 17v-9M15 17v-3M19 17v-7"/>',
};
const sIcon = name => `<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${ICONS[name] || ICONS.home}</svg>`;

/* ============================================================
   RENDER
   ============================================================ */
const $pills    = document.getElementById('pills');
const $sidebar  = document.getElementById('sidebar');
const $frame    = document.getElementById('frame');
const $insp     = document.getElementById('insp');

function renderPills(activeId) {
  $pills.innerHTML = PROFILES.map(p => `
    <div class="profile-pill ${p.id===activeId?'active':''}" data-id="${p.id}">
      <span class="num">${p.pillNum}</span>
      <span>${p.pill}</span>
    </div>
  `).join('');
  $pills.querySelectorAll('.profile-pill').forEach(el => {
    el.addEventListener('click', () => render(el.dataset.id));
  });
}

function renderSidebar(p) {
  const sectionsHTML = p.sections.map(s => {
    const items = s.items.map(([lbl, href, icon, badge], idx) => {
      let badgeHTML = '';
      if (badge) {
        if (badge === 'live') {
          badgeHTML = `<span class="badge live">live</span>`;
        } else if (badge.startsWith('danger:')) {
          badgeHTML = `<span class="badge danger">${badge.split(':')[1]}</span>`;
        } else if (badge.startsWith('warn:')) {
          badgeHTML = `<span class="badge warn">${badge.split(':')[1]}</span>`;
        } else if (badge.startsWith('tenant:')) {
          badgeHTML = `<span class="badge tenant">${badge.split(':')[1]}</span>`;
        } else if (badge === 'ok') {
          badgeHTML = `<span class="badge live">ok</span>`;
        } else if (badge === 'danger') {
          badgeHTML = `<span class="badge danger">!</span>`;
        } else {
          badgeHTML = `<span class="badge">${badge}</span>`;
        }
      }
      return `
        <div class="sb-item ${idx===0?'active':''}">
          ${sIcon(icon)}
          <span class="lbl">${lbl}</span>
          ${badgeHTML}
        </div>
      `;
    }).join('');
    return `<div class="sb-section">${s.sec}</div>${items}`;
  }).join('');

  $sidebar.innerHTML = `
    <div class="sb-brand">
      <img src="assets/logo_icon.svg" alt="UB">
      <div class="who">
        <div class="name">União Brasil</div>
        <div class="scope">${p.scope}</div>
      </div>
    </div>
    <div class="sb-user">
      <div class="avatar">${p.iniciais}</div>
      <div class="info">
        <span class="uname">${p.nome}</span>
        <span class="urole">${p.role} <span class="scope-tag">${p.camada}</span></span>
      </div>
    </div>
    <nav class="sb-nav">${sectionsHTML}</nav>
    <div class="sb-foot">
      <span>v2.4 · Mazzel</span>
      <a href="#">Sair →</a>
    </div>
  `;
}

function renderFrame(p) {
  $frame.innerHTML = `
    <div class="frame-hint">
      <span>Sidebar ←</span>
      <span class="arrow">→</span>
      <span>Tela inicial deste perfil</span>
      <span class="arrow">→</span>
      <span>Permissões à direita</span>
    </div>
    <h2 class="frame-title">${p.title}</h2>
    <p class="frame-sub">${p.desc}</p>

    <div class="first-screen">
      <div>
        <div class="label">Tela inicial</div>
        <div class="val">${p.primeiraTela}</div>
      </div>
      <div>
        <div class="desc">${p.primeiraDesc}</div>
      </div>
    </div>

    <div class="frame-info">
      ${p.info.map(([lbl, val]) => `
        <div class="info-card">
          <div class="lbl">${lbl}</div>
          <div class="v">${val}</div>
        </div>
      `).join('')}
    </div>

    <div class="rules">
      <h3>O que esse perfil pode fazer</h3>
      <table>
        <thead><tr><th style="width: 40px">#</th><th>Capacidade operacional</th></tr></thead>
        <tbody>
          ${p.abilities.map((a, i) => `
            <tr><td>${(i+1).toString().padStart(2,'0')}</td><td>${a}</td></tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderInsp(p) {
  const camadaTags = {
    C1: 'Camada 1 · Mazzel/Tenant',
    C2: 'Camada 2 · Política Partidária',
    C3: 'Camada 3 · Eletiva',
    C4: 'Camada 4 · Operacional',
  };
  const camadaCss = { C1: 'cam1', C2: 'cam2', C3: 'cam3', C4: 'cam4' };

  $insp.innerHTML = `
    <header class="insp-head">
      <div class="insp-eyebrow">${p.eyebrow}</div>
      <h2>${p.pill}</h2>
      <div class="vol">${p.volume}</div>
    </header>
    <div class="insp-body">
      <div class="tag-row">
        <span class="tag ${camadaCss[p.camada]}">${camadaTags[p.camada]}</span>
      </div>

      <h3>Princípio de design</h3>
      <p>${
        p.id === 'cabo'
          ? '<b>Mobile-first absoluto.</b> Sem sidebar tradicional — bottom tabs com 5 botões grandes, ícone+label, mínimo 44px. Linguagem em 2ª pessoa ("Você precisa..."). UI legível ao sol, com alto contraste.'
          : p.id === 'pres-est'
          ? '<b>Cliente real do produto.</b> 3 perguntas em 3 segundos: como está? o que mudou? o que decidir? KPIs com delta, ações rápidas no mapa, score consolidado dos subordinados.'
          : p.id === 'tesou'
          ? '<b>Visão protegida e minimalista.</b> Só vê o que é financeiro. Não polui com mapa estratégico, dossiês, operações. Read-only em filiados quando precisa cruzar dado.'
          : '<b>Sidebar derivada de cargo + nível + escopo.</b> Itens agrupados por tarefa (Comando, Estrutura, Gestão), não por feature. Ações executivas em 1-2 cliques, badges semânticos para alertas.'
      }</p>

      <h3>Composição da sidebar</h3>
      <ul>
        ${p.sections.map(s => `<li><b style="color:var(--mz-fg-strong)">${s.sec}</b><br><span style="color:var(--mz-fg-faint)">${s.items.length} itens</span></li>`).join('')}
      </ul>

      <h3>Identifier técnico</h3>
      <p>
        <code>role:${p.id}</code><br>
        <code>scope:${p.scope.toLowerCase().replace(/[\s/·]+/g,'-')}</code><br>
        <code>camada:${p.camada}</code>
      </p>

      <h3>Perfis NÃO inclusos nesta V1</h3>
      <p style="color: var(--mz-fg-faint); font-size: 11px;">
        Coord Regional · Coord Territorial · Filiado base · Auditor LGPD · Suplente.
        Decisão César 25/04: sair em V2 do design.
      </p>
    </div>
  `;
}

function render(id) {
  const p = PROFILES.find(x => x.id === id);
  renderPills(id);
  renderSidebar(p);
  renderFrame(p);
  renderInsp(p);
}

render('pres-est');  // Milton-CEO como default — é o cliente que aprova
</script>

</body>
</html>
