<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark" data-tenant="ub">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>Saúde das Nominatas · Mazzel Eleitoral · UB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../F1-fundacao/tokens.css">
<script src="../F1-fundacao/theme-bootstrap.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--mz-bg-page);
    color: var(--mz-fg);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .tnum { font-variant-numeric: tabular-nums; }

  /* ============ APP SHELL ============ */
  .app { display: grid; grid-template-rows: 56px 44px 1fr; height: 100vh; }

  /* TOPBAR Milton-CEO (idêntico ao módulo Emendas) */
  .topbar {
    display: grid; grid-template-columns: 220px 1fr 220px;
    align-items: center; padding: 0 24px;
    background: var(--mz-bg-topbar); border-bottom: 1px solid var(--mz-rule);
    z-index: 100;
  }
  .tb-brand { display: flex; align-items: center; gap: 10px; }
  .tb-brand .logo { width: 30px; height: 30px; background: var(--mz-tenant-primary); border: 1px solid var(--mz-tenant-accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue'; color: var(--mz-tenant-accent); font-size: 14px; font-weight: 700; letter-spacing: 0.04em; }
  .tb-brand .name { font-size: 12px; font-weight: 800; letter-spacing: 0.02em; color: var(--mz-fg-strong); line-height: 1.1; }
  .tb-brand .name span { display: block; font-size: 9px; color: var(--mz-fg-faint); font-weight: 500; letter-spacing: 0.10em; text-transform: uppercase; margin-top: 2px; }
  .tb-crumb { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 12px; color: var(--mz-fg-muted); }
  .tb-crumb b { color: var(--mz-fg-strong); font-weight: 600; }
  .tb-crumb .sep { color: var(--mz-rule-strong); }
  .tb-crumb .badge-beta { font-family: 'JetBrains Mono', monospace; font-size: 9px; padding: 2px 8px; border-radius: 4px; background: var(--mz-tenant-accent-soft); color: var(--mz-tenant-accent); border: 1px solid var(--mz-tenant-accent-soft); font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; }
  .tb-right { display: flex; align-items: center; gap: 14px; justify-content: flex-end; }
  .tb-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--mz-fg-muted); border: 1px solid transparent; }
  .tb-icon:hover { background: var(--mz-bg-card); border-color: var(--mz-rule); color: var(--mz-fg); }
  .tb-user { display: flex; align-items: center; gap: 8px; padding: 4px 10px 4px 4px; border: 1px solid var(--mz-rule); border-radius: 999px; cursor: pointer; }
  .tb-user .av { width: 22px; height: 22px; border-radius: 50%; background: var(--mz-tenant-primary); color: var(--mz-tenant-accent); font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .tb-user .nm { font-size: 11px; font-weight: 600; color: var(--mz-fg); line-height: 1.1; }
  .tb-user .nm span { display: block; font-size: 9px; color: var(--mz-fg-faint); font-weight: 500; }

  /* TABS */
  .tabs {
    display: flex; align-items: stretch; padding: 0 24px;
    background: var(--mz-bg-page); border-bottom: 1px solid var(--mz-rule); gap: 0;
  }
  .tab {
    display: flex; align-items: center; gap: 8px;
    padding: 0 18px; cursor: pointer; border: 0; background: transparent;
    color: var(--mz-fg-muted); font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
    border-bottom: 2px solid transparent; height: 100%;
    transition: color 100ms;
  }
  .tab:hover { color: var(--mz-fg); }
  .tab.active { color: var(--mz-fg-strong); border-bottom-color: var(--mz-tenant-accent); }
  .tab .num { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; color: var(--mz-fg-faint); font-weight: 700; letter-spacing: 0.08em; }
  .tab.active .num { color: var(--mz-tenant-accent); }
  .tab .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--mz-danger); display: inline-block; }
  .tabs-spacer { flex: 1; }
  .tabs-meta { display: flex; align-items: center; gap: 10px; font-size: 10.5px; color: var(--mz-fg-faint); padding-right: 4px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; }
  .tabs-meta .pill { background: var(--mz-bg-card); border: 1px solid var(--mz-rule); padding: 3px 10px; border-radius: 999px; }
  .tabs-meta b { color: var(--mz-fg); font-weight: 700; }

  /* VIEWS */
  .views { position: relative; overflow: hidden; }
  .view { position: absolute; inset: 0; display: none; flex-direction: column; overflow: hidden; }
  .view.active { display: flex; }

  /* ============================================================
     VIEW 1 · HEXÁGONO SCORE
     ============================================================ */
  .hex-wrap { display: grid; grid-template-columns: 320px 1fr 360px; height: 100%; gap: 0; }
  .hex-side { background: var(--mz-bg-sidebar); border-right: 1px solid var(--mz-rule); overflow-y: auto; padding: 18px 20px; }
  .hex-side::-webkit-scrollbar { width: 4px; } .hex-side::-webkit-scrollbar-thumb { background: var(--mz-rule-strong); }
  .hex-side h3 { font-size: 9.5px; letter-spacing: 0.16em; color: var(--mz-fg-faint); text-transform: uppercase; font-weight: 700; margin: 0 0 12px; }
  .hex-side h3:not(:first-child) { margin-top: 22px; }
  .hex-pick { padding: 10px 12px; background: var(--mz-bg-card); border: 1px solid var(--mz-rule); border-radius: 8px; cursor: pointer; margin-bottom: 8px; transition: border-color 100ms; }
  .hex-pick:hover { border-color: var(--mz-tenant-accent); }
  .hex-pick.active { border-color: var(--mz-tenant-accent); background: var(--mz-tenant-primary-soft); }
  .hex-pick .nm { font-size: 12.5px; font-weight: 700; color: var(--mz-fg-strong); display: flex; align-items: center; gap: 8px; }
  .hex-pick .nm .badge { font-size: 9.5px; font-family: 'JetBrains Mono', monospace; padding: 1px 6px; border-radius: 3px; font-weight: 700; }
  .hex-pick .nm .badge.ok   { background: rgba(22, 163, 74, 0.15); color: #22c55e; }
  .hex-pick .nm .badge.high { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
  .hex-pick .nm .badge.crit { background: rgba(220, 38, 38, 0.18); color: #f87171; }
  .hex-pick .meta { font-size: 10.5px; color: var(--mz-fg-faint); margin-top: 4px; line-height: 1.4; letter-spacing: 0.04em; }
  .hex-pick .score-mini { font-family: 'Bebas Neue', sans-serif; font-size: 22px; line-height: 1; margin-top: 6px; letter-spacing: 0.02em; }
  .hex-pick .score-mini.ok { color: #22c55e; }
  .hex-pick .score-mini.high { color: #f59e0b; }
  .hex-pick .score-mini.crit { color: #f87171; }

  .hex-canvas { background: var(--mz-bg-page); display: flex; flex-direction: column; align-items: center; padding: 32px; overflow-y: auto; }
  .hex-canvas::-webkit-scrollbar { width: 6px; } .hex-canvas::-webkit-scrollbar-thumb { background: var(--mz-rule-strong); }
  .hex-head { width: 100%; max-width: 720px; margin-bottom: 18px; display: grid; grid-template-columns: 1fr auto; gap: 18px; align-items: end; }
  .hex-head h1 { font-family: 'Inter', sans-serif; font-size: 30px; font-weight: 800; color: var(--mz-fg-strong); margin: 0; letter-spacing: -0.02em; }
  .hex-head h1 span { display: block; font-size: 11px; color: var(--mz-fg-faint); font-weight: 600; letter-spacing: 0.10em; text-transform: uppercase; margin-bottom: 6px; }
  .hex-head .score-big { font-family: 'Bebas Neue', sans-serif; font-size: 72px; line-height: 1; letter-spacing: 0.02em; }
  .hex-head .score-big.ok { color: #22c55e; }
  .hex-head .score-big.high { color: #f59e0b; }
  .hex-head .score-big.crit { color: #f87171; }
  .hex-head .score-big small { font-size: 16px; color: var(--mz-fg-faint); font-family: 'Inter', sans-serif; font-weight: 600; }
  .hex-svg { width: 540px; height: 560px; max-width: 100%; flex-shrink: 0; margin-top: -10px; }
  .hex-legend { width: 100%; max-width: 720px; margin-top: 22px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .hex-legend .item { background: var(--mz-bg-card); border: 1px solid var(--mz-rule); border-radius: 10px; padding: 12px 14px; }
  .hex-legend .item .top { display: flex; justify-content: space-between; align-items: center; }
  .hex-legend .item .nm { font-size: 12px; font-weight: 700; color: var(--mz-fg-strong); }
  .hex-legend .item .v { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.02em; }
  .hex-legend .item .v.ok { color: #22c55e; }
  .hex-legend .item .v.high { color: #f59e0b; }
  .hex-legend .item .v.crit { color: #f87171; }
  .hex-legend .item .desc { font-size: 10.5px; color: var(--mz-fg-muted); margin-top: 4px; line-height: 1.4; }
  .hex-legend .item .bar { height: 4px; background: var(--mz-bg-elevated); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .hex-legend .item .bar > span { display: block; height: 100%; }

  .hex-flags { background: var(--mz-bg-sidebar); border-left: 1px solid var(--mz-rule); overflow-y: auto; padding: 18px 20px; }
  .hex-flags::-webkit-scrollbar { width: 4px; } .hex-flags::-webkit-scrollbar-thumb { background: var(--mz-rule-strong); }
  .hex-flags h3 { font-size: 9.5px; letter-spacing: 0.16em; color: var(--mz-fg-faint); text-transform: uppercase; font-weight: 700; margin: 0 0 12px; }
  .flag-card { padding: 12px 14px; border-radius: 10px; margin-bottom: 8px; border: 1px solid; font-size: 11.5px; line-height: 1.5; }
  .flag-card.danger { background: var(--mz-danger-soft); border-color: rgba(248,113,113,0.25); color: var(--mz-fg); }
  .flag-card.warn   { background: var(--mz-warn-soft);   border-color: rgba(251,191,36,0.25); color: var(--mz-fg); }
  .flag-card.info   { background: var(--mz-info-soft);   border-color: rgba(96,165,250,0.20); color: var(--mz-fg); }
  .flag-card .ic { font-weight: 800; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.10em; text-transform: uppercase; }
  .flag-card.danger .ic { color: var(--mz-danger); }
  .flag-card.warn   .ic { color: var(--mz-warn); }
  .flag-card.info   .ic { color: var(--mz-info); }

  /* ============================================================
     VIEW 2 · HEATMAP SP
     ============================================================ */
  .map-wrap { display: grid; grid-template-columns: 280px 1fr 320px; height: 100%; }
  .map-side { background: var(--mz-bg-sidebar); border-right: 1px solid var(--mz-rule); overflow-y: auto; padding: 16px 18px; }
  .map-side::-webkit-scrollbar { width: 4px; } .map-side::-webkit-scrollbar-thumb { background: var(--mz-rule-strong); }
  .map-side h3 { font-size: 9.5px; letter-spacing: 0.16em; color: var(--mz-fg-faint); text-transform: uppercase; font-weight: 700; margin: 0 0 10px; }
  .map-side h3:not(:first-child) { margin-top: 18px; }
  .legend-row { display: flex; align-items: center; gap: 10px; font-size: 11.5px; color: var(--mz-fg); padding: 6px 0; }
  .legend-row .sw { width: 18px; height: 18px; border-radius: 4px; }
  .map-canvas { position: relative; background: var(--mz-bg-page); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .map-canvas svg { width: 100%; height: 100%; max-height: calc(100vh - 100px); }
  .map-side2 { background: var(--mz-bg-sidebar); border-left: 1px solid var(--mz-rule); overflow-y: auto; padding: 16px 18px; }
  .map-side2::-webkit-scrollbar { width: 4px; } .map-side2::-webkit-scrollbar-thumb { background: var(--mz-rule-strong); }
  .map-side2 h3 { font-size: 9.5px; letter-spacing: 0.16em; color: var(--mz-fg-faint); text-transform: uppercase; font-weight: 700; margin: 0 0 10px; }
  .map-side2 h3:not(:first-child) { margin-top: 18px; }
  .summary-row { display: flex; justify-content: space-between; align-items: baseline; padding: 7px 0; font-size: 11.5px; border-bottom: 1px solid var(--mz-rule); }
  .summary-row:last-child { border-bottom: 0; }
  .summary-row b { font-weight: 600; color: var(--mz-fg-strong); }
  .summary-row span { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--mz-fg); font-weight: 600; }
  .map-mun-card { background: var(--mz-bg-card); border: 1px solid var(--mz-rule); border-radius: 10px; padding: 14px; margin-top: 10px; }
  .map-mun-card .nm { font-size: 14px; font-weight: 700; color: var(--mz-fg-strong); }
  .map-mun-card .meta { font-size: 10.5px; color: var(--mz-fg-faint); margin-top: 2px; letter-spacing: 0.04em; }
  .map-mun-card .row { display: grid; grid-template-columns: 1fr auto; padding: 6px 0; font-size: 11.5px; border-bottom: 1px solid var(--mz-hairline); }
  .map-mun-card .row:last-child { border-bottom: 0; }
  .map-mun-card .row b { color: var(--mz-fg); font-weight: 600; }
  .map-mun-card .row span { font-family: 'JetBrains Mono', monospace; }

  /* ============================================================
     VIEW 3 · RANKING
     ============================================================ */
  .rank-wrap { padding: 24px 28px; overflow-y: auto; height: 100%; background: var(--mz-bg-page); }
  .rank-wrap::-webkit-scrollbar { width: 6px; } .rank-wrap::-webkit-scrollbar-thumb { background: var(--mz-rule-strong); }
  .rank-head { margin-bottom: 22px; }
  .rank-head h1 { font-size: 28px; font-weight: 800; color: var(--mz-fg-strong); margin: 0; letter-spacing: -0.02em; }
  .rank-head h1 span { display: block; font-size: 11px; color: var(--mz-fg-faint); font-weight: 600; letter-spacing: 0.10em; text-transform: uppercase; margin-bottom: 6px; }
  .rank-head p { font-size: 12.5px; color: var(--mz-fg-muted); margin: 8px 0 0; max-width: 720px; line-height: 1.55; }
  .rank-cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 28px; }
  .rank-card { background: var(--mz-bg-card); border: 1px solid var(--mz-rule); border-radius: 12px; overflow: hidden; }
  .rank-card.ok   { border-top: 4px solid #22c55e; }
  .rank-card.high { border-top: 4px solid #f59e0b; }
  .rank-card.crit { border-top: 4px solid #dc2626; }
  .rank-card .head { padding: 16px 18px; border-bottom: 1px solid var(--mz-rule); display: flex; align-items: center; gap: 12px; }
  .rank-card .head .av { width: 38px; height: 38px; border-radius: 50%; background: var(--mz-tenant-primary); color: var(--mz-tenant-accent); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 14px; }
  .rank-card .head .info b { font-size: 14px; color: var(--mz-fg-strong); display: block; font-weight: 700; }
  .rank-card .head .info span { font-size: 10.5px; color: var(--mz-fg-faint); }
  .rank-card .score-row { padding: 14px 18px; border-bottom: 1px solid var(--mz-rule); display: grid; grid-template-columns: 1fr auto; align-items: center; }
  .rank-card .score-row .lbl { font-size: 9.5px; letter-spacing: 0.16em; color: var(--mz-fg-faint); text-transform: uppercase; font-weight: 700; }
  .rank-card .score-row .v { font-family: 'Bebas Neue', sans-serif; font-size: 36px; line-height: 1; }
  .rank-card .score-row .v.ok { color: #22c55e; }
  .rank-card .score-row .v.high { color: #f59e0b; }
  .rank-card .score-row .v.crit { color: #f87171; }
  .rank-card .score-row .v small { font-size: 13px; color: var(--mz-fg-faint); font-family: 'Inter'; font-weight: 600; }
  .rank-card .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .rank-card .stats .s { padding: 10px 14px; border-right: 1px solid var(--mz-rule); border-bottom: 1px solid var(--mz-rule); }
  .rank-card .stats .s:nth-child(2n) { border-right: 0; }
  .rank-card .stats .s:nth-child(n+5) { border-bottom: 0; }
  .rank-card .stats .s .lbl { font-size: 9px; letter-spacing: 0.10em; color: var(--mz-fg-faint); text-transform: uppercase; font-weight: 600; }
  .rank-card .stats .s .v { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--mz-fg-strong); font-weight: 700; margin-top: 2px; }
  .rank-card .flag-list { padding: 12px 18px; }
  .rank-card .flag-list .ttl { font-size: 9.5px; letter-spacing: 0.14em; color: var(--mz-fg-faint); text-transform: uppercase; font-weight: 700; margin-bottom: 6px; }
  .rank-card .flag-list .empty { font-size: 11px; color: var(--mz-ok); font-weight: 600; }
  .rank-card .flag-list .ln { font-size: 11px; color: var(--mz-fg); padding: 5px 0; border-bottom: 1px solid var(--mz-hairline); line-height: 1.4; display: grid; grid-template-columns: 14px 1fr; gap: 6px; }
  .rank-card .flag-list .ln:last-child { border-bottom: 0; }
  .rank-card .flag-list .ln .ic { font-weight: 700; font-size: 10px; }
  .rank-card .flag-list .ln.danger .ic { color: var(--mz-danger); }
  .rank-card .flag-list .ln.warn .ic { color: var(--mz-warn); }
  .rank-card .flag-list .ln.info .ic { color: var(--mz-info); }
  .rank-card .cta { padding: 14px 18px; border-top: 1px solid var(--mz-rule); }
  .rank-card .cta button { width: 100%; padding: 9px; border-radius: 8px; border: 1px solid var(--mz-rule); background: var(--mz-bg-card-2); color: var(--mz-fg); font-size: 11.5px; font-weight: 600; cursor: pointer; transition: all 100ms; }
  .rank-card .cta button:hover { border-color: var(--mz-tenant-accent); color: var(--mz-fg-strong); }

  .rank-table { background: var(--mz-bg-card); border: 1px solid var(--mz-rule); border-radius: 12px; overflow: hidden; }
  .rank-table h2 { padding: 14px 18px; margin: 0; font-size: 13px; color: var(--mz-fg-strong); font-weight: 700; border-bottom: 1px solid var(--mz-rule); display: flex; justify-content: space-between; align-items: center; }
  .rank-table h2 span { font-size: 10.5px; color: var(--mz-fg-faint); font-weight: 500; letter-spacing: 0.04em; }
  .rank-table .row { display: grid; grid-template-columns: 28px 1fr 110px 110px 100px; padding: 11px 18px; gap: 12px; border-bottom: 1px solid var(--mz-hairline); align-items: center; font-size: 12px; cursor: pointer; transition: background 80ms; }
  .rank-table .row:hover { background: var(--mz-bg-card-2); }
  .rank-table .row:last-child { border-bottom: 0; }
  .rank-table .row .pos { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--mz-fg-faint); font-weight: 700; }
  .rank-table .row .nm { font-weight: 600; color: var(--mz-fg-strong); }
  .rank-table .row .nm small { display: block; font-size: 10px; color: var(--mz-fg-faint); font-weight: 500; margin-top: 1px; }
  .rank-table .row .pop { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--mz-fg-muted); }
  .rank-table .row .bar-wrap { height: 6px; background: var(--mz-bg-elevated); border-radius: 3px; overflow: hidden; }
  .rank-table .row .bar-wrap > span { display: block; height: 100%; }
  .rank-table .row .score-pill { font-family: 'Bebas Neue', sans-serif; font-size: 18px; padding: 1px 9px; border-radius: 4px; text-align: center; }
  .rank-table .row .score-pill.ok   { background: rgba(34, 197, 94, 0.15);  color: #22c55e; }
  .rank-table .row .score-pill.high { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
  .rank-table .row .score-pill.crit { background: rgba(220, 38, 38, 0.18);  color: #f87171; }

  /* ============================================================
     VIEW 4 · DOSSIÊ COMISSÃO
     ============================================================ */
  .dos-wrap { display: grid; grid-template-columns: 240px 1fr; height: 100%; }
  .dos-toc { background: var(--mz-bg-sidebar); border-right: 1px solid var(--mz-rule); overflow-y: auto; padding: 22px 16px; }
  .dos-toc::-webkit-scrollbar { width: 4px; } .dos-toc::-webkit-scrollbar-thumb { background: var(--mz-rule-strong); }
  .dos-toc h3 { font-size: 9.5px; letter-spacing: 0.16em; color: var(--mz-fg-faint); text-transform: uppercase; font-weight: 700; margin: 0 0 14px; padding: 0 4px; }
  .toc-item { display: grid; grid-template-columns: 24px 1fr; gap: 8px; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 11.5px; color: var(--mz-fg-muted); transition: all 100ms; }
  .toc-item:hover { background: var(--mz-bg-card); color: var(--mz-fg); }
  .toc-item.active { background: var(--mz-tenant-primary-soft); color: var(--mz-fg-strong); border-left: 3px solid var(--mz-tenant-accent); padding-left: 9px; }
  .toc-item .num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--mz-fg-faint); font-weight: 700; }
  .toc-item.active .num { color: var(--mz-tenant-accent); }

  .dos-body { overflow-y: auto; padding: 0; background: var(--mz-bg-page); }
  .dos-body::-webkit-scrollbar { width: 6px; } .dos-body::-webkit-scrollbar-thumb { background: var(--mz-rule-strong); }

  .sec { padding: 24px 32px; border-bottom: 1px solid var(--mz-rule); }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .cell { background: var(--mz-bg-card); border: 1px solid var(--mz-rule); border-radius: 10px; padding: 14px; }

  .timeline { position: relative; padding: 8px 0 8px 28px; }

  .tl-item { position: relative; padding: 10px 0 14px; }
  .tl-item .dot { position: absolute; left: -23px; top: 14px; width: 10px; height: 10px; border-radius: 50%; background: var(--mz-tenant-accent); border: 2px solid var(--mz-bg-page); }

  .tl-item .body { font-size: 11.5px; color: var(--mz-fg-muted); margin-top: 4px; line-height: 1.5; }

  .alert-tile { background: var(--mz-bg-card); border: 1px solid var(--mz-rule); border-radius: 10px; padding: 12px 14px; display: grid; grid-template-columns: 36px 1fr; gap: 12px; align-items: start; margin-bottom: 8px; border-left-width: 3px; }

  .ale-wrap { display: grid; grid-template-columns: 1fr 360px; height: 100%; }

  .ale-item .ic { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-family: 'JetBrains Mono', monospace; font-size: 14px; }
  .ale-item.crit .ic { background: var(--mz-danger-soft); color: var(--mz-danger); }

  .ale-item.crit .head-row .sev { background: var(--mz-danger-soft); color: var(--mz-danger); }
  .ale-item.high .head-row .sev { background: var(--mz-warn-soft); color: var(--mz-warn); }
  .ale-item.med  .head-row .sev { background: var(--mz-info-soft); color: var(--mz-info); }
  .ale-item .head-row .ttl { font-size: 13px; font-weight: 700; color: var(--mz-fg-strong); }

  .ale-item .meta { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; gap: 6px; }
  .ale-item .meta .when { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--mz-fg-faint); }
  .ale-item .meta .channels { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
  .ale-item .meta .channels .ch { font-family: 'JetBrains Mono', monospace; font-size: 9px; padding: 2px 6px; border-radius: 3px; background: var(--mz-bg-card-2); color: var(--mz-fg-muted); border: 1px solid var(--mz-rule); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 700; }

  .ale-side { background: var(--mz-bg-sidebar); border-left: 1px solid var(--mz-rule); padding: 22px 20px; overflow-y: auto; }

  .rule-card { padding: 12px 14px; background: var(--mz-bg-card); border: 1px solid var(--mz-rule); border-radius: 10px; margin-bottom: 8px; border-left-width: 3px; }
