<style>
  /* =========================================================
     THEME TOKENS — dark (default) vs light
     ========================================================= */
  :root, [data-theme="dark"] {
    --bg-page: #0a0a0b;
    --bg-page-2: #0c0c0e;
    --bg-card: #0e0e11;
    --bg-card-2: rgba(255,255,255,0.015);

    --fg: #e4e4e7;
    --fg-strong: #ffffff;
    --fg-muted: #a1a1aa;
    --fg-dim: #71717a;
    --fg-faint: #52525b;
    --fg-ghost: #3f3f46;

    --rule: rgba(255,255,255,0.05);
    --rule-strong: rgba(255,255,255,0.08);
    --hairline: rgba(255,255,255,0.06);

    --accent-blue: #93c5fd;
    --accent-blue-strong: #60a5fa;

    --overall-from: #ffffff;
    --overall-to:   #d4d4d8;
    --overall-muted-from: #71717a;
    --overall-muted-to:   #52525b;

    --page-grad-1: rgba(59,130,246,0.08);
    --page-grad-2: rgba(168,85,247,0.05);

    --ok: #34d399;
    --verified: #34d399;

    /* chip alphas */
    --chip-bg-alpha: 0.12;
    --chip-ring-alpha: 0.25;
  }
  [data-theme="light"] {
    --bg-page: #f4f4f5;
    --bg-page-2: #fafafa;
    --bg-card: #ffffff;
    --bg-card-2: rgba(0,0,0,0.02);

    --fg: #18181b;
    --fg-strong: #09090b;
    --fg-muted: #52525b;
    --fg-dim: #71717a;
    --fg-faint: #a1a1aa;
    --fg-ghost: #d4d4d8;

    --rule: rgba(0,0,0,0.06);
    --rule-strong: rgba(0,0,0,0.10);
    --hairline: rgba(0,0,0,0.08);

    --accent-blue: #1d4ed8;
    --accent-blue-strong: #1e40af;

    --overall-from: #09090b;
    --overall-to:   #3f3f46;
    --overall-muted-from: #a1a1aa;
    --overall-muted-to:   #71717a;

    --page-grad-1: rgba(59,130,246,0.07);
    --page-grad-2: rgba(168,85,247,0.05);

    --ok: #059669;
    --verified: #059669;

    --chip-bg-alpha: 0.10;
    --chip-ring-alpha: 0.45;
  }

  html,body { background: var(--bg-page); color: var(--fg); }
  .tnum { font-variant-numeric: tabular-nums; font-feature-settings: "tnum", "cv11"; }
  .font-display { font-family: 'Inter', sans-serif; font-feature-settings: "cv11","ss01"; letter-spacing: -0.02em; }

  /* themed aliases for classes used in JSX ------------------- */
  .t-fg        { color: var(--fg); }
  .t-fg-strong { color: var(--fg-strong); }
  .t-fg-muted  { color: var(--fg-muted); }
  .t-fg-dim    { color: var(--fg-dim); }
  .t-fg-faint  { color: var(--fg-faint); }
  .t-fg-ghost  { color: var(--fg-ghost); }
  .t-accent    { color: var(--accent-blue); }
  .t-ok        { color: var(--ok); }

  .t-border       { border-color: var(--rule); }
  .t-border-strong{ border-color: var(--rule-strong); }
  .t-bg-card      { background: var(--bg-card); }
  .t-bg-card-2    { background: var(--bg-card-2); }
  .t-bg-rule      { background: var(--rule); }

  /* page bg */
  .bg-dossier {
    background:
      radial-gradient(1200px 600px at 85% -10%, var(--page-grad-1), transparent 60%),
      radial-gradient(800px 400px at 10% 0%,  var(--page-grad-2), transparent 60%),
      linear-gradient(180deg, var(--bg-page-2) 0%, var(--bg-page) 100%);
  }

  .ring-soft   { box-shadow: 0 0 0 1px var(--hairline), 0 1px 0 var(--hairline) inset; }
  [data-theme="light"] .ring-soft { box-shadow: 0 0 0 1px var(--hairline), 0 1px 2px rgba(0,0,0,0.03); }
  .ring-danger { box-shadow: 0 0 0 2px rgba(239,68,68,0.40), 0 0 60px -10px rgba(239,68,68,0.25) inset; }
  [data-theme="light"] .ring-danger { box-shadow: 0 0 0 2px rgba(220,38,38,0.50), 0 8px 24px -12px rgba(220,38,38,0.25); }

  /* traits: gold + silver — same metallic look across themes, tuned shadow for light */
  .trait-gold {
    background: linear-gradient(180deg, #facc15 0%, #b8860b 100%);
    color: #1a1205;
    box-shadow: 0 1px 0 rgba(255,255,255,0.45) inset, 0 -1px 0 rgba(0,0,0,0.25) inset, 0 4px 12px -4px rgba(234,179,8,0.4);
  }
  .trait-silver {
    background: linear-gradient(180deg, #f3f4f6 0%, #9ca3af 100%);
    color: #18181b;
    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 -1px 0 rgba(0,0,0,0.2) inset, 0 4px 12px -4px rgba(156,163,175,0.35);
  }
  [data-theme="light"] .trait-gold   { box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 -1px 0 rgba(0,0,0,0.15) inset, 0 6px 16px -6px rgba(180,130,0,0.45); }
  [data-theme="light"] .trait-silver { box-shadow: 0 1px 0 rgba(255,255,255,0.7) inset, 0 -1px 0 rgba(0,0,0,0.12) inset, 0 6px 16px -6px rgba(100,116,139,0.4); }

  /* FIFA card placeholder */
  .fifa-card {
    background:
      linear-gradient(135deg, rgba(251,191,36,0.12) 0%, rgba(251,191,36,0.02) 40%, rgba(255,255,255,0.04) 100%),
      linear-gradient(180deg, #1a1510 0%, #0f0d0a 100%);
    border: 1px solid rgba(251,191,36,0.25);
    box-shadow: 0 20px 40px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(251,191,36,0.08) inset;
  }
  [data-theme="light"] .fifa-card {
    background:
      linear-gradient(135deg, rgba(180,130,0,0.08) 0%, rgba(180,130,0,0.02) 40%, rgba(0,0,0,0.02) 100%),
      linear-gradient(180deg, #2a2216 0%, #1a1510 100%);
    box-shadow: 0 24px 48px -20px rgba(20,15,5,0.35), 0 0 0 1px rgba(180,130,0,0.2);
  }
  .fifa-stripe {
    background: linear-gradient(90deg, transparent 0%, rgba(251,191,36,0.4) 50%, transparent 100%);
  }

  /* OVERALL gradient text */
  .overall-num {
    background: linear-gradient(180deg, var(--overall-from) 0%, var(--overall-to) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .overall-muted {
    background: linear-gradient(180deg, var(--overall-muted-from) 0%, var(--overall-muted-to) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }

  /* chip */
  .chip {
    height: 24px; padding: 0 8px; border-radius: 4px;
    font: 600 11px/24px 'Inter', sans-serif;
    letter-spacing: 0.06em; text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 6px;
    white-space: nowrap;
  }
  .chip-dot { width: 6px; height: 6px; border-radius: 999px; }

  /* DARK chips */
  [data-theme="dark"] .chip-blue,   :root .chip-blue   { background: rgba(59,130,246,0.12); color: #93c5fd; box-shadow: inset 0 0 0 1px rgba(59,130,246,0.25); }
  [data-theme="dark"] .chip-green,  :root .chip-green  { background: rgba(34,197,94,0.10); color: #86efac; box-shadow: inset 0 0 0 1px rgba(34,197,94,0.22); }
  [data-theme="dark"] .chip-purple, :root .chip-purple { background: rgba(168,85,247,0.12); color: #d8b4fe; box-shadow: inset 0 0 0 1px rgba(168,85,247,0.25); }
  [data-theme="dark"] .chip-orange, :root .chip-orange { background: rgba(249,115,22,0.12); color: #fdba74; box-shadow: inset 0 0 0 1px rgba(249,115,22,0.25); }
  [data-theme="dark"] .chip-red,    :root .chip-red    { background: rgba(239,68,68,0.12);  color: #fca5a5; box-shadow: inset 0 0 0 1px rgba(239,68,68,0.35); }
  [data-theme="dark"] .chip-muted,  :root .chip-muted  { background: rgba(161,161,170,0.08); color: #a1a1aa; box-shadow: inset 0 0 0 1px rgba(161,161,170,0.15); }

  /* LIGHT chips */
  [data-theme="light"] .chip-blue   { background: rgba(37,99,235,0.10);  color: #1d4ed8; box-shadow: inset 0 0 0 1px rgba(37,99,235,0.30); }
  [data-theme="light"] .chip-green  { background: rgba(22,163,74,0.10);  color: #15803d; box-shadow: inset 0 0 0 1px rgba(22,163,74,0.28); }
  [data-theme="light"] .chip-purple { background: rgba(147,51,234,0.10); color: #7e22ce; box-shadow: inset 0 0 0 1px rgba(147,51,234,0.30); }
  [data-theme="light"] .chip-orange { background: rgba(234,88,12,0.10);  color: #c2410c; box-shadow: inset 0 0 0 1px rgba(234,88,12,0.30); }
  [data-theme="light"] .chip-red    { background: rgba(220,38,38,0.10);  color: #b91c1c; box-shadow: inset 0 0 0 1px rgba(220,38,38,0.40); }
  [data-theme="light"] .chip-muted  { background: rgba(82,82,91,0.06);   color: #52525b; box-shadow: inset 0 0 0 1px rgba(82,82,91,0.18); }

  .dot-blue   { background: #3b82f6; box-shadow: 0 0 8px rgba(59,130,246,0.6); }
  .dot-green  { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.6); }
  .dot-purple { background: #a855f7; box-shadow: 0 0 8px rgba(168,85,247,0.6); }
  .dot-orange { background: #f97316; box-shadow: 0 0 8px rgba(249,115,22,0.6); }
  .dot-red    { background: #ef4444; box-shadow: 0 0 8px rgba(239,68,68,0.8); animation: pulse-red 1.8s ease-in-out infinite; }
  [data-theme="light"] .dot-blue   { background: #1d4ed8; }
  [data-theme="light"] .dot-green  { background: #15803d; }
  [data-theme="light"] .dot-purple { background: #7e22ce; }
  [data-theme="light"] .dot-orange { background: #c2410c; }
  [data-theme="light"] .dot-red    { background: #dc2626; }

  @keyframes pulse-red {
    0%,100% { opacity: 1; transform: scale(1); }
    50%     { opacity: 0.6; transform: scale(1.2); }
  }

  .alert-bar {
    background: linear-gradient(90deg, rgba(239,68,68,0.12) 0%, rgba(239,68,68,0.04) 100%);
    border-top: 1px solid rgba(239,68,68,0.25);
  }
  [data-theme="light"] .alert-bar {
    background: linear-gradient(90deg, rgba(220,38,38,0.08) 0%, rgba(220,38,38,0.02) 100%);
    border-top: 1px solid rgba(220,38,38,0.25);
  }

  /* rank bar */
  .rank-track { background: var(--rule); }
  .rank-fill  { background: linear-gradient(90deg, #3b82f6 0%, #60a5fa 50%, #7dd3fc 100%); }
  [data-theme="light"] .rank-fill { background: linear-gradient(90deg, #1e40af 0%, #2563eb 50%, #3b82f6 100%); }
</style>
</head>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

/* ---------- inline lucide-ish icons (so no network dep) ---------- */
const Icon = ({ d, size = 14, stroke = 2, fill = "none", className = "" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor"
    strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" className={className}>
    {d}
  </svg>
);
const ZapIcon = (p) => <Icon {...p} d={<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="currentColor" stroke="none" />} />;
const StarIcon = (p) => <Icon {...p} d={<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" fill="currentColor" stroke="none" />} />;
const AlertIcon = (p) => <Icon {...p} d={<><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>} />;
const TrendIcon = (p) => <Icon {...p} d={<><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></>} />;
const ShieldIcon = (p) => <Icon {...p} d={<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>} />;
const HashIcon = (p) => <Icon {...p} d={<><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></>} />;
const BuildIcon = (p) => <Icon {...p} d={<><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6v6H9z"/></>} />;
const CheckIcon = (p) => <Icon {...p} d={<polyline points="20 6 9 17 4 12"/>} />;
const XIcon = (p) => <Icon {...p} d={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;

/* ---------- FIFA card placeholder (240x422) ---------- */
function FifaCardPlaceholder({ label = "FIFA CARD", rating = 87, name = "J. WAGNER", position = "SEN", variant = "gold" }) {
  const tones = {
    gold: "fifa-card",
    silver: "fifa-card",
  };
  return (
    <div className="relative" style={{ width: 240, height: 422 }}>
      <div className={`${tones[variant]} w-full h-full rounded-xl p-4 flex flex-col relative overflow-hidden`}>
        {/* top: rating + pos */}
        <div className="flex items-start justify-between">
          <div className="flex flex-col items-center leading-none">
            <div className="text-[56px] font-black text-amber-200 tnum" style={{lineHeight:1}}>{rating}</div>
            <div className="text-[14px] font-bold text-amber-300/80 tracking-[0.2em] -mt-1">{position}</div>
          </div>
          <div className="flex flex-col items-end gap-1.5">
            <div className="w-8 h-6 rounded-sm bg-gradient-to-br from-emerald-500 to-yellow-400 opacity-80"/>
            <div className="w-8 h-6 rounded-sm bg-zinc-700/80"/>
          </div>
        </div>

        {/* portrait silhouette */}
        <div className="flex-1 flex items-center justify-center">
          <div className="w-32 h-32 rounded-full border border-amber-500/20 bg-gradient-to-b from-amber-500/10 to-transparent flex items-center justify-center">
            <div className="text-amber-200/40 text-[11px] tracking-[0.25em] font-mono">RETRATO</div>
          </div>
        </div>

        {/* name + divider */}
        <div className="fifa-stripe h-px my-2"/>
        <div className="text-center">
          <div className="text-amber-100 text-[18px] font-black tracking-[0.08em]">{name}</div>
        </div>

        {/* stats row */}
        <div className="grid grid-cols-3 gap-2 mt-3 text-center">
          {[["PAC","82"],["PRS","91"],["INF","88"]].map(([k,v])=>(
            <div key={k} className="flex flex-col leading-none">
              <div className="text-amber-200 font-black text-[14px] tnum">{v}</div>
              <div className="text-amber-400/60 text-[9px] tracking-[0.15em] mt-1">{k}</div>
            </div>
          ))}
        </div>
        <div className="grid grid-cols-3 gap-2 mt-2 text-center">
          {[["LEG","79"],["BSE","93"],["MID","85"]].map(([k,v])=>(
            <div key={k} className="flex flex-col leading-none">
              <div className="text-amber-200 font-black text-[14px] tnum">{v}</div>
              <div className="text-amber-400/60 text-[9px] tracking-[0.15em] mt-1">{k}</div>
            </div>
          ))}
        </div>

        {/* tiny footer label — placeholder marker */}
        <div className="absolute bottom-2 left-0 right-0 text-center text-[9px] tracking-[0.3em] text-amber-300/30 font-mono">
          {label} · 240 × 422
        </div>
      </div>
    </div>
  );
}

/* ---------- Archetype chip ---------- */
const ARCHETYPES = {
  fenomeno:    { label: "Fenômeno",       cls: "chip-blue",   dot: "dot-blue" },
  trabalhador: { label: "Trabalhador",    cls: "chip-green",  dot: "dot-green" },
  articulador: { label: "Articulador",    cls: "chip-purple", dot: "dot-purple" },
  chefeBase:   { label: "Chefe de base",  cls: "chip-orange", dot: "dot-orange" },
};

function Chip({ type, icon }) {
  const a = ARCHETYPES[type];
  if (!a) return null;
  return (
    <span className={`chip ${a.cls}`}>
      <span className={`chip-dot ${a.dot}`}/>
      {a.label}
    </span>
  );
}

function AlertChip() {
  return (
    <span className="chip chip-red">
      <span className="chip-dot dot-red"/>
      <AlertIcon size={10} stroke={2.5}/>
      Alerta jurídico
    </span>
  );
}

/* ---------- Trait badge (gold/silver) ---------- */
function TraitBadge({ variant = "gold", label, icon }) {
  return (
    <div className={`${variant === "gold" ? "trait-gold" : "trait-silver"} rounded-md px-2 py-1.5 flex items-center gap-1.5`}>
      <span className="flex items-center justify-center">{icon}</span>
      <span className="text-[10px] font-black tracking-[0.12em] uppercase leading-none">{label}</span>
    </div>
  );
}

/* ---------- Profiles ---------- */
const PROFILES = {

    firstName: "JAQUES",
    lastName: "WAGNER",
    meta: "SENADOR · BA · 2018",
    bio: "Ex-governador da Bahia (2007–2014), ex-ministro da Defesa e da Casa Civil. Base histórica do PT no Nordeste.",
    rating: 87,
    position: "SEN",
    shortName: "J. WAGNER",
    percentile: "Top 12% entre senadores",
    archetypes: ["fenomeno","trabalhador","articulador","chefeBase"],
    traits: [
      { label: "Fenômeno",       icon: <ZapIcon size={11} stroke={2.5}/>,  variant: "gold" },
      { label: "Fera regional",  icon: <StarIcon size={11} stroke={2.5}/>, variant: "silver" },
    ],
    stats: [
      { k: "Mandatos", v: "04" },
      { k: "PL aprovados", v: "127" },
      { k: "Presença", v: "94%" },
      { k: "Emendas", v: "R$ 42M" },
    ],
  },
  marcal: {
    firstName: "PABLO",
    lastName: "MARÇAL",
    meta: "SEM MANDATO · SP",
    bio: "Empresário, coach e pré-candidato. Sem histórico parlamentar consolidado. Perfil em construção.",
    rating: null, // muted state
    position: "—",
    shortName: "P. MARÇAL",
    percentile: "Dados insuficientes para ranking",
    archetypes: [],
    traits: [],
    sparse: true,
    stats: [
      { k: "Mandatos", v: "—" },
      { k: "PL aprovados", v: "—" },
      { k: "Presença", v: "—" },
      { k: "Emendas", v: "—" },
    ],
  },
};

/* =========================================================
   MAIN HEADER COMPONENT
   ========================================================= */
function HeaderHero({ profile, alert }) {
  const p = profile;
  const isSparse = !!p.sparse;

  return (
    <section
      data-screen-label="01 Header Hero"
      className={`relative rounded-2xl t-bg-card ring-soft overflow-hidden ${alert ? "ring-danger" : ""}`}
    >
      {/* Top alert bar (only when alert on) */}
      {alert && (
        <div className="alert-bar px-6 py-2.5 flex items-center gap-3">

function scoreColor(v) {
  if (v >= 85) return { ring: "rgba(34,197,94,0.35)",  fg: "#22c55e", bg: "rgba(34,197,94,0.10)",  grade: "A" };
  if (v >= 70) return { ring: "rgba(59,130,246,0.35)", fg: "#3b82f6", bg: "rgba(59,130,246,0.10)", grade: "B" };
  if (v >= 50) return { ring: "rgba(234,179,8,0.40)",  fg: "#eab308", bg: "rgba(234,179,8,0.10)",  grade: "C" };
  if (v >= 30) return { ring: "rgba(249,115,22,0.40)", fg: "#f97316", bg: "rgba(249,115,22,0.10)", grade: "D" };
  return         { ring: "rgba(239,68,68,0.45)",  fg: "#ef4444", bg: "rgba(239,68,68,0.10)",  grade: "F" };
}

/* ---------- Hexagon radar ---------- */
function HexRadar({ values, size = 260 }) {
  const cx = size / 2, cy = size / 2;
  const R = size * 0.38; // outer radius
  const rings = [0.25, 0.5, 0.75, 1.0];
  const angle = (i) => (Math.PI * 2 * i) / 6 - Math.PI / 2;

  const ringPoints = (r) => DIMENSIONS.map((_, i) => {
    const a = angle(i);
    return [cx + Math.cos(a) * R * r, cy + Math.sin(a) * R * r];
  });

  const valuePoints = DIMENSIONS.map((d, i) => {
    const a = angle(i);
    const r = (values[d.key] ?? 0) / 100;
    return [cx + Math.cos(a) * R * r, cy + Math.sin(a) * R * r];
  });

  const polyStr = (pts) => pts.map(([x,y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join(" ");

  return (
    <svg viewBox={`0 0 ${size} ${size}`} style={{ width: "100%", maxWidth: size, height: "auto" }}>
      {/* concentric hex rings */}
      {rings.map((r, i) => (
        <polygon
          key={r}
          points={polyStr(ringPoints(r))}
          fill="none"
          stroke="var(--rule-strong)"
          strokeWidth={i === rings.length - 1 ? 1.25 : 0.75}
        />
      ))}
      {/* spokes */}
      {DIMENSIONS.map((d, i) => {
        const [x, y] = ringPoints(1)[i];
        return <line key={d.key} x1={cx} y1={cy} x2={x} y2={y} stroke="var(--rule)" strokeWidth="0.75" />;
      })}
      {/* value polygon */}
      <defs>
        <radialGradient id="radar-fill" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="#60a5fa" stopOpacity="0.45"/>
          <stop offset="100%" stopColor="#3b82f6" stopOpacity="0.18"/>
        </radialGradient>
      </defs>
      <polygon
        points={polyStr(valuePoints)}
        fill="url(#radar-fill)"
        stroke="#3b82f6"
        strokeWidth="1.5"
        strokeLinejoin="round"
      />
      {/* value dots */}
      {valuePoints.map(([x, y], i) => (
        <circle key={i} cx={x} cy={y} r="3.5" fill="#0a0a0b" stroke="#60a5fa" strokeWidth="1.5"/>
      ))}
      {/* labels */}
      {DIMENSIONS.map((d, i) => {
        const a = angle(i);
        const lx = cx + Math.cos(a) * (R + 22);
        const ly = cy + Math.sin(a) * (R + 22);
        const v = values[d.key] ?? 0;
        return (
          <g key={d.key}>
            <text x={lx} y={ly - 4} textAnchor="middle" fontSize="10" fontWeight="700"
              letterSpacing="0.15em" fill="var(--fg-muted)" fontFamily="Inter">
              {d.key}
            </text>
            <text x={lx} y={ly + 9} textAnchor="middle" fontSize="12" fontWeight="800"
              fill="var(--fg-strong)" fontFamily="Inter" style={{ fontVariantNumeric: "tabular-nums" }}>
              {v}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

}/*EDITMODE-END*/;

function useTweaks(defaults) {
  const [state, setState] = useState(defaults);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const handler = (e) => {
      if (!e.data || typeof e.data !== "object") return;
      if (e.data.type === "__activate_edit_mode") setVisible(true);
      if (e.data.type === "__deactivate_edit_mode") setVisible(false);
    };
    window.addEventListener("message", handler);
    window.parent?.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);
  const update = (k, v) => {
    setState((s) => ({ ...s, [k]: v }));
    window.parent?.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
  };
  return { state, visible, update };
}

      </div>

      <div className="mt-3 pt-3 text-[10px] t-fg-dim leading-relaxed" style={{ borderTop: "1px solid var(--rule)" }}>
        Alterne <span className="t-fg">tema</span>, <span className="t-fg">perfil</span> e <span className="t-fg">alerta</span> para ver todos os estados.
      </div>
    </div>
  );
}

/* =========================================================
   App
   ========================================================= */
function App() {
  const { state, visible, update } = useTweaks(TWEAK_DEFAULTS);
  const profile = PROFILES[state.profile] || PROFILES.wagner;

  // apply theme on body
  useEffect(() => {
    document.body.dataset.theme = state.theme === "light" ? "light" : "dark";
  }, [state.theme]);

  // update breadcrumb
  useEffect(() => {
    const el = document.getElementById("bc-name");
    if (el) el.textContent = state.profile === "wagner" ? "jaques-wagner" : "pablo-marcal";
  }, [state.profile]);

  const pct = profile.sparse ? "22%" : "96%";

  return (
    <>
      <HeaderHero profile={profile} alert={state.alert && !profile.sparse} />

      <OverallMap profile={profile} />

      {/* secondary context: makes the hero look rooted, not floating */}
      <div className="mt-4 grid grid-cols-3 gap-3 text-[12px] t-fg-dim">
        <div className="rounded-lg px-4 py-3 t-bg-card-2" style={{ border: "1px solid var(--rule)" }}>
          <div className="text-[10px] font-mono tracking-[0.15em] t-fg-ghost uppercase">Próxima leitura</div>
          <div className="mt-1 t-fg">Histórico eleitoral →</div>
        </div>
        <div className="rounded-lg px-4 py-3 t-bg-card-2" style={{ border: "1px solid var(--rule)" }}>
          <div className="text-[10px] font-mono tracking-[0.15em] t-fg-ghost uppercase">Fontes cruzadas</div>
          <div className="mt-1 t-fg">TSE · Câmara · Senado · STF</div>
        </div>
        <div className="rounded-lg px-4 py-3 t-bg-card-2" style={{ border: "1px solid var(--rule)" }}>
          <div className="text-[10px] font-mono tracking-[0.15em] t-fg-ghost uppercase">Confiança</div>
          <div className="mt-1 t-fg flex items-center gap-2">
            <div className="h-1 w-20 rounded-full rank-track overflow-hidden">
              <div className="h-full" style={{ width: pct, background: "var(--ok)" }}/>
            </div>
            <span className="tnum t-fg-muted">{pct}</span>
          </div>
        </div>
      </div>

      <TweaksPanel state={state} update={update} visible={visible} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
