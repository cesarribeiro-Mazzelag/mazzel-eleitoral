<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Dossiê Político</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    fontFamily: { sans: ['Inter','ui-sans-serif','system-ui'], mono: ['JetBrains Mono','ui-monospace','monospace'] },
  }}}
</script>
<style>
/* theme tokens + shared component styles */
:root, [data-theme="dark"] {
  --bg-page: #0a0a0b; --bg-page-2: #0c0c0e;
  --bg-card: #0e0e11; --bg-card-2: rgba(255,255,255,0.015);
  --bg-sidebar: #0b0b0d;
  --fg: #e4e4e7; --fg-strong: #ffffff; --fg-muted: #a1a1aa;
  --fg-dim: #71717a; --fg-faint: #52525b; --fg-ghost: #3f3f46;
  --rule: rgba(255,255,255,0.05); --rule-strong: rgba(255,255,255,0.08);
  --hairline: rgba(255,255,255,0.06);
  --accent-blue: #93c5fd; --accent-blue-strong: #60a5fa;
  --overall-from: #ffffff; --overall-to: #d4d4d8;
  --overall-muted-from: #71717a; --overall-muted-to: #52525b;
  --page-grad-1: rgba(59,130,246,0.08); --page-grad-2: rgba(168,85,247,0.05);
  --ok: #34d399; --verified: #34d399;
  --warn: #fbbf24; --danger: #f87171;
  --chart-hover: rgba(255,255,255,0.08);
}
[data-theme="light"] {
  --bg-page: #f4f4f5; --bg-page-2: #fafafa;
  --bg-card: #ffffff; --bg-card-2: rgba(0,0,0,0.02);
  --bg-sidebar: #fafafa;
  --fg: #18181b; --fg-strong: #09090b; --fg-muted: #52525b;
  --fg-dim: #71717a; --fg-faint: #a1a1aa; --fg-ghost: #d4d4d8;
  --rule: rgba(0,0,0,0.06); --rule-strong: rgba(0,0,0,0.10);
  --hairline: rgba(0,0,0,0.08);
  --accent-blue: #1d4ed8; --accent-blue-strong: #1e40af;
  --overall-from: #09090b; --overall-to: #3f3f46;
  --overall-muted-from: #a1a1aa; --overall-muted-to: #71717a;
  --page-grad-1: rgba(59,130,246,0.07); --page-grad-2: rgba(168,85,247,0.05);
  --ok: #059669; --verified: #059669;
  --warn: #d97706; --danger: #dc2626;
  --chart-hover: rgba(0,0,0,0.04);
}
html,body { background: var(--bg-page); color: var(--fg); }
.tnum { font-variant-numeric: tabular-nums; font-feature-settings: "tnum","cv11"; }
.font-display { font-family: 'Inter', sans-serif; font-feature-settings: "cv11","ss01"; letter-spacing: -0.02em; }

.t-fg{color:var(--fg);} .t-fg-strong{color:var(--fg-strong);} .t-fg-muted{color:var(--fg-muted);}
.t-fg-dim{color:var(--fg-dim);} .t-fg-faint{color:var(--fg-faint);} .t-fg-ghost{color:var(--fg-ghost);}
.t-accent{color:var(--accent-blue);} .t-ok{color:var(--ok);}
.t-border{border-color:var(--rule);} .t-border-strong{border-color:var(--rule-strong);}
.t-bg-card{background:var(--bg-card);} .t-bg-card-2{background:var(--bg-card-2);}
.t-bg-sidebar{background:var(--bg-sidebar);}

.bg-dossier {
  background:
    radial-gradient(1200px 600px at 85% -10%, var(--page-grad-1), transparent 60%),
    radial-gradient(800px 400px at 10% 0%, var(--page-grad-2), transparent 60%),
    linear-gradient(180deg, var(--bg-page-2) 0%, var(--bg-page) 100%);
  min-height: 100vh;
}
.ring-soft { box-shadow: 0 0 0 1px var(--hairline), 0 1px 0 var(--hairline) inset; }
[data-theme="light"] .ring-soft { box-shadow: 0 0 0 1px var(--hairline), 0 1px 2px rgba(0,0,0,0.03); }
.ring-danger { box-shadow: 0 0 0 2px rgba(239,68,68,0.40), 0 0 60px -10px rgba(239,68,68,0.25) inset; }
[data-theme="light"] .ring-danger { box-shadow: 0 0 0 2px rgba(220,38,38,0.50), 0 8px 24px -12px rgba(220,38,38,0.25); }

.trait-gold {
  background: linear-gradient(180deg, #facc15 0%, #b8860b 100%); color: #1a1205;
  box-shadow: 0 1px 0 rgba(255,255,255,0.45) inset, 0 -1px 0 rgba(0,0,0,0.25) inset, 0 4px 12px -4px rgba(234,179,8,0.4);
}
.trait-silver {
  background: linear-gradient(180deg, #f3f4f6 0%, #9ca3af 100%); color: #18181b;
  box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 -1px 0 rgba(0,0,0,0.2) inset, 0 4px 12px -4px rgba(156,163,175,0.35);
}

.fifa-card {
  background:
    linear-gradient(135deg, rgba(251,191,36,0.12) 0%, rgba(251,191,36,0.02) 40%, rgba(255,255,255,0.04) 100%),
    linear-gradient(180deg, #1a1510 0%, #0f0d0a 100%);
  border: 1px solid rgba(251,191,36,0.25);
  box-shadow: 0 20px 40px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(251,191,36,0.08) inset;
}
.fifa-stripe { background: linear-gradient(90deg, transparent 0%, rgba(251,191,36,0.4) 50%, transparent 100%); }

.overall-num {
  background: linear-gradient(180deg, var(--overall-from) 0%, var(--overall-to) 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.overall-muted {
  background: linear-gradient(180deg, var(--overall-muted-from) 0%, var(--overall-muted-to) 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
}

.chip {
  height: 24px; padding: 0 8px; border-radius: 4px;
  font: 600 11px/24px 'Inter', sans-serif; letter-spacing: 0.06em; text-transform: uppercase;
  display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
}
.chip-dot { width: 6px; height: 6px; border-radius: 999px; }

:root .chip-blue,   [data-theme="dark"] .chip-blue   { background: rgba(59,130,246,0.12); color: #93c5fd; box-shadow: inset 0 0 0 1px rgba(59,130,246,0.25); }
:root .chip-green,  [data-theme="dark"] .chip-green  { background: rgba(34,197,94,0.10); color: #86efac; box-shadow: inset 0 0 0 1px rgba(34,197,94,0.22); }
:root .chip-purple, [data-theme="dark"] .chip-purple { background: rgba(168,85,247,0.12); color: #d8b4fe; box-shadow: inset 0 0 0 1px rgba(168,85,247,0.25); }
:root .chip-orange, [data-theme="dark"] .chip-orange { background: rgba(249,115,22,0.12); color: #fdba74; box-shadow: inset 0 0 0 1px rgba(249,115,22,0.25); }
:root .chip-red,    [data-theme="dark"] .chip-red    { background: rgba(239,68,68,0.12);  color: #fca5a5; box-shadow: inset 0 0 0 1px rgba(239,68,68,0.35); }
:root .chip-amber,  [data-theme="dark"] .chip-amber  { background: rgba(251,191,36,0.12); color: #fcd34d; box-shadow: inset 0 0 0 1px rgba(251,191,36,0.30); }
:root .chip-muted,  [data-theme="dark"] .chip-muted  { background: rgba(161,161,170,0.08); color: #a1a1aa; box-shadow: inset 0 0 0 1px rgba(161,161,170,0.15); }

[data-theme="light"] .chip-blue   { background: rgba(37,99,235,0.10);  color: #1d4ed8; box-shadow: inset 0 0 0 1px rgba(37,99,235,0.30); }
[data-theme="light"] .chip-green  { background: rgba(22,163,74,0.10);  color: #15803d; box-shadow: inset 0 0 0 1px rgba(22,163,74,0.28); }
[data-theme="light"] .chip-purple { background: rgba(147,51,234,0.10); color: #7e22ce; box-shadow: inset 0 0 0 1px rgba(147,51,234,0.30); }
[data-theme="light"] .chip-orange { background: rgba(234,88,12,0.10);  color: #c2410c; box-shadow: inset 0 0 0 1px rgba(234,88,12,0.30); }
[data-theme="light"] .chip-red    { background: rgba(220,38,38,0.10);  color: #b91c1c; box-shadow: inset 0 0 0 1px rgba(220,38,38,0.40); }
[data-theme="light"] .chip-amber  { background: rgba(217,119,6,0.10);  color: #a16207; box-shadow: inset 0 0 0 1px rgba(217,119,6,0.35); }
[data-theme="light"] .chip-muted  { background: rgba(82,82,91,0.06);   color: #52525b; box-shadow: inset 0 0 0 1px rgba(82,82,91,0.18); }

.dot-blue   { background: #3b82f6; } .dot-green  { background: #22c55e; }
.dot-purple { background: #a855f7; } .dot-orange { background: #f97316; }
.dot-red    { background: #ef4444; animation: pulse-red 1.8s ease-in-out infinite; }
.dot-amber  { background: #fbbf24; }
[data-theme="light"] .dot-blue{background:#1d4ed8}[data-theme="light"] .dot-green{background:#15803d}
[data-theme="light"] .dot-purple{background:#7e22ce}[data-theme="light"] .dot-orange{background:#c2410c}
[data-theme="light"] .dot-red{background:#dc2626}[data-theme="light"] .dot-amber{background:#a16207}

@keyframes pulse-red { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.2)} }

.alert-bar {
  background: linear-gradient(90deg, rgba(239,68,68,0.12) 0%, rgba(239,68,68,0.04) 100%);
  border-top: 1px solid rgba(239,68,68,0.25);
}
[data-theme="light"] .alert-bar {
  background: linear-gradient(90deg, rgba(220,38,38,0.08) 0%, rgba(220,38,38,0.02) 100%);
  border-top: 1px solid rgba(220,38,38,0.25);
}

.rank-track { background: var(--rule); }
.rank-fill  { background: linear-gradient(90deg, #3b82f6 0%, #60a5fa 50%, #7dd3fc 100%); }
[data-theme="light"] .rank-fill { background: linear-gradient(90deg, #1e40af 0%, #2563eb 50%, #3b82f6 100%); }

/* severity rings for alerts */
.sev-critico { box-shadow: 0 0 0 2px rgba(239,68,68,0.55), 0 8px 32px -8px rgba(239,68,68,0.35); }
.sev-alto    { box-shadow: 0 0 0 1px rgba(239,68,68,0.35); }
.sev-medio   { box-shadow: 0 0 0 1px rgba(251,191,36,0.35); }
.sev-baixo   { box-shadow: 0 0 0 1px var(--rule-strong); }
[data-theme="light"] .sev-critico { box-shadow: 0 0 0 2px rgba(220,38,38,0.55), 0 8px 32px -8px rgba(220,38,38,0.25); }
[data-theme="light"] .sev-alto    { box-shadow: 0 0 0 1px rgba(220,38,38,0.45); }
[data-theme="light"] .sev-medio   { box-shadow: 0 0 0 1px rgba(217,119,6,0.45); }

/* sidebar nav item */
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 12px 7px 14px; border-left: 2px solid transparent;
  font: 500 13px/1.2 Inter, sans-serif;
  color: var(--fg-muted); cursor: pointer; transition: color .15s, border-color .15s, background .15s;
  border-radius: 0;
}
.nav-item:hover { color: var(--fg); }
.nav-item.active { color: var(--accent-blue); border-left-color: var(--accent-blue-strong); background: var(--chart-hover); }
.nav-item .nav-num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--fg-dim); width: 14px; }
.nav-item.active .nav-num { color: var(--accent-blue); }

/* scroll reveal hook: section */
section[data-screen-label] { scroll-margin-top: 80px; }

/* timeline */
.timeline-scroll { scrollbar-width: thin; scrollbar-color: var(--rule-strong) transparent; }
.timeline-scroll::-webkit-scrollbar { height: 8px; }
.timeline-scroll::-webkit-scrollbar-track { background: transparent; }
.timeline-scroll::-webkit-scrollbar-thumb { background: var(--rule-strong); border-radius: 4px; }

/* node styles */
.node-eleito    { background:#22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.25), 0 0 18px rgba(34,197,94,0.55); }
.node-naoeleito { background: var(--fg-ghost); }
.node-2turno    { background:#fbbf24; box-shadow: 0 0 0 3px rgba(251,191,36,0.25); }
.node-nomeado   { background:#a855f7; box-shadow: 0 0 0 3px rgba(168,85,247,0.2); }
[data-theme="light"] .node-eleito{background:#15803d;box-shadow:0 0 0 3px rgba(21,128,61,0.18)}
[data-theme="light"] .node-2turno{background:#a16207}
[data-theme="light"] .node-nomeado{background:#7e22ce}

/* tweaks button */
.btn-ghost {
  padding: 6px 10px; border-radius: 6px; font: 600 11px/1 Inter, sans-serif;
  background: var(--rule); color: var(--fg); cursor: pointer; transition: background .12s;
  border: 1px solid transparent;
}
.btn-ghost:hover { background: var(--rule-strong); }
.btn-ghost.active { background: var(--fg-strong); color: var(--bg-card); }

/* map mock polygon hover */
.map-region { transition: opacity .18s, transform .18s; transform-origin: center; }
.map-region:hover { opacity: 0.9; transform: scale(1.01); }

.shell-grid { display: grid; grid-template-columns: 224px 1fr; min-height: 100vh; }
@media (max-width: 1100px) {
  .shell-grid { grid-template-columns: 1fr; }
  .sidebar-col { display: none !important; }
}

</style>
</head>

/* === src/primitives.jsx === */
/* small reusable primitives */
const { useState, useEffect, useMemo, useRef } = React;

function SectionShell({ id, label, title, sub, kicker, children, pad = true }) {
  return (
    <section id={id} data-screen-label={label} className="rounded-2xl t-bg-card ring-soft overflow-hidden">
      <div className="px-6 py-4 flex items-center justify-between" style={{ borderBottom: "1px solid var(--rule)" }}>
        <div className="flex items-baseline gap-3">
          <div className="text-[10px] font-bold tracking-[0.25em] uppercase t-fg-dim">{title}</div>
          {sub && <div className="text-[11px] font-mono t-fg-ghost">/ {sub}</div>}
        </div>
        {kicker && <div className="text-[11px] font-mono t-fg-dim">{kicker}</div>}
      </div>
      <div className={pad ? "p-6" : ""}>{children}</div>
    </section>
  );
}

function EmptyState({ icon, title, text, tone = "muted" }) {
  const toneCls = {
    muted:   { bg: "var(--bg-card-2)", fg: "var(--fg-muted)", border: "var(--rule)" },
    ok:      { bg: "rgba(34,197,94,0.06)", fg: "var(--ok)",   border: "rgba(34,197,94,0.35)" },
    warn:    { bg: "rgba(251,191,36,0.06)", fg: "var(--warn)", border: "rgba(251,191,36,0.35)" },
  }[tone];
  return (
    <div className="rounded-xl px-6 py-8 flex flex-col items-center text-center"
      style={{ background: toneCls.bg, border: `1px dashed ${toneCls.border}` }}>
      <div style={{ color: toneCls.fg }}>{icon}</div>
      <div className="mt-3 text-[14px] font-bold t-fg-strong">{title}</div>
      {text && <div className="mt-1 text-[12px] t-fg-muted max-w-sm">{text}</div>}
    </div>
  );
}

function KPI({ label, value, hint, tone = "default" }) {
  const color = { default: "t-fg-strong", ok: "", warn: "", danger: "" }[tone] || "t-fg-strong";
  const style = {
    default: {},
    ok:     { color: "var(--ok)" },
    warn:   { color: "var(--warn)" },
    danger: { color: "var(--danger)" },
  }[tone] || {};
  return (
    <div className="rounded-lg px-4 py-3.5" style={{ background: "var(--bg-card-2)", border: "1px solid var(--rule)" }}>
      <div className="text-[10px] font-mono tracking-[0.15em] uppercase t-fg-dim">{label}</div>
      <div className={`text-[22px] font-black tnum mt-1 font-display ${color}`} style={style}>{value}</div>
      {hint && <div className="text-[11px] t-fg-muted mt-0.5">{hint}</div>}
    </div>
  );
}

function Divider() { return <div className="h-px" style={{ background: "var(--rule)" }}/>; }

Object.assign(window, { SectionShell, EmptyState, KPI, Divider });

</script>

<script type="text/babel" data-presets="react">
/* === src/section-overall.jsx === */
/* Section 02 — Overall Map (radar + breakdown) */

function scoreColor(v) {
  if (v >= 85) return { ring: "rgba(34,197,94,0.35)",  fg: "#22c55e", bg: "rgba(34,197,94,0.10)",  grade: "A" };
  if (v >= 70) return { ring: "rgba(59,130,246,0.35)", fg: "#3b82f6", bg: "rgba(59,130,246,0.10)", grade: "B" };
  if (v >= 50) return { ring: "rgba(234,179,8,0.40)",  fg: "#eab308", bg: "rgba(234,179,8,0.10)",  grade: "C" };
  if (v >= 30) return { ring: "rgba(249,115,22,0.40)", fg: "#f97316", bg: "rgba(249,115,22,0.10)", grade: "D" };
  return         { ring: "rgba(239,68,68,0.45)",  fg: "#ef4444", bg: "rgba(239,68,68,0.10)",  grade: "F" };
}

function HexRadar({ values, size = 260 }) {
  const cx = size/2, cy = size/2, R = size*0.38;
  const rings = [0.25, 0.5, 0.75, 1.0];
  const angle = (i) => (Math.PI*2*i)/6 - Math.PI/2;
  const ringPoints = (r) => DIMENSIONS.map((_,i)=>{ const a=angle(i); return [cx+Math.cos(a)*R*r, cy+Math.sin(a)*R*r]; });
  const valuePoints = DIMENSIONS.map((d,i)=>{ const a=angle(i); const r=(values[d.key]??0)/100; return [cx+Math.cos(a)*R*r, cy+Math.sin(a)*R*r]; });
  const poly = (pts) => pts.map(([x,y])=>`${x.toFixed(1)},${y.toFixed(1)}`).join(" ");
  return (
    <svg viewBox={`0 0 ${size} ${size}`} style={{ width:"100%", maxWidth:size, height:"auto" }}>
      {rings.map((r,i)=>(
        <polygon key={r} points={poly(ringPoints(r))} fill="none" stroke="var(--rule-strong)" strokeWidth={i===rings.length-1?1.25:0.75}/>
      ))}
      {DIMENSIONS.map((d,i)=>{ const [x,y]=ringPoints(1)[i]; return <line key={d.key} x1={cx} y1={cy} x2={x} y2={y} stroke="var(--rule)" strokeWidth="0.75"/>; })}
      <defs>
        <radialGradient id="radar-fill" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="#60a5fa" stopOpacity="0.45"/>
          <stop offset="100%" stopColor="#3b82f6" stopOpacity="0.18"/>
        </radialGradient>
      </defs>
      <polygon points={poly(valuePoints)} fill="url(#radar-fill)" stroke="#3b82f6" strokeWidth="1.5" strokeLinejoin="round"/>
      {valuePoints.map(([x,y],i)=><circle key={i} cx={x} cy={y} r="3.5" fill="var(--bg-card)" stroke="#60a5fa" strokeWidth="1.5"/>)}
      {DIMENSIONS.map((d,i)=>{ const a=angle(i); const lx=cx+Math.cos(a)*(R+22); const ly=cy+Math.sin(a)*(R+22); const v=values[d.key]??0;
        return (
          <g key={d.key}>
            <text x={lx} y={ly-4} textAnchor="middle" fontSize="10" fontWeight="700" letterSpacing="0.15em" fill="var(--fg-muted)" fontFamily="Inter">{d.key}</text>
            <text x={lx} y={ly+9} textAnchor="middle" fontSize="12" fontWeight="800" fill="var(--fg-strong)" fontFamily="Inter" style={{ fontVariantNumeric:"tabular-nums" }}>{v}</text>
          </g>
        );
      })}
    </svg>
  );
}

function StatRow({ dim, value, isActive, onClick }) {
  const c = scoreColor(value);
  return (
    <button type="button" onClick={onClick}
      className="w-full text-left rounded-lg px-3 py-2.5 flex items-center gap-3 transition-colors"
      style={{ background: isActive?"var(--rule)":"transparent", border:`1px solid ${isActive?"var(--rule-strong)":"transparent"}` }}>
      <div className="flex-shrink-0 w-10 h-10 rounded-md flex flex-col items-center justify-center"
        style={{ background:c.bg, boxShadow:`inset 0 0 0 1px ${c.ring}` }}>
        <div className="text-[9px] font-bold tracking-[0.15em]" style={{color:c.fg}}>{dim.key}</div>
        <div className="text-[11px] font-black tnum leading-none mt-0.5" style={{color:c.fg}}>{value}</div>
      </div>
      <div className="flex-1 min-w-0">
        <div className="flex items-center justify-between mb-1">
          <div className="text-[12px] font-semibold t-fg-strong">{dim.label}</div>
          <div className="text-[10px] font-mono t-fg-dim">
            <span className="font-bold" style={{color:c.fg}}>{c.grade}</span>
            <span className="t-fg-ghost"> · </span>
            <span className="tnum">{value}/100</span>
          </div>
        </div>
        <div className="h-1.5 rounded-full overflow-hidden" style={{ background:"var(--rule)" }}>
          <div className="h-full rounded-full transition-all duration-500" style={{ width:`${value}%`, background:`linear-gradient(90deg, ${c.fg}88, ${c.fg})` }}/>
        </div>
      </div>
    </button>
  );
}

function StatBreakdown({ dim, value }) {
  const rows = STAT_BREAKDOWN[dim.key] || [];
  const c = scoreColor(value);
  return (
    <div className="h-full rounded-lg p-5" style={{ background:"var(--bg-card-2)", border:"1px solid var(--rule)" }}>
      <div className="flex items-start justify-between mb-1">
        <div>
          <div className="text-[10px] font-bold tracking-[0.2em] uppercase t-fg-dim">{dim.key}</div>
          <div className="text-[22px] font-black t-fg-strong font-display mt-0.5">{dim.label}</div>
        </div>
        <div className="text-right">
          <div className="text-[48px] font-black font-display tnum leading-[0.9]" style={{color:c.fg}}>{value}</div>
          <div className="text-[10px] font-bold tracking-[0.15em] uppercase mt-0.5" style={{color:c.fg}}>Grade {c.grade}</div>
        </div>
      </div>
      <p className="text-[12px] t-fg-muted leading-relaxed mt-2 mb-4">{dim.hint}</p>
      <div className="text-[10px] font-bold tracking-[0.15em] uppercase t-fg-dim mb-2">Composição</div>
      <div className="space-y-2.5">
        {rows.map(r=>{ const rc=scoreColor(r.v); return (
          <div key={r.k}>
            <div className="flex items-center justify-between mb-1">
              <div className="text-[12px] t-fg">{r.k}</div>
              <div className="text-[11px] font-mono t-fg-dim flex items-center gap-2">
                <span className="tnum" style={{color:rc.fg}}>{r.v}</span>
                <span className="t-fg-ghost">peso</span>
                <span className="t-fg-muted">{r.w}</span>
              </div>
            </div>
            <div className="h-1 rounded-full overflow-hidden" style={{ background:"var(--rule)" }}>
              <div className="h-full rounded-full" style={{ width:`${r.v}%`, background:rc.fg }}/>
            </div>
          </div>
        ); })}
      </div>
      <div className="mt-5 pt-4 grid grid-cols-3 gap-3" style={{ borderTop:"1px solid var(--rule)" }}>
        <div>
          <div className="text-[9px] font-mono tracking-[0.15em] uppercase t-fg-dim">Percentil</div>
          <div className="text-[15px] font-bold tnum t-fg-strong mt-0.5">Top {value>=85?"10":value>=70?"25":value>=50?"50":"70"}%</div>
        </div>
        <div>
          <div className="text-[9px] font-mono tracking-[0.15em] uppercase t-fg-dim">Variação</div>
          <div className="text-[15px] font-bold tnum mt-0.5" style={{color: value>=60?"#22c55e":"#ef4444"}}>{value>=60?"▲ +4":"▼ -7"}</div>
        </div>
        <div>
          <div className="text-[9px] font-mono tracking-[0.15em] uppercase t-fg-dim">Fonte</div>
          <div className="text-[11px] t-fg-muted mt-0.5 leading-tight">TSE · Câmara · Senado</div>
        </div>
      </div>
    </div>
  );
}

function OverallMap({ profile }) {
  const values = STATS[profile.sparse ? "marcal" : "wagner"];
  const [selKey, setSelKey] = useState("BSE");
  const dim = DIMENSIONS.find(d=>d.key===selKey);
  const overall = Math.round(Object.values(values).reduce((a,b)=>a+b,0)/DIMENSIONS.length);
  return (
    <SectionShell id="sec-overall" label="02 Overall" title="Mapa do Overall" sub="stat breakdown"
      kicker={<><span>Média ponderada: <span className="t-fg-strong font-bold tnum">{overall}</span></span><span className="t-fg-ghost mx-2">·</span><span>6 dimensões</span></>}>
      <div className="grid gap-6" style={{ gridTemplateColumns: "320px 280px 1fr" }}>
        <div className="flex flex-col">
          <div className="flex items-center justify-center flex-1" style={{minHeight:280}}>
            <HexRadar values={values} size={280}/>
          </div>
          <div className="mt-2 pt-4 flex items-center justify-between text-[10px] font-mono t-fg-dim" style={{borderTop:"1px solid var(--rule)"}}>
            <div className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-sm" style={{background:"#3b82f6"}}/>Candidato</div>
            <div className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-sm" style={{background:"var(--rule-strong)",boxShadow:"inset 0 0 0 1px var(--fg-ghost)"}}/>Grade (0–100)</div>
          </div>
        </div>
        <div className="flex flex-col gap-1">
          <div className="text-[10px] font-bold tracking-[0.15em] uppercase t-fg-dim mb-2 px-1">Dimensões</div>
          {DIMENSIONS.map(d=>(
            <StatRow key={d.key} dim={d} value={values[d.key]} isActive={d.key===selKey} onClick={()=>setSelKey(d.key)}/>
          ))}
        </div>
        <div><StatBreakdown dim={dim} value={values[dim.key]}/></div>
      </div>
    </SectionShell>
  );
}

Object.assign(window, { OverallMap, scoreColor });

</script>

<script type="text/babel" data-presets="react">
/* === src/section-eleitoral.jsx === */
/* Section 03 — Mapa Eleitoral (abstract choropleth) */

const UF_POLYS = {
  BA: "M 280 180 L 340 170 L 360 200 L 380 240 L 360 290 L 310 300 L 280 280 L 260 240 Z",
  PE: "M 290 150 L 340 140 L 360 160 L 340 170 L 280 180 L 270 160 Z",
  SE: "M 340 170 L 360 170 L 370 185 L 360 200 Z",
  AL: "M 360 170 L 380 165 L 395 180 L 375 195 L 360 200 Z",
  CE: "M 280 100 L 340 90 L 360 110 L 340 140 L 290 150 L 280 135 Z",
  PI: "M 230 110 L 280 100 L 280 135 L 270 160 L 250 170 L 220 140 Z",
  MA: "M 180 90 L 230 95 L 240 130 L 220 140 L 180 135 L 165 115 Z",
  SP: "M 200 320 L 260 310 L 280 340 L 260 370 L 210 370 L 190 350 Z",
  MG: "M 230 240 L 290 230 L 310 260 L 290 300 L 240 300 L 215 270 Z",
  RJ: "M 280 310 L 310 305 L 325 320 L 310 335 L 285 335 Z",
  PR: "M 190 360 L 240 355 L 260 380 L 240 400 L 200 400 L 180 380 Z",
};

function intensityColor(v) {
  // 5-level ramp using --accent (candidate/party blue)
  if (v >= 80) return "#1e40af";
  if (v >= 60) return "#2563eb";
  if (v >= 40) return "#60a5fa";
  if (v >= 20) return "#93c5fd";
  if (v > 0)   return "#dbeafe";
  return "var(--rule-strong)";
}
function intensityLabel(v) {
  if (v >= 80) return "Domina";
  if (v >= 60) return "Forte";
  if (v >= 40) return "Médio";
  if (v >= 20) return "Fraco";
  return "Ausente";
}

function MapaEleitoral({ profile }) {
  const e = profile.eleitoral;
  return (
    <SectionShell id="sec-mapa" label="03 Mapa Eleitoral" title="Mapa Eleitoral" sub={e.escopo.toLowerCase()}
      kicker={<span>Ano-referência: <span className="t-fg-strong tnum">{e.ano}</span></span>} pad={false}>
      <div className="relative" style={{ height: 480 }}>
        {/* choropleth */}
        <svg viewBox="0 0 600 480" className="absolute inset-0 w-full h-full">
          <defs>
            <linearGradient id="map-bg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="var(--bg-card)"/>
              <stop offset="100%" stopColor="var(--bg-card-2)"/>
            </linearGradient>
            <pattern id="grid-dots" width="18" height="18" patternUnits="userSpaceOnUse">
              <circle cx="1" cy="1" r="0.5" fill="var(--fg-ghost)" opacity="0.35"/>
            </pattern>
          </defs>
          <rect width="600" height="480" fill="url(#map-bg)"/>
          <rect width="600" height="480" fill="url(#grid-dots)"/>
          {/* ocean label */}
          <text x="480" y="240" fontSize="10" letterSpacing="0.25em" fill="var(--fg-ghost)" fontFamily="JetBrains Mono">ATLÂNTICO</text>
          {/* polygons */}
          {Object.entries(UF_POLYS).map(([uf, d])=>{
            const v = e.mapIntensity[uf] ?? 0;
            const c = intensityColor(v);
            return (
              <g key={uf} className="map-region">
                <path d={d} fill={c} fillOpacity={v>0?0.9:0.15} stroke="var(--bg-card)" strokeWidth="1.5"/>
                {v >= 40 && (() => {
                  // centroid approximation from path - simple text at heuristic pos
                  const pos = { BA:[315,235], PE:[315,160], SP:[230,345], MG:[270,270], CE:[315,120], PI:[250,135], MA:[205,115], RJ:[300,322], PR:[220,380], SE:[355,188], AL:[378,183] }[uf];
                  return pos ? (
                    <text x={pos[0]} y={pos[1]} fontSize="11" fontWeight="800" fill={v>=60?"#fff":"var(--fg-strong)"} textAnchor="middle" fontFamily="Inter">{uf}</text>
                  ) : null;
                })()}
              </g>
            );
          })}
        </svg>

        {/* chip top-left: context */}
        <div className="absolute top-5 left-5">
          <div className="chip chip-blue !h-auto !px-3 !py-2 !text-[11px]">
            <span className="t-fg-strong font-bold">Eleito em {e.ano}</span>
            <span className="t-fg-ghost">·</span>
            <span className="tnum">{e.votos} votos</span>
            <span className="t-fg-ghost">·</span>
            <span>{e.percentValidos} válidos</span>
          </div>
        </div>

        {/* badge top-right */}
        <div className="absolute top-5 right-5 rounded-lg px-3 py-2"
          style={{ background:"var(--bg-card)", border:"1px solid var(--rule-strong)" }}>

        {/* top 3 munis card */}

          <div className="text-[10px] font-bold tracking-[0.2em] uppercase t-fg-dim mb-3">Top 3 municípios</div>
          <div className="space-y-2.5">
            {e.topMunis.map((m,i)=>(
              <div key={m.nome} className="flex items-center gap-3">
                <div className="text-[10px] font-mono t-fg-ghost w-4">{String(i+1).padStart(2,'0')}</div>
                <div className="flex-1 min-w-0">
                  <div className="text-[12px] font-semibold t-fg-strong truncate">{m.nome}</div>
                  <div className="text-[10px] font-mono t-fg-dim">{m.votos} votos</div>

            ))}
          </div>
        </div>
      </div>

      {/* legend */}
      <div className="px-6 py-4 flex items-center justify-between" style={{ borderTop:"1px solid var(--rule)" }}>
        <div className="text-[10px] font-bold tracking-[0.2em] uppercase t-fg-dim">Intensidade</div>
        <div className="flex items-center gap-0">
          {[0,20,40,60,80].map((v,i)=>(
            <div key={v} className="flex items-center gap-2 px-3" style={i>0?{borderLeft:"1px solid var(--rule)"}:{}}>
              <div className="w-5 h-3 rounded-sm" style={{ background: intensityColor(v+1), opacity: v===0?0.25:1 }}/>
              <div className="text-[11px] t-fg-muted">{intensityLabel(v+1)}</div>
            </div>
          ))}
        </div>
        <div className="text-[10px] font-mono t-fg-dim">Fonte: TSE</div>
      </div>

}

<script type="text/babel" data-presets="react">

function TrajetoriaTimeline({ profile }) {
  const events = profile.trajetoria || [];
  const scrollRef = useRef(null);
  const scroll = (dx) => scrollRef.current?.scrollBy({ left: dx, behavior: "smooth" });

  const nodeClass = (s) => ({

    "2o-turno":  "node-2turno",
    "nomeado":   "node-nomeado",

<script type="text/babel" data-presets="react">
/* === src/section-emendas.jsx === */
/* Section 08 — Emendas parlamentares */

function Donut({ data, size = 180 }) {
  const total = data.reduce((a,b)=>a+b.v,0);
  const cx = size/2, cy = size/2, R = size/2 - 8, r = size/2 - 34;
  let acc = 0;
  const arcs = data.map(d => {
    const start = acc/total * Math.PI*2 - Math.PI/2;
    acc += d.v;
    const end = acc/total * Math.PI*2 - Math.PI/2;
    const large = (end-start) > Math.PI ? 1 : 0;
    const x1 = cx+Math.cos(start)*R, y1=cy+Math.sin(start)*R;
    const x2 = cx+Math.cos(end)*R,   y2=cy+Math.sin(end)*R;
    const x3 = cx+Math.cos(end)*r,   y3=cy+Math.sin(end)*r;
    const x4 = cx+Math.cos(start)*r, y4=cy+Math.sin(start)*r;
    return { d, path: `M ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2} L ${x3} ${y3} A ${r} ${r} 0 ${large} 0 ${x4} ${y4} Z` };
  });
  return (
    <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size}>
      {arcs.map((a,i)=><path key={i} d={a.path} fill={a.d.c} opacity={0.9}/>)}
      <circle cx={cx} cy={cy} r={r-2} fill="var(--bg-card)"/>
      <text x={cx} y={cy-4} textAnchor="middle" fontSize="10" fill="var(--fg-dim)" fontFamily="Inter" fontWeight="700" letterSpacing="0.15em">EXECUTADO</text>

  );

<script type="text/babel" data-presets="react">
/* === src/app.jsx === */
/* App shell: sidebar + content + tweaks */

const DEFAULTS = /*EDITMODE-BEGIN*/{
  "profile": "wagner",
  "alert": false,
  "theme": "light",
  "cargo": "PRES",
  "densidade": "completo"
}/*EDITMODE-END*/;

function App() {
  const [state, setState] = useState(() => {
    try { const s = localStorage.getItem("dossie-state"); if (s) return { ...DEFAULTS, ...JSON.parse(s) }; } catch(e){}
    return DEFAULTS;
  });
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [activeId, setActiveId] = useState("sec-identidade");
  const [scrollPct, setScrollPct] = useState(0);

  useEffect(() => {
    document.body.dataset.theme = state.theme;
    try { localStorage.setItem("dossie-state", JSON.stringify(state)); } catch(e){}
  }, [state]);

  // edit-mode bridge
  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data) return;
      if (e.data.type === "__activate_edit_mode")  setTweaksOpen(true);
      if (e.data.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const updateState = (next) => {
    setState(next);
    const keys = {};
    for (const k of Object.keys(next)) if (next[k] !== state[k]) keys[k] = next[k];
    if (Object.keys(keys).length) window.parent.postMessage({ type: "__edit_mode_set_keys", edits: keys }, "*");
  };

  // active section tracking
  useEffect(() => {
    const onScroll = () => {
      const h = document.documentElement;
      const pct = h.scrollTop / Math.max(1, h.scrollHeight - h.clientHeight);
      setScrollPct(pct);
      for (const n of NAV) {
        const el = document.getElementById(n.id);
        if (!el) continue;
        const r = el.getBoundingClientRect();
        if (r.top < window.innerHeight * 0.35 && r.bottom > 0) { setActiveId(n.id); }
      }
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const onNavClick = (id) => {
    const el = document.getElementById(id);
    if (el) window.scrollTo({ top: el.offsetTop - 20, behavior: "smooth" });
  };

  const profile = PROFILES[state.profile];

  return (
    <div className="shell-grid">
      <Sidebar profile={profile} activeId={activeId} onNavClick={onNavClick} scrollPct={scrollPct}/>
      <div className="min-w-0">
        <TopBar profile={profile}
          theme={state.theme}
          onToggleTheme={() => updateState({ ...state, theme: state.theme==="dark"?"light":"dark" })}/>
        <div className="p-6 space-y-8 max-w-[1400px]">
          <HeaderHero profile={profile} alert={state.alert}/>
          <OverallMap profile={profile}/>
          <MapaEleitoral profile={profile}/>
          <TrajetoriaTimeline profile={profile}/>
          <AtividadeLegislativa profile={profile}/>
          <AlertasJuridicos profile={profile}/>
          <Financeiro profile={profile}/>
          <Emendas profile={profile}/>
          <Perfil profile={profile}/>
          <div className="py-8 text-center text-[10px] font-mono t-fg-ghost tracking-[0.2em]">
            FIM DO DOSSIÊ · v2.4.1 · {profile.firstName} {profile.lastName}
          </div>
        </div>
      </div>
      {tweaksOpen && <TweaksPanel state={state} setState={updateState} onClose={()=>setTweaksOpen(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
